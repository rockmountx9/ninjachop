                const characters = ['hiro', 'villager', 'villager2', 'oldman', 'skeleton'];
                const monsters = ['slime', 'fish', 'mushroom', 'larva', 'lizard', 'snake', 'dragon'];
                
                [...characters, ...monsters].forEach(sprite => {
                    // Walk animations - columns are directions, rows are walk poses
                    // Col 0=down, Col 1=up, Col 2=left, Col 3=right
                    this.anims.create({
                        key: sprite + '-walk-down',
                        frames: [{key:sprite+'-walk',frame:0},{key:sprite+'-walk',frame:4},{key:sprite+'-walk',frame:8},{key:sprite+'-walk',frame:12}],
                        frameRate: 8,
                        repeat: -1
                    });
                    
                    this.anims.create({
                        key: sprite + '-walk-up',
                        frames: [{key:sprite+'-walk',frame:1},{key:sprite+'-walk',frame:5},{key:sprite+'-walk',frame:9},{key:sprite+'-walk',frame:13}],
                        frameRate: 8,
                        repeat: -1
                    });
                    
                    this.anims.create({
                        key: sprite + '-walk-left',
                        frames: [{key:sprite+'-walk',frame:2},{key:sprite+'-walk',frame:6},{key:sprite+'-walk',frame:10},{key:sprite+'-walk',frame:14}],
                        frameRate: 8,
                        repeat: -1
                    });
                    
                    this.anims.create({
                        key: sprite + '-walk-right',
                        frames: [{key:sprite+'-walk',frame:3},{key:sprite+'-walk',frame:7},{key:sprite+'-walk',frame:11},{key:sprite+'-walk',frame:15}],
                        frameRate: 8,
                        repeat: -1
                    });
                    
                    // Idle animations - one frame per direction (col: 0=down, 1=up, 2=left, 3=right)
                    const dirMap = {down:0, up:1, left:2, right:3};
                    Object.entries(dirMap).forEach(([dir, frame]) => {
                        this.anims.create({
                            key: sprite + '-idle-' + dir,
                            frames: [{ key: sprite + '-idle', frame: frame }],
                            frameRate: 1,
                            repeat: 0
                        });
                    });
                });
                
                // Attack animations - only for hiro
                const dirMap = {down:0, up:1, left:2, right:3};
                Object.entries(dirMap).forEach(([dir, frame]) => {
                    this.anims.create({
                        key: 'hiro-attack-' + dir,
                        frames: [{ key: 'hiro-attack', frame: frame }],
                        frameRate: 1,
                        repeat: 0
                    });
                });
            }
        }

        // WorldScene - Main gameplay
        class WorldScene extends Phaser.Scene {
            constructor() {
                super({ key: 'WorldScene' });
                this.player = null;
                this.cursors = null;
                this.wasd = null;
                this.spaceKey = null;
                this.facing = 'down';
                this.isMoving = false;
                this.isAttacking = false;
                this.grassSprites = null;
                this.coinSprites = null;
                this.wallBodies = null;
                this.npcs = null;
                this.monsters = null;
                this.portals = null;
                this.currentWorldMusic = null;
                this.worldNameText = null;
                this.portalGlows = [];
                this.portalArrows = [];
                this.activeSpeechBubble = null;
                this.signs = null;
                this.mathEncounter = null;
            }

            create() {
                this._transitioning = false;
                try {
                    console.log('WorldScene.create START - World:', gameState.currentWorld);
                    
                    // Reset grass cut counter when entering world
                    gameState.grassCut = 0;
                    
                    // Initialize math encounter manager
                    this.mathEncounter = new MathEncounterManager(this);
                    
                    this.createWorld();
                    console.log('WorldScene: world created');
                    this.createPlayer();
                    console.log('WorldScene: player created');
                    this.setupCamera();
                    console.log('WorldScene: camera set up');
                    this.setupInput();
                    console.log('WorldScene: input set up');
                    this.scene.launch('UIScene');
                    console.log('WorldScene: UI launched');
                    this.displayWorldName();
                    
                    // Show tutorial on first world
                    if (gameState.currentWorld === 'meadow' && gameState.showTutorial) {
                        this.showTutorial();
                        gameState.showTutorial = false;
                    }
                    
                } catch (e) {
                    console.error('WorldScene.create FAILED:', e);
                }
                
                // Start world-specific music
                this.startWorldMusic();
                
                // Fade in
                this.cameras.main.fadeIn(1000);
                
                // Update portal states initially
                this.updatePortalStates();
            }
            
            createWorld() {
                const world = WORLDS[gameState.currentWorld];
                
                // Create groups
                this.grassSprites = this.add.group();
                this.coinSprites = this.physics.add.group();
                this.wallBodies = this.physics.add.staticGroup();
                this.npcs = this.add.group();
                this.monsters = this.physics.add.group();
                this.portals = this.physics.add.staticGroup();
                this.signs = this.add.group();
                
                // Create world tiles
                this.createWorldTerrain(world);
                
                // Add world-specific structures
                this.createWorldStructures(world);
                
                // Add NPCs
                this.createWorldNPCs(world);
                
                // Add monsters
                this.createWorldMonsters(world);
                
                // Add portals
                this.createWorldPortals(world);
                
                // Add decorative elements
                this.createWorldDecorations(world);
                
                // World atmosphere - add a subtle tint overlay if not default
                if (world.tint && world.tint !== 0xffffff) {
                    const tintOverlay = this.add.rectangle(
                        world.size.width * TILE / 2, world.size.height * TILE / 2,
                        world.size.width * TILE, world.size.height * TILE,
                        world.tint, 0.15
                    );
                    tintOverlay.setDepth(8); // Below player (10) and NPCs
                }
            }
            
            createWorldTerrain(world) {
                const { width, height } = world.size;
                
                // Build set of portal tile positions (and neighbors) to skip wall collision
                const portalTiles = new Set();
                world.portals.forEach(p => {
                    for (let dy = -2; dy <= 2; dy++) {
                        portalTiles.add(`${p.x},${p.y + dy}`);
                    }
                });
                
                for (let x = 0; x < width; x++) {
                    for (let y = 0; y < height; y++) {
                        const worldX = x * TILE;
                        const worldY = y * TILE;
                        
                        // Wall tiles on edges
                        if (x === 0 || x === width - 1 || y === 0 || y === height - 1) {
                            const isPortalArea = portalTiles.has(`${x},${y}`);
                            this.createWallTile(worldX, worldY, world, isPortalArea);
                        } else {
                            this.createTerrainTile(worldX, worldY, world, x, y);
                        }
                    }
                }
            }
            
            createWallTile(worldX, worldY, world, skipCollision) {
                let tileTexture = 'wall-tile';
                
                // World-specific wall textures
                switch (world.key) {
                    case 'riverside':
                        if (Math.random() < 0.3) tileTexture = 'water-tile';
                        break;
                    case 'desert':
                        tileTexture = 'sand-tile';
                        break;
                    case 'fortress':
                        tileTexture = 'stone-tile';
                        break;
                }
                
                this.add.image(worldX, worldY, tileTexture).setOrigin(0);
                
                // Add collision unless it's water or a portal area
                if (tileTexture !== 'water-tile' && !skipCollision) {
                    const wallBody = this.physics.add.staticSprite(worldX + 8, worldY + 8, null);
                    wallBody.body.setSize(16, 16);
                    wallBody.setVisible(false);
                    this.wallBodies.add(wallBody);
                }
            }
            
            createTerrainTile(worldX, worldY, world, x, y) {
                let baseTexture = 'grass-tile';
                let canHaveGrass = true;
                
                // World-specific terrain
                switch (world.key) {
                    case 'meadow':
                        // Dirt paths
                        if ((y >= world.size.height/2 - 2 && y <= world.size.height/2 + 1) || 
                            (x >= world.size.width/2 - 2 && x <= world.size.width/2 + 1)) {
                            baseTexture = 'dirt-tile';
                            canHaveGrass = false;
                        }
                        break;
                        
                    case 'riverside':
                        if (y < 8 || (x > 30 && y < 15)) {
                            baseTexture = 'water-tile';
                            canHaveGrass = false;
                            // Add water collision
                            const waterBody = this.physics.add.staticSprite(worldX + 8, worldY + 8, null);
                            waterBody.body.setSize(16, 16);
                            waterBody.setVisible(false);
                            this.wallBodies.add(waterBody);
                        } else if (y < 12) {
                            baseTexture = 'sand-tile';
                            canHaveGrass = Math.random() < 0.3;
                        }
                        break;
                        
                    case 'bamboo':
                        canHaveGrass = Math.random() < 0.6; // More dense vegetation
                        break;
                        
                    case 'desert':
                        baseTexture = 'sand-tile';
                        canHaveGrass = Math.random() < 0.15; // Sparse oasis grass
                        break;
                        
                    case 'fortress':
                        baseTexture = 'stone-tile';
                        canHaveGrass = Math.random() < 0.1; // Very little grass
                        break;
                }
                
                this.add.image(worldX, worldY, baseTexture).setOrigin(0);
                
                // Add tall grass
                if (canHaveGrass && Math.random() < 0.4) {
                    const tallGrass = this.add.image(worldX, worldY, 'tall-grass').setOrigin(0);
                    tallGrass.setData('cuttable', true);
                    this.grassSprites.add(tallGrass);
                }
            }
            
            createWorldDecorations(world) {
                const { width, height } = world.size;
                
                // Build exclusion zones around NPCs, portals, structures
                const exclusionZones = new Set();
                world.npcs.forEach(n => {
                    for (let dx = -3; dx <= 3; dx++)
                        for (let dy = -3; dy <= 3; dy++)
                            exclusionZones.add(`${n.x+dx},${n.y+dy}`);
                });
                world.portals.forEach(p => {
                    for (let dx = -3; dx <= 3; dx++)
                        for (let dy = -3; dy <= 3; dy++)
                            exclusionZones.add(`${p.x+dx},${p.y+dy}`);
                });
                world.structures.forEach(s => {
                    const sw = s.width || 3;
                    const sh = s.height || 3;
                    for (let dx = -2; dx <= sw + 1; dx++)
                        for (let dy = -2; dy <= sh + 1; dy++)
                            exclusionZones.add(`${s.x+dx},${s.y+dy}`);
                });
                
                // Add decorative elements based on world type
                for (let x = 1; x < width - 1; x++) {
                    for (let y = 1; y < height - 1; y++) {
                        if (exclusionZones.has(`${x},${y}`)) continue;
                        const worldX = x * TILE;
                        const worldY = y * TILE;
                        
                        // Skip if there's a structure here
                        const hasStructure = world.structures.some(s => 
                            x >= s.x && x < s.x + (s.width || 1) && 
                            y >= s.y && y < s.y + (s.height || 1)
                        );
                        
                        if (hasStructure) continue;
                        
                        // Add decorations based on world type
                        switch (world.key) {
                            case 'meadow':
                                // Flowers
                                if (Math.random() < 0.05) {
                                    const flowerColor = Phaser.Utils.Array.GetRandom([0xff69b4, 0xffff00, 0xff4500, 0x9370db]);
                                    this.add.circle(worldX + 8, worldY + 8, 2, flowerColor).setDepth(1);
                                }
                                // Trees (with collision)
                                if (Math.random() < 0.06) {
                                    this.addTree(worldX, worldY);
                                }
                                break;
                                
                            case 'riverside':
                                // Reeds near water
                                if (y < 15 && Math.random() < 0.1) {
                                    this.add.rectangle(worldX + 8, worldY + 8, 2, 12, 0x228b22).setDepth(1);
                                }
                                // Rocks
                                if (Math.random() < 0.04) {
                                    this.add.circle(worldX + 8, worldY + 8, 4, 0x696969).setDepth(1);
                                }
                                break;
                                
                            case 'bamboo':
                                // Dense trees (with collision)
                                if (Math.random() < 0.10) {
                                    this.addTree(worldX, worldY);
                                }
                                // Mushroom patches
                                if (Math.random() < 0.06) {
                                    this.add.circle(worldX + 6, worldY + 10, 3, 0xcd853f).setDepth(1);
                                    this.add.circle(worldX + 6, worldY + 8, 2, 0xff6347).setDepth(1);
                                }
                                break;
                                
                            case 'desert':
                                // Cacti
                                if (Math.random() < 0.05) {
                                    this.add.rectangle(worldX + 8, worldY + 8, 4, 10, 0x228b22).setDepth(1);
                                    this.add.rectangle(worldX + 8, worldY + 6, 6, 2, 0x228b22).setDepth(1);
                                }
                                // Rocks
                                if (Math.random() < 0.06) {
                                    this.add.circle(worldX + 8, worldY + 8, 5, 0x8b4513).setDepth(1);
                                }
                                break;
                                
                            case 'fortress':
                                // Debris
                                if (Math.random() < 0.04) {
                                    this.add.rectangle(worldX + 8, worldY + 8, 6, 4, 0x2f4f4f).setDepth(1);
                                }
                                // Torches
                                if (Math.random() < 0.02) {
                                    this.add.rectangle(worldX + 8, worldY + 8, 2, 8, 0x8b4513).setDepth(1);
                                    this.add.circle(worldX + 8, worldY + 4, 3, 0xff4500).setDepth(1);
                                }
                                break;
                        }
                    }
                }
            }
            
            createWorldStructures(world) {
                world.structures.forEach(structure => {
                    const worldX = structure.x * TILE;
                    const worldY = structure.y * TILE;
                    
                    switch (structure.type) {
                        case 'house':
                            this.createHouse(worldX, worldY, structure.width, structure.height);
                            break;
                        case 'well':
                            this.createWell(worldX, worldY);
                            break;
                        case 'fence':
                            this.createFence(worldX, worldY, structure.length, structure.direction);
                            break;
                        case 'bridge':
                            this.createBridge(worldX, worldY, structure.direction);
                            break;
                        default:
                            // Other structure types - simplified for now
                            this.add.rectangle(worldX + 8, worldY + 8, 16, 16, 0x8b4513).setOrigin(0.5);
                            break;
                    }
                });
            }
            
            createHouse(worldX, worldY, width, height) {
                // Create a proper-looking house with roof, walls, and door
                for (let i = 0; i < width; i++) {
                    for (let j = 0; j < height; j++) {
                        const tileX = worldX + i * TILE;
                        const tileY = worldY + j * TILE;
                        
                        if (j === 0) {
                            // Roof - brown
                            this.add.rectangle(tileX + 8, tileY + 8, 16, 16, 0x8B4513).setOrigin(0.5).setDepth(2);
                        } else if (j === height - 1) {
                            // Bottom row - walls with door
                            if (i === Math.floor(width / 2)) {
                                // Door - dark opening
                                this.add.rectangle(tileX + 8, tileY + 8, 16, 16, 0xD2B48C).setOrigin(0.5).setDepth(2);
                                this.add.rectangle(tileX + 8, tileY + 8, 10, 14, 0x2F4F4F).setOrigin(0.5).setDepth(3);
                            } else {
                                // Wall
                                this.add.rectangle(tileX + 8, tileY + 8, 16, 16, 0xD2B48C).setOrigin(0.5).setDepth(2);
                            }
                        } else {
                            // Middle rows - walls
                            this.add.rectangle(tileX + 8, tileY + 8, 16, 16, 0xD2B48C).setOrigin(0.5).setDepth(2);
                        }
                        
                        // Add collision for all tiles
                        const wallBody = this.physics.add.staticSprite(tileX + 8, tileY + 8, null);
                        wallBody.body.setSize(16, 16);
                        wallBody.setVisible(false);
                        this.wallBodies.add(wallBody);
                    }
                }
                
                // Add chimney on larger houses
                if (width >= 3 && height >= 3) {
                    const chimneyX = worldX + (width - 1) * TILE;
                    const chimneyY = worldY - TILE/2;
                    this.add.rectangle(chimneyX + 8, chimneyY + 8, 8, 12, 0x696969).setOrigin(0.5).setDepth(4);
                }
            }
            
            createWell(worldX, worldY) {
                // Create a proper stone well instead of grey circle
                const centerX = worldX + 8;
                const centerY = worldY + 8;
                
                // Stone base
                this.add.circle(centerX, centerY, 8, 0x708090).setDepth(2);
                // Inner dark water
                this.add.circle(centerX, centerY, 5, 0x191970).setDepth(3);
                // Stone rim
                this.add.circle(centerX, centerY, 8, 0x708090, 0).setStrokeStyle(2, 0x2F4F4F).setDepth(4);
                
                // Well roof structure
                this.add.rectangle(centerX, centerY - 6, 2, 12, 0x8B4513).setOrigin(0.5).setDepth(3); // Left post
                this.add.rectangle(centerX, centerY - 6, 2, 12, 0x8B4513).setOrigin(0.5).setDepth(3); // Right post  
                this.add.rectangle(centerX, centerY - 12, 16, 4, 0x8B4513).setOrigin(0.5).setDepth(3); // Roof beam
                
                // Add collision
                const wallBody = this.physics.add.staticSprite(centerX, centerY, null);
                wallBody.body.setSize(16, 16);
                wallBody.setVisible(false);
                this.wallBodies.add(wallBody);
            }
            
            createFence(worldX, worldY, length, direction) {
                for (let i = 0; i < length; i++) {
                    const tileX = direction === 'horizontal' ? worldX + i * TILE : worldX;
                    const tileY = direction === 'horizontal' ? worldY : worldY + i * TILE;
                    
                    // Create proper fence posts and rails
                    const centerX = tileX + 8;
                    const centerY = tileY + 8;
                    
                    if (direction === 'horizontal') {
                        // Horizontal fence
                        this.add.rectangle(centerX, centerY - 2, 16, 3, 0x8B4513).setOrigin(0.5).setDepth(2); // Top rail
                        this.add.rectangle(centerX, centerY + 2, 16, 3, 0x8B4513).setOrigin(0.5).setDepth(2); // Bottom rail
                        if (i % 2 === 0) { // Posts every other tile
                            this.add.rectangle(centerX, centerY, 3, 12, 0x654321).setOrigin(0.5).setDepth(3);
                        }
                    } else {
                        // Vertical fence
                        this.add.rectangle(centerX - 2, centerY, 3, 16, 0x8B4513).setOrigin(0.5).setDepth(2); // Left rail
                        this.add.rectangle(centerX + 2, centerY, 3, 16, 0x8B4513).setOrigin(0.5).setDepth(2); // Right rail
                        if (i % 2 === 0) { // Posts every other tile
                            this.add.rectangle(centerX, centerY, 12, 3, 0x654321).setOrigin(0.5).setDepth(3);
                        }
                    }
                    
                    const wallBody = this.physics.add.staticSprite(centerX, centerY, null);
                    wallBody.body.setSize(16, 16);
                    wallBody.setVisible(false);
                    this.wallBodies.add(wallBody);
                }
            }
            
            createBridge(worldX, worldY, direction) {
                const length = direction === 'horizontal' ? 4 : 3;
                for (let i = 0; i < length; i++) {
                    const tileX = direction === 'horizontal' ? worldX + i * TILE : worldX;
                    const tileY = direction === 'horizontal' ? worldY : worldY + i * TILE;
                    
                    // Wooden bridge planks
                    this.add.rectangle(tileX + 8, tileY + 8, 16, 16, 0x654321).setOrigin(0.5).setDepth(2);
                    
                    // Bridge supports
                    if (direction === 'horizontal') {
                        this.add.rectangle(tileX + 8, tileY + 12, 14, 2, 0x8B4513).setOrigin(0.5).setDepth(3);
                        this.add.rectangle(tileX + 8, tileY + 4, 14, 2, 0x8B4513).setOrigin(0.5).setDepth(3);
                    } else {
                        this.add.rectangle(tileX + 4, tileY + 8, 2, 14, 0x8B4513).setOrigin(0.5).setDepth(3);
                        this.add.rectangle(tileX + 12, tileY + 8, 2, 14, 0x8B4513).setOrigin(0.5).setDepth(3);
                    }
                }
            }
            
            addTree(worldX, worldY) {
                this.add.image(worldX, worldY, 'tree-tile').setOrigin(0).setDepth(2);
                const wallBody = this.physics.add.staticSprite(worldX + 8, worldY + 8, null);
                wallBody.body.setSize(16, 16);
                wallBody.setVisible(false);
                this.wallBodies.add(wallBody);
            }
            
            createWorldNPCs(world) {
                world.npcs.forEach(npcData => {
                    const worldX = npcData.x * TILE + 8;
                    const worldY = npcData.y * TILE + 8;
                    
                    const npc = this.add.sprite(worldX, worldY, npcData.sprite + '-idle', 0);
                    npc.play(npcData.sprite + '-idle-down');
                    npc.setDepth(5); // Above terrain and decorations
                    npc.setData('name', npcData.name);
                    npc.setData('dialogue', npcData.dialogue);
                    
                    // Name label above NPC
                    const label = this.add.text(worldX, worldY - 12, npcData.name, {
                        fontSize: '7px',
                        fill: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 2
                    }).setOrigin(0.5).setDepth(6);
                    
                    this.npcs.add(npc);
                });
            }
            
            createWorldMonsters(world) {
                world.monsters.forEach(monsterData => {
                    const worldX = monsterData.x * TILE + 8;
                    const worldY = monsterData.y * TILE + 8;
                    
                    const monster = this.physics.add.sprite(worldX, worldY, monsterData.sprite + '-idle', 0);
                    monster.play(monsterData.sprite + '-idle-down');
                    monster.setData('name', monsterData.name);
                    monster.setData('sprite', monsterData.sprite);
                    monster.setData('facing', 'down');
                    monster.setData('moveTimer', 0);
                    monster.setData('pauseTimer', 0);
                    monster.body.setSize(12, 12);
                    monster.body.setOffset(2, 2);
                    
                    // Monster collision with walls but not player
                    this.physics.add.collider(monster, this.wallBodies);
                    
                    this.monsters.add(monster);
                });
            }
            
            createWorldPortals(world) {
                world.portals.forEach((portalData, index) => {
                    const worldX = portalData.x * TILE;
                    const worldY = portalData.y * TILE;
                    
                    // Visual glow (starts red/locked)
                    const glow = this.add.rectangle(worldX + 8, worldY + 8, 16, 16, 0xff4444);
                    glow.setAlpha(0.7);
                    
                    // Store reference for updating
                    this.portalGlows[index] = glow;
                    
                    // Floating arrow indicator (initially hidden)
                    const arrow = this.add.text(worldX + 8, worldY - 10, '↓', {
                        fontSize: '16px',
                        fill: '#ffff00',
                        fontWeight: 'bold'
                    }).setOrigin(0.5);
                    arrow.setVisible(false);
                    this.portalArrows[index] = arrow;
                    
                    // Animate the glow
                    this.tweens.add({
                        targets: glow,
                        alpha: { from: 0.5, to: 1 },
                        duration: 1000,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                    
                    // Animate the arrow
                    this.tweens.add({
                        targets: arrow,
                        y: worldY - 15,
                        duration: 800,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                    
                    // Physics body for overlap detection (3 tiles tall for easier entry)
                    for (let dy = -1; dy <= 1; dy++) {
                        const portal = this.physics.add.staticSprite(worldX + 8, worldY + 8 + dy * TILE, null);
                        portal.body.setSize(16, 16);
                        portal.setVisible(false);
                        portal.setData('target', portalData.target);
                        portal.setData('spawnX', portalData.spawnX);
                        portal.setData('spawnY', portalData.spawnY);
                        portal.setData('index', index);
                        this.portals.add(portal);
                    }
                    
                    // Extra glow tiles for visual
                    for (let dy of [-1, 1]) {
                        const extraGlow = this.add.rectangle(worldX + 8, worldY + 8 + dy * TILE, 16, 16, 0xff4444);
                        extraGlow.setAlpha(0.4);
                    }
                    
                    // Create sign near portal
                    this.createPortalSign(worldX, worldY, portalData.sign);
                });
            }
            
            createPortalSign(worldX, worldY, signText) {
                // Find a good position for the sign
                const signOffsets = [
                    { x: -24, y: 0 }, // Left
                    { x: 24, y: 0 },  // Right
                    { x: 0, y: -24 }, // Up
                    { x: 0, y: 24 }   // Down
                ];
                
                const offset = signOffsets[Math.floor(Math.random() * signOffsets.length)];
                const signX = worldX + 8 + offset.x;
                const signY = worldY + 8 + offset.y;
                
                // Sign post
                this.add.rectangle(signX, signY + 4, 3, 12, 0x8B4513).setOrigin(0.5).setDepth(2);
                
                // Sign board
                const signBoard = this.add.rectangle(signX, signY - 4, 32, 12, 0xDEB887).setOrigin(0.5).setDepth(3);
                signBoard.setStrokeStyle(2, 0x8B4513);
                
                // Sign text
                this.add.text(signX, signY - 4, signText, {
                    fontSize: '8px',
                    fill: '#000000',
                    fontWeight: 'bold'
                }).setOrigin(0.5).setDepth(4);
            }
            
            updatePortalStates() {
                const world = WORLDS[gameState.currentWorld];
                const grassRequired = world.grassRequired;
                const isQuestComplete = gameState.grassCut >= grassRequired;
                
                world.portals.forEach((portalData, index) => {
                    const glow = this.portalGlows[index];
                    const arrow = this.portalArrows[index];
                    
                    if (glow) {
                        if (isQuestComplete) {
                            // Green and unlocked
                            glow.setFillStyle(0x00ff00);
                            if (arrow) arrow.setVisible(true);
                        } else {
                            // Red and locked
                            glow.setFillStyle(0xff4444);
                            if (arrow) arrow.setVisible(false);
                        }
                    }
                });
            }
            
            createPlayer() {
                const world = WORLDS[gameState.currentWorld];
                let startX = Math.floor(world.size.width / 2) * TILE;
                let startY = Math.floor(world.size.height / 2) * TILE;
                
                // If we have spawn coordinates from a portal, use those
                if (gameState.spawnX !== undefined && gameState.spawnY !== undefined) {
                    startX = gameState.spawnX * TILE;
                    startY = gameState.spawnY * TILE;
                    delete gameState.spawnX;
                    delete gameState.spawnY;
                }
                
                this.player = this.physics.add.sprite(startX, startY, 'hiro-idle');
                this.player.setDepth(10); // Always on top of terrain/structures
                this.player.body.setSize(12, 12);
                this.player.body.setOffset(2, 4);
                
                // Player physics
                this.player.body.setDrag(300);
                this.player.body.setMaxVelocity(120, 120);
                
                // Collisions
                this.physics.add.collider(this.player, this.wallBodies);
                this.physics.add.overlap(this.player, this.coinSprites, this.collectCoin, null, this);
                this.physics.add.overlap(this.player, this.portals, (p, portal) => this.enterPortal(p, portal), null, this);
                
                // Start idle animation
                this.player.play('hiro-idle-down');
            }
            
            setupCamera() {
                const world = WORLDS[gameState.currentWorld];
                this.cameras.main.setZoom(ZOOM);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                this.cameras.main.setDeadzone(40, 40);
                this.cameras.main.setBounds(0, 0, world.size.width * TILE, world.size.height * TILE);
            }
            
            setupInput() {
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys('W,S,A,D');
                this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
            }
            
            startWorldMusic() {
                const world = WORLDS[gameState.currentWorld];
                
                // Stop current music
                if (this.currentWorldMusic) {
                    this.currentWorldMusic.stop();
                }
                
                // Start new music
                try {
                    this.currentWorldMusic = this.sound.add(world.music, { loop: true, volume: 0.2 });
                    this.currentWorldMusic.play();
                } catch (e) {
                    console.log('World music failed to play:', world.music);
                }
            }
            
            displayWorldName() {
                const world = WORLDS[gameState.currentWorld];
                
                this.worldNameText = this.add.text(GAME_W/2/ZOOM, 60/ZOOM, `~ ${world.name} ~`, {
                    fontFamily: 'Nunito',
                    fontSize: `${32/ZOOM}px`,
                    fontWeight: 'bold',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 4/ZOOM
                }).setOrigin(0.5).setScrollFactor(0);
                
                // Fade in and out
                this.worldNameText.setAlpha(0);
                this.tweens.add({
                    targets: this.worldNameText,
                    alpha: 1,
                    duration: 1000,
                    yoyo: true,
                    delay: 1000,
                    onComplete: () => {
                        this.worldNameText.destroy();
                    }
                });
            }
            
            showTutorial() {
                const tutorialText = this.add.text(GAME_W/2/ZOOM, 100/ZOOM, 'Press SPACE to slash grass!\nSolve math problems when they appear!\nCollect coins and complete your quest!', {
                    fontFamily: 'Nunito',
                    fontSize: `${18/ZOOM}px`,
                    fontWeight: 'bold',
                    fill: '#ffff00',
                    stroke: '#000000',
                    strokeThickness: 3/ZOOM,
                    align: 'center'
                }).setOrigin(0.5).setScrollFactor(0);
                
                // Fade in and out
                tutorialText.setAlpha(0);
                this.tweens.add({
                    targets: tutorialText,
                    alpha: 1,
                    duration: 1000,
                    hold: 4000,
                    yoyo: true,
                    onComplete: () => {
                        tutorialText.destroy();
                    }
                });
            }
            
            getNearbyNPC() {
                let nearestNPC = null;
                let nearestDistance = Phaser.Math.MAX_VALUE;
                
                if (this.npcs.children.entries.length === 0) {
                    console.warn('No NPCs in scene!');
                }
                
                this.npcs.children.entries.forEach(npc => {
                    const distance = Phaser.Math.Distance.Between(
                        this.player.x, this.player.y, npc.x, npc.y
                    );
                    
                    if (distance < 3 * TILE && distance < nearestDistance) {
                        nearestNPC = npc;
                        nearestDistance = distance;
                    }
                });
                
                return nearestNPC;
            }
            
            showDialogue(npc) {
                // Remove existing dialogue
                if (this.activeSpeechBubble) {
                    this.activeSpeechBubble.forEach(element => element.destroy());
                }
                
                const dialogue = npc.getData('dialogue');
                if (!dialogue) return;
                
                // Create speech bubble background
                const bubbleWidth = Math.min(200, dialogue.length * 6 + 20);
                const bubbleHeight = 50;
                const bubbleX = npc.x;
                const bubbleY = npc.y - 30;
                
                // Rounded rectangle background
                const graphics = this.add.graphics();
                graphics.setDepth(50);
                graphics.fillStyle(0xffffff);
                graphics.fillRoundedRect(bubbleX - bubbleWidth/2, bubbleY - bubbleHeight/2, bubbleWidth, bubbleHeight, 8);
                graphics.lineStyle(2, 0x000000);
                graphics.strokeRoundedRect(bubbleX - bubbleWidth/2, bubbleY - bubbleHeight/2, bubbleWidth, bubbleHeight, 8);
                
                // Speech bubble tail
                graphics.fillStyle(0xffffff);
                graphics.fillTriangle(
                    bubbleX - 5, bubbleY + bubbleHeight/2,
                    bubbleX + 5, bubbleY + bubbleHeight/2,
                    bubbleX, bubbleY + bubbleHeight/2 + 10
                );
                graphics.lineStyle(2, 0x000000);
                graphics.strokeTriangle(
                    bubbleX - 5, bubbleY + bubbleHeight/2,
                    bubbleX + 5, bubbleY + bubbleHeight/2,
                    bubbleX, bubbleY + bubbleHeight/2 + 10
                );
                
                // Dialogue text
                const text = this.add.text(bubbleX, bubbleY, dialogue, {
                    fontFamily: 'Nunito',
                    fontSize: '12px',
                    fill: '#000000',
                    align: 'center',
                    wordWrap: { width: bubbleWidth - 20 }
                }).setOrigin(0.5).setDepth(51);
                
                // Store references
                this.activeSpeechBubble = [graphics, text];
                
                // Auto-remove after 3 seconds
                this.time.delayedCall(3000, () => {
                    if (this.activeSpeechBubble) {
                        this.activeSpeechBubble.forEach(element => element.destroy());
                        this.activeSpeechBubble = null;
                    }
                });
            }
            
            update() {
                if (!this.player) return;
                
                // Don't process normal input during math encounter
                if (this.mathEncounter && this.mathEncounter.isActive) {
                    return;
                }
                
                // Update monsters
                this.updateMonsters();
                
                // Check NPC interaction
                if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && !this.isAttacking) {
                    const nearNPC = this.getNearbyNPC();
                    if (nearNPC) {
                        this.showDialogue(nearNPC);
                        return; // don't attack
                    }
                    this.attack();
                    return;
                }
                
                if (this.isAttacking) return;
                
                // Handle movement
                let velocityX = 0;
                let velocityY = 0;
                this.isMoving = false;
                
                if (this.wasd.A.isDown || this.cursors.left.isDown) {
                    velocityX = -120;
                    this.facing = 'left';
                    this.isMoving = true;
                } else if (this.wasd.D.isDown || this.cursors.right.isDown) {
                    velocityX = 120;
                    this.facing = 'right';
                    this.isMoving = true;
                }
                
                if (this.wasd.W.isDown || this.cursors.up.isDown) {
                    velocityY = -120;
                    this.facing = 'up';
                    this.isMoving = true;
                } else if (this.wasd.S.isDown || this.cursors.down.isDown) {
                    velocityY = 120;
                    this.facing = 'down';
                    this.isMoving = true;
                }
                
                // Apply velocity
                this.player.setVelocity(velocityX, velocityY);
                
                // Handle animations
                const curKey = this.player.anims.currentAnim ? this.player.anims.currentAnim.key : '';
                if (this.isMoving) {
                    const animKey = 'hiro-walk-' + this.facing;
                    if (curKey !== animKey) {
                        this.player.play(animKey, true);
                    }
                } else {
                    const idleKey = 'hiro-idle-' + this.facing;
                    if (curKey !== idleKey) {
                        this.player.play(idleKey);
                    }
                }
            }
            
            updateMonsters() {
                this.monsters.children.entries.forEach(monster => {
                    const moveTimer = monster.getData('moveTimer') - 1;
                    const pauseTimer = monster.getData('pauseTimer') - 1;
                    
                    monster.setData('moveTimer', moveTimer);
                    monster.setData('pauseTimer', pauseTimer);
                    
                    if (pauseTimer > 0) {
                        // Pausing - show idle animation
                        monster.setVelocity(0, 0);
                        const facing = monster.getData('facing');
                        const sprite = monster.getData('sprite');
                        const currentKey = monster.anims.currentAnim ? monster.anims.currentAnim.key : '';
                        const idleKey = sprite + '-idle-' + facing;
                        if (currentKey !== idleKey) {
                            monster.play(idleKey);
                        }
                    } else if (moveTimer > 0) {
                        // Continue moving in current direction
                        const facing = monster.getData('facing');
                        const sprite = monster.getData('sprite');
                        const currentKey = monster.anims.currentAnim ? monster.anims.currentAnim.key : '';
                        const walkKey = sprite + '-walk-' + facing;
                        if (currentKey !== walkKey) {
                            monster.play(walkKey, true);
                        }
                        
                        // Apply movement
                        let vx = 0, vy = 0;
                        const speed = 30;
                        switch (facing) {
                            case 'up': vy = -speed; break;
                            case 'down': vy = speed; break;
                            case 'left': vx = -speed; break;
                            case 'right': vx = speed; break;
                        }
                        monster.setVelocity(vx, vy);
                        
                        // When move finishes, start pause
                        if (moveTimer === 1) {
                            monster.setData('pauseTimer', Phaser.Math.Between(60, 180));
                        }
                    } else {
                        // Choose new direction — move first, then pause after
                        const directions = ['up', 'down', 'left', 'right'];
                        const newFacing = Phaser.Utils.Array.GetRandom(directions);
                        monster.setData('facing', newFacing);
                        monster.setData('moveTimer', Phaser.Math.Between(60, 180)); // 1-3 seconds at 60fps
                        monster.setData('pauseTimer', 0); // don't pause until move finishes
                    }
                });
            }
            
            attack() {
                if (this.isAttacking) return;
                
                this.isAttacking = true;
                this.player.setVelocity(0, 0);
                this.player.play('hiro-attack-' + this.facing);
                
                // Play attack sound
                try {
                    this.sound.play('sfx-slash', { volume: 0.5 });
                } catch (e) {}
                
                // Cut grass immediately
                this.cutNearbyGrass();
                
                // Reset after 250ms
                this.time.delayedCall(250, () => {
                    this.isAttacking = false;
                    if (!this.mathEncounter || !this.mathEncounter.isActive) {
                        this.player.play('hiro-idle-' + this.facing);
                    }
                });
            }
            
            cutNearbyGrass() {
                if (!this.grassSprites) return;
                
                const playerX = this.player.x;
                const playerY = this.player.y;
                
                let checkX = playerX;
                let checkY = playerY;
                const range = 1.5 * TILE;
                
                switch (this.facing) {
                    case 'up': checkY -= range; break;
                    case 'down': checkY += range; break;
                    case 'left': checkX -= range; break;
                    case 'right': checkX += range; break;
                }
                
                const grassToRemove = [];
                
                this.grassSprites.children.entries.forEach(grass => {
                    if (grass.getData('cuttable')) {
                        const distance = Phaser.Math.Distance.Between(
                            grass.x, grass.y, checkX, checkY
                        );
                        
                        if (distance < range) {
                            grassToRemove.push(grass);
                        }
                    }
                });
                
                // Check if any grass was cut
                if (grassToRemove.length > 0) {
                    // 30% chance for math encounter instead of normal rewards
                    if (Math.random() < 0.3 && this.mathEncounter && !this.mathEncounter.isActive) {
                        // Start math encounter at the first grass position
                        const firstGrass = grassToRemove[0];
                        this.mathEncounter.startEncounter(firstGrass.x, firstGrass.y);
                        
                        // Still remove the grass visually
                        grassToRemove.forEach(grass => {
                            this.createGrassParticles(grass.x, grass.y);
                            grass.setVisible(false);
                            grass.setData('cuttable', false);
                            
                            this.time.delayedCall(60000, () => {
                                if (grass.scene) {
                                    grass.setVisible(true);
                                    grass.setData('cuttable', true);
                                    grass.setAlpha(0);
                                    this.tweens.add({
                                        targets: grass,
                                        alpha: 1,
                                        duration: 1000,
                                        ease: 'Sine.easeIn'
                                    });
                                }
                            });
                        });
                    } else {
                        // Normal grass cutting behavior
                        grassToRemove.forEach(grass => {
                            const gx = grass.x;
                            const gy = grass.y;
                            
                            this.createGrassParticles(gx, gy);
                            
                            if (Math.random() < 0.7) {
                                this.spawnCoin(gx + 8, gy + 8);
                            }
                            
                            grass.setVisible(false);
                            grass.setData('cuttable', false);
                            
                            this.time.delayedCall(60000, () => {
                                if (grass.scene) {
                                    grass.setVisible(true);
                                    grass.setData('cuttable', true);
                                    grass.setAlpha(0);
                                    this.tweens.add({
                                        targets: grass,
                                        alpha: 1,
                                        duration: 1000,
                                        ease: 'Sine.easeIn'
                                    });
                                }
                            });
                        });
                    }
                    
                    gameState.streak += grassToRemove.length;
                    gameState.grassCut += grassToRemove.length;
                    this.updatePortalStates(); // Update portal states when grass is cut
                    this.events.emit('updateUI');
                }
            }
            
            createGrassParticles(x, y) {
                for (let i = 0; i < 6; i++) {
                    const particle = this.add.image(x + 8, y + 8, 'particle-grass');
                    particle.setScale(Phaser.Math.FloatBetween(0.5, 1.5));
                    
                    this.tweens.add({
                        targets: particle,
                        x: x + 8 + Phaser.Math.Between(-20, 20),
                        y: y + 8 + Phaser.Math.Between(-20, 20),
                        alpha: 0,
                        duration: 500,
                        ease: 'Quad.easeOut',
                        onComplete: () => particle.destroy()
                    });
                }
            }
            
            spawnCoin(x, y) {
                const coin = this.physics.add.sprite(x, y, 'coin');
                coin.setScale(0.8);
                coin.body.setSize(12, 12);
                
                coin.setVelocity(
                    Phaser.Math.Between(-50, 50),
                    Phaser.Math.Between(-100, -50)
                );
                coin.setBounce(0.7);
                coin.body.setDrag(100);
                
                this.time.delayedCall(1000, () => {
                    if (coin.active) {
                        this.tweens.add({
                            targets: coin,
                            y: coin.y - 3,
                            duration: 1000,
                            ease: 'Sine.easeInOut',
                            yoyo: true,
                            repeat: -1
                        });
                        
                        this.tweens.add({
                            targets: coin,
                            alpha: 0.7,
                            duration: 1500,
                            ease: 'Sine.easeInOut',
                            yoyo: true,
                            repeat: -1
                        });
                    }
                });
                
                this.coinSprites.add(coin);
            }
            
            collectCoin(player, coin) {
                try {
                    this.sound.play('sfx-coin', { volume: 0.6 });
                } catch (e) {}
                
                for (let i = 0; i < 8; i++) {
                    const spark = this.add.image(coin.x, coin.y, 'particle-spark');
                    spark.setScale(0.5);
                    
                    this.tweens.add({
                        targets: spark,
                        x: coin.x + Phaser.Math.Between(-30, 30),
                        y: coin.y + Phaser.Math.Between(-30, 30),
                        alpha: 0,
                        duration: 400,
                        ease: 'Power2',
                        onComplete: () => spark.destroy()
                    });
                }
                
                const plusText = this.add.text(coin.x, coin.y - 10, '+1', {
                    fontFamily: 'Nunito',
                    fontSize: '16px',
                    fontWeight: 'bold',
                    fill: '#ffd700',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: plusText,
                    y: coin.y - 30,
                    alpha: 0,
                    duration: 1000,
                    ease: 'Power2',
                    onComplete: () => plusText.destroy()
                });
                
                gameState.coins++;
                this.events.emit('updateUI');
                
                coin.destroy();
            }
            
            enterPortal(player, portal) {
                if (this._transitioning) return; // prevent double-trigger
                
                const world = WORLDS[gameState.currentWorld];
                const grassRequired = world.grassRequired;
                
                // Check if portal is unlocked
                if (gameState.grassCut < grassRequired) {
                    // Portal is locked - show message but don't transport
                    const lockMessage = this.add.text(portal.x, portal.y - 20, 'Portal Locked!', {
                        fontSize: '14px',
                        fill: '#ff0000',
                        fontWeight: 'bold',
                        stroke: '#000000',
                        strokeThickness: 2
                    }).setOrigin(0.5);
                    
                    this.tweens.add({
                        targets: lockMessage,
                        y: portal.y - 35,
                        alpha: 0,
                        duration: 1500,
                        onComplete: () => lockMessage.destroy()
                    });
                    
                    return;
                }
                
                this._transitioning = true;
                
                const targetWorld = portal.getData('target');
                const spawnX = portal.getData('spawnX');
                const spawnY = portal.getData('spawnY');
                
                // Play portal sound
                try {
                    this.sound.play('sfx-portal', { volume: 0.5 });
                } catch (e) {}
                
                // Stop current music
                if (this.currentWorldMusic) {
                    this.currentWorldMusic.stop();
                }
                
                // Stop player
                this.player.setVelocity(0, 0);
                
                // Set spawn position for new world
                gameState.spawnX = spawnX;
                gameState.spawnY = spawnY;
                gameState.currentWorld = targetWorld;
                
                // Fade out and restart scene
                this.cameras.main.fadeOut(500, 0, 0, 0, (camera, progress) => {
                    if (progress === 1) {
                        // Stop UIScene so it gets re-launched fresh
                        this.scene.stop('UIScene');
                        this.scene.restart();
                    }
                });
            }
        }

        // UIScene - Overlay interface
        class UIScene extends Phaser.Scene {
            constructor() {
                super({ key: 'UIScene' });
                this.coinText = null;
                this.streakText = null;
                this.worldText = null;
                this.hearts = [];
                this.questText = null;
                this.xpText = null;
                this.levelText = null;
                this.xpBar = null;
                this.xpBarFill = null;
            }

            create() {
                // UI should not be zoomed
                this.cameras.main.setZoom(1);
                
                // Top bar background
                this.add.rectangle(GAME_W/2, 35, GAME_W, 70, 0x000000, 0.7);
                
                // Hearts
                for (let i = 0; i < 5; i++) {
                    const heart = this.add.text(30 + i * 30, 30, '♥', {
                        fontSize: '24px',
                        fill: '#ff0000'
                    }).setOrigin(0.5);
                    this.hearts.push(heart);
                }
                
                // Level display
                this.levelText = this.add.text(30, 55, 'Level: 1', {
                    fontFamily: 'Nunito',
                    fontSize: '16px',
                    fontWeight: '600',
                    fill: '#ffffff'
                }).setOrigin(0, 0.5);
                
                // XP Bar
                const xpBarWidth = 120;
                const xpBarHeight = 8;
                this.xpBar = this.add.rectangle(150, 55, xpBarWidth, xpBarHeight, 0x333333);
                this.xpBar.setStrokeStyle(1, 0xffffff);
                this.xpBarFill = this.add.rectangle(150 - xpBarWidth/2, 55, 0, xpBarHeight, 0x00aa00);
                this.xpBarFill.setOrigin(0, 0.5);
                
                // XP Text
                this.xpText = this.add.text(280, 55, 'XP: 0/100', {
                    fontFamily: 'Nunito',
                    fontSize: '14px',
                    fontWeight: '600',
                    fill: '#ffffff'
                }).setOrigin(0, 0.5);
                
                // World indicator
                this.worldText = this.add.text(GAME_W/2, 30, '', {
                    fontFamily: 'Nunito',
                    fontSize: '18px',
                    fontWeight: '600',
                    fill: '#ffffff'
                }).setOrigin(0.5);
                
                // Coin counter
                this.coinText = this.add.text(GAME_W - 200, 30, 'Coins: 0', {
                    fontFamily: 'Nunito',
                    fontSize: '20px',
                    fontWeight: '600',
                    fill: '#ffd700'
                }).setOrigin(0.5);
                
                // Streak counter
                this.streakText = this.add.text(GAME_W - 80, 30, 'Streak: 0', {
                    fontFamily: 'Nunito',
                    fontSize: '20px',
                    fontWeight: '600',
                    fill: '#4a9c4a'
                }).setOrigin(0.5);
                
                // Quest objective text
                this.questText = this.add.text(GAME_W/2, 85, '', {
                    fontFamily: 'Nunito',
                    fontSize: '16px',
                    fontWeight: '600',
                    fill: '#ffff00',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);
                
                // Bottom hint text
                this.add.rectangle(GAME_W/2, GAME_H - 30, GAME_W, 60, 0x000000, 0.7);
                this.add.text(GAME_W/2, GAME_H - 30, 'WASD to move • SPACE to slash grass or talk to NPCs • Solve math problems for XP and extra coins!', {
                    fontFamily: 'Nunito',
                    fontSize: '16px',
                    fill: '#ffffff'
                }).setOrigin(0.5);
                
                // Listen for updates from WorldScene
                this.scene.get('WorldScene').events.on('updateUI', this.updateUI, this);
                
                // Initial update
                this.updateUI();
            }
            
            updateUI() {
                this.coinText.setText(`Coins: ${gameState.coins}`);
                this.streakText.setText(`Streak: ${gameState.streak}`);
                this.levelText.setText(`Level: ${gameState.level}`);
                
                // Update XP bar
                const xpInLevel = gameState.xp % 100;
                const xpForNextLevel = 100;
                const xpBarWidth = 120;
                const fillWidth = (xpInLevel / xpForNextLevel) * xpBarWidth;
                this.xpBarFill.setSize(fillWidth, 8);
                this.xpText.setText(`XP: ${xpInLevel}/${xpForNextLevel}`);
                
                const world = WORLDS[gameState.currentWorld];
                if (world) {
                    this.worldText.setText(world.name);
                    
                    // Update quest text
                    const grassRequired = world.grassRequired;
                    const grassCut = gameState.grassCut;
                    
                    if (grassCut >= grassRequired) {
                        this.questText.setText('✨ Portal Open! Find the glowing gateway!');
                        this.questText.setFill('#00ff00');
                    } else {
                        this.questText.setText(`🌿 ${grassCut}/${grassRequired} Cut grass to open the portal!`);
                        this.questText.setFill('#ffff00');
                    }
                }
                
                // Update hearts
                for (let i = 0; i < this.hearts.length; i++) {
                    this.hearts[i].setAlpha(i < gameState.hearts ? 1 : 0.3);
                }
            }
        }

        // Game configuration
        const config = {
            type: Phaser.AUTO,
            width: GAME_W,
            height: GAME_H,
            backgroundColor: '#000000',
            parent: 'game-container',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [BootScene, MenuScene, WorldScene, UIScene],
            pixelArt: true,
            antialias: false,
            roundPixels: true
        };

        // Start the game
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
