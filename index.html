        // Math Encounter Manager
        class MathEncounterManager {
            constructor(scene) {
                this.scene = scene;
                this.isActive = false;
                this.currentProblem = null;
                this.currentAnswer = '';
                this.wrongAttempts = 0;
                this.monster = null;
                this.encounterPanel = null;
                this.panelShadow = null;
                this.problemText = null;
                this.answerText = null;
                this.answerCursor = null;
                this.numpadButtons = [];
                this.messageText = null;
                this.overlay = null;
                this.particleEmitters = [];
                this.numberKeys = null;
                this.backspaceKey = null;
                this.enterKey = null;
                this.mathStreak = 0;
                this.monsterAura = null;
                this.monsterName = null;
                this.streakDisplay = null;
                this.hintBubble = null;
            }

            startEncounter(grassX, grassY) {
                if (this.isActive) return;

                this.isActive = true;
                this.scene.player.setVelocity(0, 0);
                this.scene.isAttacking = false;

                // Generate or select problem
                this.currentProblem = this.generateProblem();
                this.currentAnswer = '';
                this.wrongAttempts = 0;

                // Create encounter UI
                this.createEncounterUI(grassX, grassY);

                // Set up input
                this.setupInput();
            }

            generateProblem() {
                const world = gameState.currentWorld;
                const mathProgress = gameState.mathProgress;
                
                // 60% chance to pick from struggling queue if available
                if (mathProgress.struggling && Object.keys(mathProgress.struggling).length > 0 && Math.random() < 0.6) {
                    const strugglingProblems = Object.keys(mathProgress.struggling);
                    const problemKey = Phaser.Utils.Array.GetRandom(strugglingProblems);
                    return this.parseProblemKey(problemKey);
                }

                // Generate new problem based on world
                let problem;
                switch (world) {
                    case 'meadow': // Addition
                        const a1 = Phaser.Math.Between(1, 9);
                        const b1 = Phaser.Math.Between(1, 9);
                        problem = { a: a1, b: b1, op: '+', answer: a1 + b1, display: `${a1} + ${b1} = ?` };
                        break;

                    case 'riverside': // Subtraction
                        const a2 = Phaser.Math.Between(10, 18);
                        const b2 = Phaser.Math.Between(1, Math.min(9, a2 - 1));
                        problem = { a: a2, b: b2, op: '-', answer: a2 - b2, display: `${a2} - ${b2} = ?` };
                        break;

                    case 'bamboo': // Multiplication
                        const a3 = Phaser.Math.Between(2, 12);
                        const b3 = Phaser.Math.Between(2, 12);
                        problem = { a: a3, b: b3, op: '×', answer: a3 * b3, display: `${a3} × ${b3} = ?` };
                        break;

                    case 'desert': // Division
                        const b4 = Phaser.Math.Between(2, 12);
                        const answer4 = Phaser.Math.Between(2, 12);
                        const a4 = b4 * answer4;
                        problem = { a: a4, b: b4, op: '÷', answer: answer4, display: `${a4} ÷ ${b4} = ?` };
                        break;

                    case 'fortress': // Mixed
                        const operations = ['meadow', 'riverside', 'bamboo', 'desert'];
                        const randomWorld = Phaser.Utils.Array.GetRandom(operations);
                        const tempWorld = gameState.currentWorld;
                        gameState.currentWorld = randomWorld;
                        problem = this.generateProblem();
                        gameState.currentWorld = tempWorld;
                        break;

                    default:
                        problem = { a: 2, b: 3, op: '+', answer: 5, display: '2 + 3 = ?' };
                }

                // Ensure we don't repeat the same problem
                const problemKey = `${problem.a}${problem.op}${problem.b}`;
                if (problemKey === gameState.mathProgress.lastProblem) {
                    // Try again with different numbers
                    return this.generateProblem();
                }

                gameState.mathProgress.lastProblem = problemKey;
                return problem;
            }

            parseProblemKey(key) {
                // Parse "7x8" back into problem object
                const ops = ['+', '-', '×', '÷'];
                let op = null;
                let parts = null;

                for (const o of ops) {
                    if (key.includes(o)) {
                        op = o;
                        parts = key.split(o);
                        break;
                    }
                }

                if (!parts || parts.length !== 2) {
                    return { a: 2, b: 3, op: '+', answer: 5, display: '2 + 3 = ?' };
                }

                const a = parseInt(parts[0]);
                const b = parseInt(parts[1]);
                let answer;

                switch (op) {
                    case '+': answer = a + b; break;
                    case '-': answer = a - b; break;
                    case '×': answer = a * b; break;
                    case '÷': answer = a / b; break;
                }

                return { a, b, op, answer, display: `${a} ${op} ${b} = ?` };
            }

            createEncounterUI(grassX, grassY) {
                // Create background particles first (math symbols floating)
                this.createBackgroundParticles();

                // Dark semi-transparent overlay
                this.overlay = this.scene.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0x000000, 0.7);
                this.overlay.setScrollFactor(0).setDepth(100);

                // Panel shadow (offset dark rectangle behind main panel)
                this.panelShadow = this.scene.add.graphics();
                this.panelShadow.setScrollFactor(0).setDepth(101);
                this.panelShadow.fillStyle(0x000000, 0.8);
                this.panelShadow.fillRoundedRect(GAME_W/2 - 350 + 3, GAME_H/2 - 225 + 3, 700, 450, 15);

                // Encounter panel with rich gradient and golden border
                this.encounterPanel = this.scene.add.graphics();
                this.encounterPanel.setScrollFactor(0).setDepth(102);
                
                // Create gradient effect by layering rectangles
                this.encounterPanel.fillGradientStyle(0x1a1a3a, 0x1a1a3a, 0x2a2a5a, 0x2a2a5a, 1);
                this.encounterPanel.fillRoundedRect(GAME_W/2 - 350, GAME_H/2 - 225, 700, 450, 15);
                
                // Golden outer border
                this.encounterPanel.lineStyle(4, 0xffd700);
                this.encounterPanel.strokeRoundedRect(GAME_W/2 - 350, GAME_H/2 - 225, 700, 450, 15);
                
                // Inner glow effect (lighter border inside)
                this.encounterPanel.lineStyle(2, 0x4444aa, 0.8);
                this.encounterPanel.strokeRoundedRect(GAME_W/2 - 345, GAME_H/2 - 220, 690, 440, 12);

                // Panel entrance animation
                this.encounterPanel.setScale(0.8);
                this.panelShadow.setScale(0.8);
                this.scene.tweens.add({
                    targets: [this.encounterPanel, this.panelShadow],
                    scaleX: 1.0,
                    scaleY: 1.0,
                    duration: 400,
                    ease: 'Back.easeOut'
                });

                // Show streak display if active
                this.createStreakDisplay();

                // Spawn monster with epic presentation
                this.createEpicMonster();

                // Problem text with style
                this.createStyledProblemText();

                // Modern answer input
                this.createModernAnswerInput();

                // Game-style numpad
                this.createGameStyleNumpad();

                // Message text area
                this.messageText = this.scene.add.text(GAME_W/2, GAME_H/2 + 180, '', {
                    fontFamily: 'Nunito',
                    fontSize: '18px',
                    fontWeight: 'bold',
                    fill: '#ff8844',
                    align: 'center'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(105);
            }

            createBackgroundParticles() {
                // Create floating math symbols
                const symbols = ['+', '-', '×', '÷', '=', '?'];
                
                for (let i = 0; i < 15; i++) {
                    const symbol = Phaser.Utils.Array.GetRandom(symbols);
                    const particle = this.scene.add.text(
                        Phaser.Math.Between(0, GAME_W), 
                        Phaser.Math.Between(0, GAME_H),
                        symbol,
                        {
                            fontSize: '24px',
                            fill: '#333366',
                            alpha: 0.3
                        }
                    );
                    particle.setScrollFactor(0).setDepth(99);
                    
                    // Slow drift animation
                    this.scene.tweens.add({
                        targets: particle,
                        x: particle.x + Phaser.Math.Between(-100, 100),
                        y: particle.y + Phaser.Math.Between(-50, 50),
                        duration: Phaser.Math.Between(8000, 12000),
                        repeat: -1,
                        yoyo: true,
                        ease: 'Sine.easeInOut'
                    });
                    
                    this.particleEmitters.push(particle);
                }
            }

            createStreakDisplay() {
                if (gameState.streak > 1) {
                    let streakColor = '#ff8844';
                    if (gameState.streak >= 10) streakColor = '#aa44ff';
                    else if (gameState.streak >= 5) streakColor = '#ff4444';
                    
                    this.streakDisplay = this.scene.add.text(GAME_W/2, GAME_H/2 - 280, `🔥 Streak: ${gameState.streak}`, {
                        fontFamily: 'Nunito',
                        fontSize: '28px',
                        fontWeight: 'bold',
                        fill: streakColor,
                        stroke: '#000000',
                        strokeThickness: 2
                    }).setOrigin(0.5).setScrollFactor(0).setDepth(106);
                    
                    // Flame animation
                    this.scene.tweens.add({
                        targets: this.streakDisplay,
                        scaleX: 1.1,
                        scaleY: 1.1,
                        duration: 800,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }
            }

            createEpicMonster() {
                const worldConfig = WORLDS[gameState.currentWorld];
                const monsters = worldConfig.monsters.length > 0 ? worldConfig.monsters : [
                    { sprite: 'slime', name: 'Math Monster' }
                ];
                const monsterData = Phaser.Utils.Array.GetRandom(monsters);
                
                // Glowing aura behind monster
                this.monsterAura = this.scene.add.circle(GAME_W/2, GAME_H/2 - 100, 45, 0x4488ff, 0.4);
                this.monsterAura.setScrollFactor(0).setDepth(103);
                
                // Pulsing aura animation
                this.scene.tweens.add({
                    targets: this.monsterAura,
                    alpha: { from: 0.2, to: 0.6 },
                    scaleX: { from: 0.9, to: 1.1 },
                    scaleY: { from: 0.9, to: 1.1 },
                    duration: 1200,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                // Large monster sprite
                this.monster = this.scene.add.sprite(GAME_W/2, GAME_H/2 - 100, monsterData.sprite + '-idle', 0);
                this.monster.setScrollFactor(0).setDepth(104);
                this.monster.play(monsterData.sprite + '-idle-down');
                this.monster.setScale(5); // Much larger!

                // Monster entrance animation with dramatic bounce
                this.monster.setScale(0);
                this.scene.tweens.add({
                    targets: this.monster,
                    scaleX: 5,
                    scaleY: 5,
                    duration: 500,
                    ease: 'Back.easeOut'
                });

                // Subtle idle bob animation
                this.scene.tweens.add({
                    targets: this.monster,
                    y: GAME_H/2 - 105,
                    duration: 2000,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                // Monster name display
                this.monsterName = this.scene.add.text(GAME_W/2, GAME_H/2 - 50, monsterData.name, {
                    fontFamily: 'Nunito',
                    fontSize: '24px',
                    fontWeight: 'bold',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5).setScrollFactor(0).setDepth(104);

                // Create sparkle effects around monster
                this.createMonsterSparkles();
            }

            createMonsterSparkles() {
                for (let i = 0; i < 8; i++) {
                    const sparkle = this.scene.add.text(
                        GAME_W/2 + Phaser.Math.Between(-60, 60),
                        GAME_H/2 - 100 + Phaser.Math.Between(-60, 60),
                        '✨',
                        { fontSize: '16px', alpha: 0.7 }
                    );
                    sparkle.setScrollFactor(0).setDepth(103);
                    
                    this.scene.tweens.add({
                        targets: sparkle,
                        alpha: { from: 0.3, to: 0.9 },
                        scaleX: { from: 0.8, to: 1.2 },
                        scaleY: { from: 0.8, to: 1.2 },
                        duration: Phaser.Math.Between(1500, 2500),
                        yoyo: true,
                        repeat: -1,
                        delay: i * 200
                    });
                    
                    this.particleEmitters.push(sparkle);
                }
            }

            createStyledProblemText() {
                // Split the problem to style the "= ?" part differently
                const parts = this.currentProblem.display.split(' = ');
                const mathPart = parts[0];
                const questionPart = '= ?';
                
                // Main problem text (huge and bold)
                this.problemText = this.scene.add.text(GAME_W/2, GAME_H/2 + 20, mathPart, {
                    fontFamily: 'Nunito',
                    fontSize: '56px',
                    fontWeight: '900',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setScrollFactor(0).setDepth(104);

                // "= ?" part in gold/yellow
                this.questionPartText = this.scene.add.text(GAME_W/2 + 80, GAME_H/2 + 20, questionPart, {
                    fontFamily: 'Nunito',
                    fontSize: '56px',
                    fontWeight: '900',
                    fill: '#ffd700',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(104);

                // Pulse animation on problem text
                this.scene.tweens.add({
                    targets: [this.problemText, this.questionPartText],
                    scaleX: 1.05,
                    scaleY: 1.05,
                    duration: 1500,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            }

            createModernAnswerInput() {

                this.answerBg = this.scene.add.graphics();
                this.answerBg.setScrollFactor(0).setDepth(103);
                this.answerBg.fillStyle(0x2a2a4a);
                this.answerBg.fillRoundedRect(GAME_W/2 - 60, GAME_H/2 + 65, 120, 50, 8);
                this.answerBg.lineStyle(3, 0x00ff88);
                this.answerBg.strokeRoundedRect(GAME_W/2 - 60, GAME_H/2 + 65, 120, 50, 8);

                // Answer text (bright green on dark)
                this.answerText = this.scene.add.text(GAME_W/2, GAME_H/2 + 90, '___', {
                    fontFamily: 'Nunito',
                    fontSize: '36px',
                    fontWeight: 'bold',
                    fill: '#00ff88'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(104);

                // Blinking cursor
                this.answerCursor = this.scene.add.text(GAME_W/2 + 30, GAME_H/2 + 90, '|', {
                    fontFamily: 'Nunito',
                    fontSize: '36px',
                    fontWeight: 'bold',
                    fill: '#00ff88'
                }).setOrigin(0.5).setScrollFactor(0).setDepth(104);

                // Cursor blink animation
                this.scene.tweens.add({
                    targets: this.answerCursor,
                    alpha: { from: 0, to: 1 },

            createGameStyleNumpad() {
                const startX = GAME_W/2 - 90;
                const startY = GAME_H/2 + 140;
                const buttonSize = 60;
                const spacing = 70;

                // Button layout
                const layout = [
                    ['1', '2', '3'],
                    ['4', '5', '6'],
                    ['7', '8', '9'],
                    ['←', '0', '✓']
                ];

                layout.forEach((row, rowIndex) => {
                    row.forEach((label, colIndex) => {
                        const x = startX + colIndex * spacing;
                        const y = startY + rowIndex * spacing;

                        // Button color scheme
                        let topColor, bottomColor;
                        if (label >= '0' && label <= '9') {
                            // Number buttons: blue/teal gradient
                            topColor = 0x4488ff;
                            bottomColor = 0x2266cc;
                        } else if (label === '←') {
                            // Backspace: orange/red gradient
                            topColor = 0xff8844;
                            bottomColor = 0xcc4422;
                        } else if (label === '✓') {
                            // Submit: bright green gradient
                            topColor = 0x44ff44;
                            bottomColor = 0x22cc22;
                        }

                        // Button background with 3D effect
                        const button = this.scene.add.graphics();
                        button.setScrollFactor(0).setDepth(103);
                        
                        // Create gradient effect and 3D depth
                        button.fillGradientStyle(topColor, topColor, bottomColor, bottomColor, 1);
                        button.fillRoundedRect(x - buttonSize/2, y - buttonSize/2, buttonSize, buttonSize, 8);
                        
                        // Darker bottom edge for 3D effect
                        button.fillStyle(bottomColor * 0.7);
                        button.fillRoundedRect(x - buttonSize/2, y - buttonSize/2 + 2, buttonSize, buttonSize - 2, 8);
                        
                        // Top surface
                        button.fillGradientStyle(topColor, topColor, bottomColor, bottomColor, 1);
                        button.fillRoundedRect(x - buttonSize/2, y - buttonSize/2, buttonSize, buttonSize - 4, 8);
                        
                        // Border
                        button.lineStyle(2, 0x000000, 0.5);
                        button.strokeRoundedRect(x - buttonSize/2, y - buttonSize/2, buttonSize, buttonSize, 8);

                        // Button text
                        const text = this.scene.add.text(x, y - 2, label, {
                            fontFamily: 'Nunito',
                            fontSize: '28px',
                            fontWeight: 'bold',
                            fill: '#ffffff',
                            stroke: '#000000',
                            strokeThickness: 2
                        }).setOrigin(0.5).setScrollFactor(0).setDepth(104);

                        // Interactive area
                        const hitArea = this.scene.add.rectangle(x, y, buttonSize, buttonSize);
                        hitArea.setScrollFactor(0).setDepth(105).setVisible(false).setInteractive();

                        // Store button data
                        const buttonData = { 
                            button, text, hitArea, x, y, buttonSize, 
                            label, topColor, bottomColor,
                            isPressed: false
                        };

                        // Button interactions
                        hitArea.on('pointerdown', () => {
                            if (buttonData.isPressed) return;
                            this.handleNumpadInput(label);
                            this.animateButtonPress(buttonData);
                        });

                        hitArea.on('pointerover', () => {
                            if (!buttonData.isPressed) {
                                this.animateButtonHover(buttonData, true);
                            }
                        });

                        hitArea.on('pointerout', () => {
                            if (!buttonData.isPressed) {
                                this.animateButtonHover(buttonData, false);
                            }
                        });

                        this.numpadButtons.push(buttonData);
                    });
                });
            }

            animateButtonPress(buttonData) {
                buttonData.isPressed = true;
                
                // Button shifts down and gets darker
                this.scene.tweens.add({
                    targets: [buttonData.button, buttonData.text],
                    y: buttonData.y + 2,
                    scaleX: 0.95,
                    scaleY: 0.95,
                    duration: 100,
                    onComplete: () => {
                        // Return to normal
                        this.scene.tweens.add({
                            targets: [buttonData.button, buttonData.text],
                            y: buttonData.y,
                            scaleX: 1,
                            scaleY: 1,
                            duration: 100,
                            onComplete: () => {
                                buttonData.isPressed = false;
                            }
                        });
                    }
                });
            }

            animateButtonHover(buttonData, isHover) {
                const scale = isHover ? 1.05 : 1.0;
                const brightness = isHover ? 1.2 : 1.0;
                
                this.scene.tweens.add({
                    targets: [buttonData.button, buttonData.text],
                    scaleX: scale,
                    scaleY: scale,
                    duration: 150
                });
                
                if (isHover) {
                    buttonData.button.setTint(0xffffff * brightness);
                } else {
                    buttonData.button.clearTint();
                }
            }

            setupInput() {
                // Number keys 0-9
                this.numberKeys = [];
                for (let i = 0; i <= 9; i++) {
                    const key = this.scene.input.keyboard.addKey('DIGIT' + i);
                    key.on('down', () => this.handleNumpadInput(i.toString()));
                    this.numberKeys.push(key);
                }

                // Backspace
                this.backspaceKey = this.scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.BACKSPACE);
                this.backspaceKey.on('down', () => this.handleNumpadInput('←'));

                // Enter
                this.enterKey = this.scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
                this.enterKey.on('down', () => this.handleNumpadInput('✓'));
            }

            handleNumpadInput(input) {
                if (!this.isActive) return;

                if (input === '←') {
                    // Backspace
                    this.currentAnswer = this.currentAnswer.slice(0, -1);
                } else if (input === '✓') {
                    // Submit
                    this.submitAnswer();
                    return;
                } else if (input >= '0' && input <= '9') {
                    // Number input (max 3 digits)
                    if (this.currentAnswer.length < 3) {
                        this.currentAnswer += input;
                        
                        // Scale-in animation for new number
                        this.answerText.setScale(1.2);
                        this.scene.tweens.add({
                            targets: this.answerText,
                            scaleX: 1,
                            scaleY: 1,
                            duration: 200,
                            ease: 'Back.easeOut'
                        });
                    }
                }

                // Update answer display
                this.answerText.setText(this.currentAnswer || '___');
                
                // Update cursor position
                const textWidth = this.currentAnswer ? this.answerText.getBounds().width : 0;
                this.answerCursor.x = GAME_W/2 + textWidth/2 + 10;
            }

            submitAnswer() {
                const playerAnswer = parseInt(this.currentAnswer);
                const correctAnswer = this.currentProblem.answer;
                const problemKey = `${this.currentProblem.a}${this.currentProblem.op}${this.currentProblem.b}`;

                if (playerAnswer === correctAnswer) {
                    this.handleCorrectAnswer(problemKey);
                } else {
                    this.handleWrongAnswer(problemKey);
                }
            }

            handleCorrectAnswer(problemKey) {
                // Create screen border flash effect
                const flash = this.scene.add.rectangle(GAME_W/2, GAME_H/2, GAME_W + 20, GAME_H + 20, 0x00ff00);
                flash.setScrollFactor(0).setDepth(110).setAlpha(0);
                flash.setStrokeStyle(10, 0x00ff00);
                
                this.scene.tweens.add({
                    targets: flash,
                    alpha: { from: 0, to: 0.4 },
                    duration: 150,
                    yoyo: true,
                    repeat: 1,
                    onComplete: () => flash.destroy()
                });

                // BIG "CORRECT!" message with rainbow gradient effect
                const correctMsg = this.scene.add.text(GAME_W/2, GAME_H/2 - 30, '✓ CORRECT!', {
                    fontFamily: 'Nunito',
                    fontSize: '48px',
                    fontWeight: '900',
                    fill: '#ffd700',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setScrollFactor(0).setDepth(107);

                // Make text appear with scale animation
                correctMsg.setScale(0);
                this.scene.tweens.add({
                    targets: correctMsg,
                    scaleX: 1.2,
                    scaleY: 1.2,
                    duration: 300,
                    ease: 'Back.easeOut',
                    onComplete: () => {
                        this.scene.tweens.add({
                            targets: correctMsg,
                            scaleX: 1,
                            scaleY: 1,
                            duration: 200
                        });
                    }
                });

                // Color cycling effect for correct message
                let colorIndex = 0;
                const rainbowColors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];
                const colorTimer = this.scene.time.addEvent({
                    delay: 150,
                    callback: () => {
                        correctMsg.setFill(rainbowColors[colorIndex % rainbowColors.length]);
                        colorIndex++;
                    },
                    repeat: 10
                });

                // Monster dramatic death animation
                this.scene.tweens.add({
                    targets: this.monster,
                    scaleX: 0,
                    scaleY: 0,
                    rotation: 6.28, // Full spin
                    alpha: 0,
                    duration: 800,
                    ease: 'Power2.easeIn'
                });

                // Aura disappears
                if (this.monsterAura) {
                    this.scene.tweens.add({
                        targets: this.monsterAura,
                        scaleX: 2,
                        scaleY: 2,
                        alpha: 0,
                        duration: 600
                    });
                }

                // Award XP and show it
                this.mathStreak++;
                const xpGained = 15 + (this.mathStreak * 5);
                gameState.xp += xpGained;

                // Check for level up
                const newLevel = Math.floor(gameState.xp / 100) + 1;
                if (newLevel > gameState.level) {
                    gameState.level = newLevel;
                }

                // Floating XP text with upward drift
                const xpText = this.scene.add.text(GAME_W/2, GAME_H/2 - 140, `+${xpGained} XP`, {
                    fontFamily: 'Nunito',
                    fontSize: '32px',
                    fontWeight: 'bold',
                    fill: '#00aa00',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5).setScrollFactor(0).setDepth(107);

                this.scene.tweens.add({
                    targets: xpText,
                    y: GAME_H/2 - 200,
                    alpha: 0,
                    scaleX: 1.5,
                    scaleY: 1.5,
                    duration: 2000,
                    ease: 'Power2.easeOut',
                    onComplete: () => xpText.destroy()
                });

                // Coin explosion effect
                this.createCoinExplosion();

                // Update math progress
                const mathProgress = gameState.mathProgress;
                if (!mathProgress.mastered[problemKey]) {
                    mathProgress.mastered[problemKey] = { correct: 0, lastSeen: Date.now() };
                }
                mathProgress.mastered[problemKey].correct++;
                mathProgress.mastered[problemKey].lastSeen = Date.now();

                // Remove from struggling if mastered (3 correct)
                if (mathProgress.mastered[problemKey].correct >= 3) {
                    delete mathProgress.struggling[problemKey];
                } else if (mathProgress.struggling[problemKey]) {
                    delete mathProgress.struggling[problemKey];
                }

                // Spawn extra coins in the world
                const coinCount = Phaser.Math.Between(3, 5);
                this.scene.time.delayedCall(600, () => {
                    for (let i = 0; i < coinCount; i++) {
                        this.scene.time.delayedCall(i * 100, () => {
                            const worldX = this.scene.player.x + Phaser.Math.Between(-30, 30);
                            const worldY = this.scene.player.y + Phaser.Math.Between(-30, 30);
                            this.scene.spawnCoin(worldX, worldY);
                        });
                    }
                });

                // Clean up celebration elements and end encounter after delay
                this.scene.time.delayedCall(1500, () => {
                    correctMsg.destroy();
                    this.endEncounter();
                });
            }

            createCoinExplosion() {
                // Create coins that explode outward from the monster
                for (let i = 0; i < 12; i++) {
                    const coin = this.scene.add.text(GAME_W/2, GAME_H/2 - 100, '🪙', {
                        fontSize: '24px'
                    });
                    coin.setScrollFactor(0).setDepth(108);
                    
                    const angle = (i / 12) * Math.PI * 2;
                    const distance = Phaser.Math.Between(80, 150);
                    const targetX = GAME_W/2 + Math.cos(angle) * distance;
                    const targetY = GAME_H/2 - 100 + Math.sin(angle) * distance;
                    
                    this.scene.tweens.add({
                        targets: coin,
                        x: targetX,
                        y: targetY,
                        alpha: 0,
                        scaleX: 2,
                        scaleY: 2,
                        duration: 800,
                        ease: 'Power2.easeOut',
                        delay: i * 50,
                        onComplete: () => coin.destroy()
                    });
                }
            }

            handleWrongAnswer(problemKey) {
                this.wrongAttempts++;
                
                // Gentle shake animation on answer box only
                const originalX = this.answerBg.x;
                this.scene.tweens.add({
                    targets: [this.answerBg, this.answerText, this.answerCursor],
                    x: originalX + 10,
                    duration: 80,
                    yoyo: true,
                    repeat: 2,
                    ease: 'Power2.easeOut'
                });

                // Encouraging messages with emoji
                const encouragingMessages = [
                    "🌟 Almost! Try again!",
                    "✨ So close! One more try!",
                    "💫 You've got this!",
                    "🎯 Think about it..."
                ];

                let message = Phaser.Utils.Array.GetRandom(encouragingMessages);

                // Show hint after 2 wrong attempts in a bubble
                if (this.wrongAttempts >= 2) {
                    this.showHintBubble();
                } else {
                    // Show encouraging message that slides in from bottom
                    const msgText = this.scene.add.text(GAME_W/2, GAME_H + 50, message, {
                        fontFamily: 'Nunito',
                        fontSize: '22px',
                        fontWeight: 'bold',
                        fill: '#ff8844',
                        stroke: '#000000',
                        strokeThickness: 2
                    }).setOrigin(0.5).setScrollFactor(0).setDepth(107);
                    
                    // Slide in from bottom
                    this.scene.tweens.add({
                        targets: msgText,
                        y: GAME_H/2 + 200,
                        duration: 400,
                        ease: 'Back.easeOut',
                        onComplete: () => {
                            this.scene.time.delayedCall(2000, () => {
                                this.scene.tweens.add({
                                    targets: msgText,
                                    y: GAME_H + 50,
                                    alpha: 0,
                                    duration: 300,
                                    onComplete: () => msgText.destroy()
                                });
                            });
                        }
                    });
                }

                // Reset answer
                this.currentAnswer = '';
                this.answerText.setText('___');
                this.answerCursor.x = GAME_W/2 + 30;

                // Update struggling queue
                const mathProgress = gameState.mathProgress;
                if (!mathProgress.struggling[problemKey]) {
                    mathProgress.struggling[problemKey] = { wrong: 0, lastSeen: Date.now() };
                }
                mathProgress.struggling[problemKey].wrong++;
                mathProgress.struggling[problemKey].lastSeen = Date.now();

                // Reset math streak
                this.mathStreak = 0;
            }

            showHintBubble() {
                const hint = this.getHint();
                
                // Create hint bubble
                this.hintBubble = this.scene.add.graphics();
                this.hintBubble.setScrollFactor(0).setDepth(106);
                
                // Bubble background
                this.hintBubble.fillStyle(0xffffcc);
                this.hintBubble.fillRoundedRect(GAME_W/2 - 200, GAME_H/2 + 250, 400, 80, 12);
                this.hintBubble.lineStyle(2, 0xffaa00);
                this.hintBubble.strokeRoundedRect(GAME_W/2 - 200, GAME_H/2 + 250, 400, 80, 12);
                
                // Bubble tail
                this.hintBubble.fillStyle(0xffffcc);
                this.hintBubble.fillTriangle(GAME_W/2 - 10, GAME_H/2 + 250, GAME_W/2 + 10, GAME_H/2 + 250, GAME_W/2, GAME_H/2 + 235);

                // Hint text
                const hintText = this.scene.add.text(GAME_W/2, GAME_H/2 + 290, hint, {
                    fontFamily: 'Nunito',
                    fontSize: '16px',
                    fontStyle: 'italic',
                    fill: '#664400',
                    align: 'center',
                    wordWrap: { width: 380 }
                }).setOrigin(0.5).setScrollFactor(0).setDepth(107);

                // Scale in animation
                this.hintBubble.setScale(0);
                hintText.setScale(0);
                this.scene.tweens.add({
                    targets: [this.hintBubble, hintText],
                    scaleX: 1,
                    scaleY: 1,
                    duration: 300,
                    ease: 'Back.easeOut'
                });

                // Store references for cleanup
                this.hintBubbleElements = [this.hintBubble, hintText];
            }

            getHint() {
                const { a, b, op } = this.currentProblem;
                
                switch (op) {
                    case '+':
                        return `💡 Hint: Count up from ${a}... ${a}, ${a + 1}, ${a + 2}...`;
                    case '-':
                        return `💡 Hint: Start with ${a} and take away ${b}...`;
                    case '×':
                        if (a === b) {
                            return `💡 Hint: ${a} × ${a} = ${a} squared!`;
                        } else if (b <= 5) {
                            return `💡 Hint: ${a} + ${a}` + (b > 2 ? ` + ${a}`.repeat(b - 2) : '') + '...';
                        } else {
                            return `💡 Hint: Think: ${a} × ${b - 1} = ${a * (b - 1)}, plus one more ${a}...`;
                        }
                    case '÷':
                        return `💡 Hint: How many ${b}s fit into ${a}?`;
                    default:
                        return "💡 Think about it...";
                }
            }

            endEncounter() {
                this.isActive = false;
                
                // Clean up input
                if (this.numberKeys) {
                    this.numberKeys.forEach(key => key.destroy());
                    this.numberKeys = null;
                }
                if (this.backspaceKey) {
                    this.backspaceKey.destroy();
                    this.backspaceKey = null;
                }
                if (this.enterKey) {
                    this.enterKey.destroy();
                    this.enterKey = null;
                }

                // Clean up all UI elements
                const elementsToDestroy = [
                    this.overlay, this.panelShadow, this.encounterPanel,
                    this.monster, this.monsterAura, this.monsterName,
                    this.problemText, this.questionPartText,
                    this.answerText, this.answerBg, this.answerCursor,
                    this.messageText, this.streakDisplay
                ];
                
                elementsToDestroy.forEach(element => {
                    if (element) element.destroy();
                });
                
                // Clean up particles and effects
                this.particleEmitters.forEach(particle => particle.destroy());
                this.particleEmitters = [];
                
                // Clean up numpad buttons
                this.numpadButtons.forEach(btn => {
                    btn.button.destroy();
                    btn.text.destroy();
                    btn.hitArea.destroy();
                });
                this.numpadButtons = [];

                // Clean up hint bubble
                if (this.hintBubbleElements) {
                    this.hintBubbleElements.forEach(element => element.destroy());
                    this.hintBubbleElements = null;
                }

                // Update UI
                this.scene.events.emit('updateUI');

                // Reset player state
                this.scene.player.play('hiro-idle-' + this.scene.facing);
            }
        }

        // BootScene - Asset loading with fallbacks

            create() {
                console.log('BootScene.create — failed keys:', [...this._failedKeys]);
                
                // Copy monster walk textures to idle (monsters use same file for both)
                const monsterNames = ['slime', 'fish', 'mushroom', 'larva', 'lizard', 'snake', 'dragon'];
                monsterNames.forEach(name => {
                    try {
                        if (!this._failedKeys.has(name + '-walk')) {
                            const walkTex = this.textures.get(name + '-walk');
                            if (walkTex && walkTex.key !== '__MISSING') {
                                this.textures.addSpriteSheet(name + '-idle', walkTex.getSourceImage(), {frameWidth: 16, frameHeight: 16});
                                console.log('Created', name + '-idle from walk');
                            }
                        }
                    } catch(e) {
                        console.warn('Failed to create idle for', name, e.message);
                        this._failedKeys.add(name + '-idle');
                    }
                });
                
                // Create fallback textures (these are never loaded from files)
                const g = this.make.graphics({x:0,y:0,add:false});
                
                g.fillStyle(0x3a8c3a).fillRect(0,0,16,16); g.generateTexture('grass-tile',16,16); g.clear();
                g.fillStyle(0x8b7355).fillRect(0,0,16,16); g.generateTexture('dirt-tile',16,16); g.clear();
                g.fillStyle(0x2a2a2a).fillRect(0,0,16,16); g.generateTexture('wall-tile',16,16); g.clear();
                g.fillStyle(0x1a4a1a).fillRect(0,0,16,16).fillStyle(0x4a2c1a).fillRect(6,8,4,8); g.generateTexture('tree-tile',16,16); g.clear();
                g.fillStyle(0x4a9c4a).fillRect(4,2,8,12); g.generateTexture('tall-grass',16,16); g.clear();
                g.fillStyle(0xffd700).fillCircle(8,8,6); g.generateTexture('coin',16,16); g.clear();
                g.fillStyle(0x4444ff).fillRect(0,0,16,16); g.generateTexture('water-tile',16,16); g.clear();
                g.fillStyle(0xffdd44).fillRect(0,0,16,16); g.generateTexture('sand-tile',16,16); g.clear();
                g.fillStyle(0x666666).fillRect(0,0,16,16); g.generateTexture('stone-tile',16,16); g.clear();
                
                // Portal texture
                g.fillGradientStyle(0xff4444, 0xff4444, 0xff0000, 0xff0000, 1);
                g.fillRect(0,0,16,16); g.generateTexture('portal-tile',16,16); g.clear();
                
                // Particle fallbacks (only if real ones failed)
                if (this._failedKeys.has('particle-grass')) {
                    g.fillStyle(0x4a9c4a).fillCircle(4,4,3); g.generateTexture('particle-grass',8,8); g.clear();
                }
                if (this._failedKeys.has('particle-spark')) {
                    g.fillStyle(0xffff00).fillCircle(4,4,3); g.generateTexture('particle-spark',8,8); g.clear();
                }
                
                // Character spritesheet fallbacks
                this.createFallbackSprites(g);
                
                g.destroy();
                
                console.log('BootScene: textures ready, starting MenuScene');
                this.scene.start('MenuScene');
            }
            
            createFallbackSprites(g) {
                const characters = ['hiro', 'villager', 'villager2', 'oldman', 'skeleton'];
                const monsters = ['slime', 'fish', 'mushroom', 'larva', 'lizard', 'snake', 'dragon'];
                
                [...characters, ...monsters].forEach(sprite => {
                    // Walk fallback (64x64, 4x4 frames)
                    if (this._failedKeys.has(sprite + '-walk')) {
                        g.clear();
                        for (let row = 0; row < 4; row++) {
                            for (let col = 0; col < 4; col++) {
                                const color = sprite === 'hiro' ? 0x00ff00 : (characters.includes(sprite) ? 0x4444ff : 0xff4444);
                                g.fillStyle(color).fillRect(col*16+4, row*16+4, 8, 8)
                                 .fillStyle(0x000000).fillRect(col*16+6, row*16+5, 4, 2);
                            }
                        }
                        g.generateTexture(sprite + '-walk-img', 64, 64); g.clear();
                        this.textures.addSpriteSheet(sprite + '-walk',
                            this.textures.get(sprite + '-walk-img').getSourceImage(),
                            { frameWidth: 16, frameHeight: 16 });
                    }
                    
                    // Idle fallback (64x16, 4 frames)
                    if (this._failedKeys.has(sprite + '-idle')) {
                        g.clear();
                        for (let col = 0; col < 4; col++) {
                            const color = sprite === 'hiro' ? 0x00ff00 : (characters.includes(sprite) ? 0x4444ff : 0xff4444);
                            g.fillStyle(color).fillRect(col*16+4, 4, 8, 8)
                             .fillStyle(0x000000).fillRect(col*16+6, 5, 4, 2);
                        }
                        g.generateTexture(sprite + '-idle-img', 64, 16); g.clear();
                        this.textures.addSpriteSheet(sprite + '-idle',
                            this.textures.get(sprite + '-idle-img').getSourceImage(),
                            { frameWidth: 16, frameHeight: 16 });
                    }
                    
                    // Attack fallback for hiro only
                    if (sprite === 'hiro' && this._failedKeys.has('hiro-attack')) {
                        g.clear();
                        for (let col = 0; col < 4; col++) {
                            g.fillStyle(0x00ff00).fillRect(col*16+4, 4, 8, 8)
                             .fillStyle(0xffffff).fillRect(col*16+2, 2, 12, 2);
                        }
                        g.generateTexture('hiro-attack-img', 64, 16); g.clear();
                        this.textures.addSpriteSheet('hiro-attack',
                            this.textures.get('hiro-attack-img').getSourceImage(),
                            { frameWidth: 16, frameHeight: 16 });
                    }
                });
            }
        }
