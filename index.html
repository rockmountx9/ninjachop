        var muteSelf = this;
        muteBtn.on('pointerup', function() {
            gameMuted = !gameMuted;
            muteSelf.sound.mute = gameMuted;
            muteLabel.setText(gameMuted ? '\u{1F507}' : '\u{1F50A}');
            muteBtn.setFillStyle(0x000000, gameMuted ? 0.5 : 0.3);
        });
    }

    makeButton(x, y, label, color, cb) {
        var bg = this.add.rectangle(x, y, 260, 56, color, 1).setOrigin(0.5).setInteractive({ useHandCursor: true });
        bg.setStrokeStyle(2, 0xffffff, 0.3);
        this.add.text(x, y, label, { fontFamily: 'Nunito', fontSize: '26px', fontStyle: '800', color: '#ffffff' }).setOrigin(0.5);
        bg.on('pointerover', function() { bg.setScale(1.05); });
        bg.on('pointerout', function() { bg.setScale(1.0); });
        bg.on('pointerup', cb);
    }

    startQuest() {
        gameState.ninjaCode = generateNinjaCode();
        gameState.coins = 0; gameState.hearts = 5; gameState.grassCut = 0;
        gameState.streak = 0; gameState.bestCombo = 0; gameState.currentLand = 1;
        gameState.totalProblems = 0; gameState.totalCorrect = 0;
        gameState.inventory = []; gameState.land1Complete = false;
        gameState.hasShield = false; gameState.hasHint = false; gameState.hasDungeonKey = false;
        this.showCodeScreen(gameState.ninjaCode);
    }

    showCodeScreen(code) {
        var w = this.scale.width, h = this.scale.height, self = this;
        var overlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0.7).setDepth(100).setInteractive();
        var panel = this.add.rectangle(w/2, h/2, 380, 260, 0x16213e).setDepth(101).setStrokeStyle(3, COLORS.gold);

        this.add.text(w/2, h/2-90, 'YOUR NINJA CODE', {
            fontFamily: 'Nunito', fontSize: '24px', fontStyle: '800', color: '#f5c842'
        }).setOrigin(0.5).setDepth(102);

        this.add.text(w/2, h/2-55, 'Write this down!', {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '600', color: '#aaaacc'
        }).setOrigin(0.5).setDepth(102);

        var codeText = this.add.text(w/2, h/2, code, {
            fontFamily: 'Nunito', fontSize: '34px', fontStyle: '900',
            color: '#ffffff', stroke: '#e94560', strokeThickness: 3,
            backgroundColor: '#0a0a1e', padding: { x: 16, y: 8 }
        }).setOrigin(0.5).setDepth(102);

        this.tweens.add({ targets: codeText, scaleX: 1.05, scaleY: 1.05, duration: 800, yoyo: true, repeat: -1 });

        var goBtn = this.add.rectangle(w/2, h/2+90, 160, 44, COLORS.green).setDepth(102).setInteractive({ useHandCursor: true });
        this.add.text(w/2, h/2+90, "LET'S GO!", {
            fontFamily: 'Nunito', fontSize: '22px', fontStyle: '800', color: '#ffffff'
        }).setOrigin(0.5).setDepth(103);

        goBtn.on('pointerup', function() {
            try { if (self.menuMusic) self.menuMusic.stop(); } catch(e) {}
            self.scene.start('PrologueScene');
        });
    }

    showCodeInput() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.codeText = '';

        var overlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0.7).setDepth(100).setInteractive();
        this.add.rectangle(w/2, h/2-40, 380, 200, 0x16213e).setDepth(101).setStrokeStyle(3, COLORS.gold);

        this.add.text(w/2, h/2-120, 'ENTER NINJA CODE', {
            fontFamily: 'Nunito', fontSize: '24px', fontStyle: '800', color: '#f5c842'
        }).setOrigin(0.5).setDepth(102);

        var display = this.add.text(w/2, h/2-60, '|', {
            fontFamily: 'Nunito', fontSize: '28px', fontStyle: '800', color: '#ffffff',
            backgroundColor: '#0a0a1e', padding: { x: 16, y: 8 }
        }).setOrigin(0.5).setDepth(102);

        var errText = this.add.text(w/2, h/2-20, '', {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#ef4444'
        }).setOrigin(0.5).setDepth(102);

        // GO button
        var goBtn = this.add.rectangle(w/2-70, h/2+30, 120, 44, COLORS.green).setDepth(102).setInteractive({ useHandCursor: true });
        this.add.text(w/2-70, h/2+30, 'ENTER', { fontFamily: 'Nunito', fontSize: '22px', fontStyle: '800', color: '#fff' }).setOrigin(0.5).setDepth(103);

        // BACK button
        var backBtn = this.add.rectangle(w/2+70, h/2+30, 120, 44, 0x444466).setDepth(102).setInteractive({ useHandCursor: true });
        this.add.text(w/2+70, h/2+30, 'BACK', { fontFamily: 'Nunito', fontSize: '22px', fontStyle: '700', color: '#aaa' }).setOrigin(0.5).setDepth(103);

        backBtn.on('pointerup', function() { self.scene.restart(); });

        goBtn.on('pointerup', function() {
            var code = self.codeText.trim();
            if (/^[A-Z]+-[A-Z]+-\d{4}$/.test(code)) {
                gameState.ninjaCode = code;
                gameState.coins = 0; gameState.hearts = 5; gameState.grassCut = 0;
                gameState.streak = 0; gameState.bestCombo = 0; gameState.currentLand = 1;
                gameState.totalProblems = 0; gameState.totalCorrect = 0;
                gameState.inventory = []; gameState.land1Complete = false;
                gameState.hasShield = false; gameState.hasHint = false; gameState.hasDungeonKey = false;
                try { if (self.menuMusic) self.menuMusic.stop(); } catch(e) {}
                self.scene.start('WorldScene');
            } else {
                errText.setText('Try: WORD-WORD-1234');
            }
        });

        this.input.keyboard.on('keydown', function(event) {
            if (event.key === 'Backspace') self.codeText = self.codeText.slice(0,-1);
            else if (event.key === 'Enter') goBtn.emit('pointerup');
            else if (event.key.length === 1 && self.codeText.length < 20) self.codeText += event.key.toUpperCase();
            display.setText(self.codeText + '|');
        });
    }
}

// ============================================================
// WORLD SCENE
// ============================================================
class WorldScene extends Phaser.Scene {
    constructor() { super({ key: 'WorldScene' }); }

    init(data) {
        this.sceneData = data || {};
    }

    create() {
        var T = 48, COLS = 20, ROWS = 20;
        this.T = T; this.COLS = COLS; this.ROWS = ROWS;
        this.facing = 'down'; this.isAttacking = false;
        this.grassSprites = {};
        this.dialogActive = false;
        this.dialogGroup = null;
        this.npcSprites = [];

        // QuickBattle state
        this.quickBattleActive = false;
        this.quickBattleContainer = null;
        this.qbTypedAnswer = '';
        this.qbShowingAnswer = false;
        this.encounterImmunity = false;

        // Overworld enemies + chickens
        this.owEnemies = [];
        this.chickens = [];
        this.chickenStreak = 0;

        // Load config for current land
        var landConfig = LAND_CONFIGS[gameState.currentLand];
        this.landConfig = landConfig;
        this.npcData = landConfig.npcData;
        this.cameras.main.setBackgroundColor(Phaser.Display.Color.IntegerToColor(landConfig.colors.groundA).rgba);
        var colors = landConfig.colors;

        var worldW = COLS * T, worldH = ROWS * T;
        this.physics.world.setBounds(0, 0, worldW, worldH);

        // Copy map layout from config (don't mutate original)
        this.map = [];
        var r, c, i;
        for (r = 0; r < ROWS; r++) {
            this.map[r] = [];
            for (c = 0; c < COLS; c++) this.map[r][c] = landConfig.mapLayout[r][c];
        }

        // Fill remaining ground (0) with grass (1) based on density
        var density = landConfig.grassDensity;
        for (r = 1; r < ROWS-1; r++)
            for (c = 1; c < COLS-1; c++)
                if (this.map[r][c] === 0 && Math.random() < density) this.map[r][c] = 1;

        // Clear spawn area (3x3 around spawn)
        var sp = landConfig.spawnPos;
        for (r = sp.r-1; r <= sp.r+1; r++) for (c = sp.c-1; c <= sp.c+1; c++) {
            if (r < 1 || r >= ROWS-1 || c < 1 || c >= COLS-1) continue;
            if (this.map[r][c] === 6 || this.map[r][c] === 4 || this.map[r][c] === 7 || this.map[r][c] === 8 || this.map[r][c] === 9) continue;
            this.map[r][c] = 0;
        }

        // === RENDER ===
        var gfx = this.add.graphics().setDepth(0);
        var treeGfx = this.add.graphics().setDepth(3);

        for (r = 0; r < ROWS; r++) {
            for (c = 0; c < COLS; c++) {
                var x = c*T, y = r*T, cx = x+T/2, cy = y+T/2;
                var tile = this.map[r][c];

                var baseGreen = (r+c) % 2 === 0 ? colors.groundA : colors.groundB;
                gfx.fillStyle(baseGreen, 1);
                gfx.fillRect(x, y, T, T);

                if (tile === 4) {
                    gfx.fillStyle(colors.path, 1); gfx.fillRect(x+2, y+2, T-4, T-4);
                    gfx.fillStyle(colors.pathInner, 0.4); gfx.fillRect(x+8, y+8, T-16, T-16);
                } else if (tile === 2) {
                    treeGfx.fillStyle(colors.treeTrunk, 1); treeGfx.fillRect(cx-6, cy+4, 12, 20);
                    treeGfx.fillStyle(colors.treeLeaf, 1); treeGfx.fillCircle(cx, cy-6, 20);
                    treeGfx.fillStyle(colors.treeHighlight, 0.4); treeGfx.fillCircle(cx-5, cy-10, 10);
                } else if (tile === 3) {
                    gfx.fillStyle(colors.water, 0.85); gfx.fillRect(x, y, T, T);
                    gfx.fillStyle(colors.waterShine, 0.3); gfx.fillRect(x+12, y+8, 20, 10);
                } else if (tile === 5) {
                    gfx.fillStyle(colors.houseBrown, 1); gfx.fillRect(cx-20, cy-12, 40, 32);
                    gfx.fillStyle(colors.roofRed, 1);
                    gfx.fillTriangle(cx-24, cy-12, cx, cy-30, cx+24, cy-12);
                    gfx.fillStyle(0x4a2a0a, 1); gfx.fillRect(cx-5, cy+6, 10, 14);
                    gfx.fillStyle(0x87ceeb, 1); gfx.fillRect(cx-16, cy-4, 8, 8);
                    gfx.fillRect(cx+8, cy-4, 8, 8);
                } else if (tile === 7) {
                    gfx.fillStyle(0x111111, 1); gfx.fillRect(x+4, y+4, T-8, T-8);
                    gfx.fillStyle(0x333333, 1); gfx.fillRect(x+2, y, T-4, 6);
                    gfx.fillRect(x+2, y, 6, T); gfx.fillRect(x+T-8, y, 6, T);
                    gfx.fillStyle(0xcccccc, 1); gfx.fillCircle(cx, cy-6, 8);
                    gfx.fillStyle(0x111111, 1); gfx.fillCircle(cx-3, cy-7, 2); gfx.fillCircle(cx+3, cy-7, 2);
                    gfx.fillStyle(0x111111, 1); gfx.fillRect(cx-4, cy-2, 8, 2);
                    gfx.fillStyle(0x8800ff, 0.15); gfx.fillRect(x-4, y-4, T+8, T+8);
                } else if (tile === 8) {
                    // Trap tile — themed per land
                    var tt = landConfig.trapTheme;
                    var tc1 = Phaser.Display.Color.HexStringToColor(tt.color1).color;
                    var tc2 = Phaser.Display.Color.HexStringToColor(tt.color2).color;
                    var tgc = Phaser.Display.Color.HexStringToColor(tt.glowColor).color;
                    if (tt.name === 'thorns') {
                        gfx.fillStyle(tc1, 1); gfx.fillRect(x+6, y+6, T-12, T-12);
                        gfx.fillStyle(tc2, 1);
                        gfx.fillTriangle(cx-10, cy+8, cx-6, cy-8, cx-2, cy+8);
                        gfx.fillTriangle(cx+2, cy+8, cx+6, cy-10, cx+10, cy+8);
                        gfx.fillTriangle(cx-6, cy+4, cx, cy-12, cx+6, cy+4);
                        gfx.fillStyle(tgc, 0.3); gfx.fillCircle(cx, cy, 18);
                    } else if (tt.name === 'whirlpool') {
                        gfx.fillStyle(tc2, 0.8); gfx.fillCircle(cx, cy, 20);
                        gfx.fillStyle(tc1, 0.6); gfx.fillCircle(cx, cy, 14);
                        gfx.fillStyle(tgc, 0.5); gfx.fillCircle(cx, cy, 8);
                        gfx.fillStyle(0xffffff, 0.3); gfx.fillCircle(cx, cy, 3);
                    } else if (tt.name === 'spikes') {
                        gfx.fillStyle(0x222211, 1); gfx.fillRect(x+4, y+4, T-8, T-8);
                        gfx.fillStyle(tc2, 1);
                        gfx.fillTriangle(cx-12, cy+10, cx-8, cy-6, cx-4, cy+10);
                        gfx.fillTriangle(cx-4, cy+10, cx, cy-8, cx+4, cy+10);
                        gfx.fillTriangle(cx+4, cy+10, cx+8, cy-6, cx+12, cy+10);
                        gfx.fillStyle(tc1, 1);
                        gfx.fillTriangle(cx-8, cy+10, cx-4, cy-4, cx, cy+10);
                        gfx.fillStyle(tgc, 0.25); gfx.fillCircle(cx, cy, 16);
                    } else if (tt.name === 'fire') {
                        gfx.fillStyle(0x333333, 1); gfx.fillRect(x+4, y+4, T-8, T-8);
                        gfx.fillStyle(tc1, 0.9);
                        gfx.fillTriangle(cx-8, cy+12, cx, cy-14, cx+8, cy+12);
                        gfx.fillStyle(tc2, 0.8);
                        gfx.fillTriangle(cx-5, cy+12, cx, cy-6, cx+5, cy+12);
                        gfx.fillTriangle(cx-12, cy+10, cx-6, cy-4, cx, cy+10);
                        gfx.fillTriangle(cx, cy+10, cx+6, cy-4, cx+12, cy+10);
                        gfx.fillStyle(tgc, 0.35); gfx.fillCircle(cx, cy, 18);
                    } else if (tt.name === 'lava') {
                        gfx.fillStyle(tgc, 1); gfx.fillRect(x+4, y+4, T-8, T-8);
                        gfx.fillStyle(tc1, 0.8); gfx.fillCircle(cx, cy, 16);
                        gfx.fillStyle(tc2, 0.6); gfx.fillCircle(cx-4, cy+2, 8);
                        gfx.fillStyle(tc2, 0.6); gfx.fillCircle(cx+5, cy-3, 7);
                        gfx.fillStyle(0xffcc00, 0.4); gfx.fillCircle(cx, cy, 5);
                    }
                } else if (tile === 9) {
                    // Shop building tile — ornate merchant shop
                    gfx.fillStyle(0x5a3a1a, 1); gfx.fillRect(x+2, y+2, T-4, T-4);
                    gfx.fillStyle(0x8b0000, 1);
                    gfx.fillTriangle(cx-24, cy-8, cx, cy-28, cx+24, cy-8);
                    gfx.fillStyle(0x4a2a0a, 1); gfx.fillRect(cx-6, cy+6, 12, 18);
                    gfx.fillStyle(0xf5c842, 0.6); gfx.fillRect(cx-4, cy+8, 8, 14);
                    gfx.fillStyle(0x87ceeb, 1); gfx.fillRect(cx-18, cy-2, 10, 10);
                    gfx.fillRect(cx+8, cy-2, 10, 10);
                    gfx.fillStyle(0xf5c842, 0.8);
                    gfx.fillCircle(cx, cy-18, 6);
                    gfx.fillStyle(0xf5c842, 1);
                    gfx.fillCircle(cx, cy-18, 3);
                }
            }
        }

        // NPC sprites
        for (i = 0; i < this.npcData.length; i++) {
            var nd = this.npcData[i];
            var nx = nd.c * T + T/2, ny = nd.r * T + T/2;
            var npcSprite = this.add.sprite(nx, ny, nd.sprite, 0).setScale(3).setDepth(5);
            if (this.anims.exists(nd.sprite + '-idle')) npcSprite.play(nd.sprite + '-idle');
            this.add.text(nx, ny - 32, nd.name, {
                fontFamily: 'Nunito', fontSize: '14px', fontStyle: '700', color: '#ffffff',
                stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(6);
            var excl = this.add.text(nx, ny - 46, '!', {
                fontFamily: 'Nunito', fontSize: '20px', fontStyle: '900', color: '#f5c842',
                stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(6);
            this.tweens.add({ targets: excl, y: ny - 52, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            this.npcSprites.push(npcSprite);
        }

        // Grass sprites
        for (r = 0; r < ROWS; r++) {
            for (c = 0; c < COLS; c++) {
                if (this.map[r][c] === 1) {
                    var gx = c*T+T/2, gy = r*T+T/2;
                    var gs = this.add.container(gx, gy).setDepth(2);
                    gs.add(this.add.rectangle(0, 0, T-6, T-6, colors.grass));
                    gs.add(this.add.rectangle(-8, -6, 6, 14, colors.grassBlade1));
                    gs.add(this.add.rectangle(4, -4, 5, 12, colors.grassBlade2));
                    gs.add(this.add.rectangle(-2, -8, 4, 10, colors.grassBlade1));
                    this.grassSprites[r+','+c] = gs;
                }
            }
        }

        // === TRAP TILES ===
        this.trapTiles = [];
        this.trapImmunity = false;
        this.trapGfx = this.add.graphics().setDepth(2);
        this.trapParticles = [];
        var trapTheme = landConfig.trapTheme;
        for (r = 0; r < ROWS; r++) {
            for (c = 0; c < COLS; c++) {
                if (this.map[r][c] === 8) {
                    this.trapTiles.push({ r: r, c: c, x: c * T + T/2, y: r * T + T/2 });
                }
            }
        }

        // === OVERWORLD ENEMIES ===
        var self = this;
        for (i = 0; i < landConfig.enemySpawns.length; i++) {
            var edata = landConfig.enemySpawns[i];
            var ex = edata.c * T + T/2, ey = edata.r * T + T/2;
            var eSprite = this.add.sprite(ex, ey, edata.sprite, 0).setScale(2.5).setDepth(5);
            if (this.anims.exists(edata.anim)) eSprite.play(edata.anim);
            var eObj = { sprite: eSprite, data: edata, alive: true, homeX: ex, homeY: ey };
            // Patrol tween
            var patrolDist = edata.patrolRange * T;
            var tweenProps = {};
            if (edata.patrolAxis === 'x') {
                tweenProps.x = { from: ex - patrolDist, to: ex + patrolDist };
            } else {
                tweenProps.y = { from: ey - patrolDist, to: ey + patrolDist };
            }
            tweenProps.duration = 800 * edata.patrolRange;
            tweenProps.ease = 'Sine.easeInOut';
            tweenProps.yoyo = true;
            tweenProps.repeat = -1;
            tweenProps.targets = eSprite;
            if (edata.patrolAxis === 'x') {
                tweenProps.onYoyo = (function(s) { return function() { s.setFlipX(false); }; })(eSprite);
                tweenProps.onRepeat = (function(s) { return function() { s.setFlipX(true); }; })(eSprite);
            }
            eObj.patrolTween = this.tweens.add(tweenProps);
            this.owEnemies.push(eObj);
        }

        // === CHICKENS ===
        for (i = 0; i < landConfig.chickenSpawns.length; i++) {
            var cdata = landConfig.chickenSpawns[i];
            var chx = cdata.c * T + T/2, chy = cdata.r * T + T/2;
            var cSprite = this.add.sprite(chx, chy, 'chicken-white', 0).setScale(2.5).setDepth(4);
            if (this.anims.exists('chicken-idle')) cSprite.play('chicken-idle');
            var cObj = { sprite: cSprite, homeR: cdata.r, homeC: cdata.c, wanderTimer: null };
            this.chickens.push(cObj);
        }
        // Start chicken wander AI
        this.startChickenWander();

        // Player — use saved position if returning from shop
        var spawnR = (this.sceneData.fromShop && this.sceneData.playerPos) ? this.sceneData.playerPos.r : sp.r;
        var spawnC = (this.sceneData.fromShop && this.sceneData.playerPos) ? this.sceneData.playerPos.c : sp.c;
        var sx = spawnC * T + T/2, sy = spawnR * T + T/2;
        this.shadow = this.add.ellipse(sx, sy+20, 36, 14, 0x000000, 0.3).setDepth(9);
        this.player = this.physics.add.sprite(sx, sy, 'hiro-idle', 0).setScale(3).setDepth(10);
        this.player.body.setSize(12, 12).setOffset(2, 4);
        this.player.setCollideWorldBounds(true);
        this.player.play('hiro-idle-down');

        // Coins
        this.coinGroup = this.physics.add.group();
        this.physics.add.overlap(this.player, this.coinGroup, this.grabCoin, null, this);

        // Camera
        this.cameras.main.setBounds(0, 0, worldW, worldH);
        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys('W,S,A,D');
        this.input.keyboard.on('keydown-SPACE', this.doAction, this);

        // HUD
        this.scene.launch('UIScene');

        // Music
        this.sound.mute = gameMuted;
        try { this.bgm = this.sound.add(landConfig.musicKey, { loop: true, volume: 0.35 }); this.bgm.play(); } catch(e) {}
        this.cameras.main.fadeIn(500);

        // === MOBILE TOUCH CONTROLS (D-pad + Action button) — only on touch devices ===
        this.touchDir = { left: false, right: false, up: false, down: false };
        this.isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        if (this.isMobile) {
            this.createTouchControls();
        }

        // === LAND INTRO BANNER === (skip when returning from shop)
        if (!this.sceneData.fromShop) {
        var storyData = STORY.lands[gameState.currentLand] || {};
        var landNum = gameState.currentLand;
        var cam = this.cameras.main;
        var self = this;

        this.time.delayedCall(600, function() {
            var bx = cam.scrollX + self.scale.width / 2, by = cam.scrollY + 200;

            // Cinematic letterbox bars (brief)
            var introTopBar = self.add.rectangle(bx, cam.scrollY, self.scale.width, 60, 0x000000).setOrigin(0.5, 0).setDepth(200).setAlpha(0);
            var introBotBar = self.add.rectangle(bx, cam.scrollY + self.scale.height, self.scale.width, 60, 0x000000).setOrigin(0.5, 1).setDepth(200).setAlpha(0);
            self.tweens.add({ targets: [introTopBar, introBotBar], alpha: 1, duration: 300 });

            // Dark overlay
            var introBg = self.add.rectangle(bx, by + 30, 420, 160, 0x0a0a1e, 0.85)
                .setStrokeStyle(2, 0xf5c842, 0.4).setDepth(201).setAlpha(0);
            self.tweens.add({ targets: introBg, alpha: 1, duration: 400 });

            // "LAND X" label
            var landLabel = self.add.text(bx, by - 20, 'LAND ' + landNum, {
                fontFamily: 'Nunito', fontSize: '16px', fontStyle: '800', color: '#888899',
                stroke: '#000000', strokeThickness: 2
            }).setOrigin(0.5).setDepth(202).setAlpha(0);
            self.tweens.add({ targets: landLabel, alpha: 1, duration: 400, delay: 200 });

            // Land name (big)
            var landNameText = self.add.text(bx, by + 10, (storyData.name || landConfig.name || 'Unknown').toUpperCase(), {
                fontFamily: 'Nunito', fontSize: '30px', fontStyle: '900', color: '#f5c842',
                stroke: '#000000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(202).setScale(0);
            self.tweens.add({ targets: landNameText, scaleX: 1, scaleY: 1, duration: 500, ease: 'Back.easeOut', delay: 300 });

            // Story intro text
            var introMsg = storyData.intro || '';
            if (introMsg) {
                var introText = self.add.text(bx, by + 55, introMsg, {
                    fontFamily: 'Nunito', fontSize: '14px', fontStyle: '700', color: '#aabbcc',
                    align: 'center', lineSpacing: 4, wordWrap: { width: 380 }
                }).setOrigin(0.5).setDepth(202).setAlpha(0);
                self.tweens.add({ targets: introText, alpha: 1, duration: 600, delay: 800 });

                // Auto-dismiss after 4s
                self.time.delayedCall(4500, function() {
                    self.tweens.add({
                        targets: [introBg, landLabel, landNameText, introText, introTopBar, introBotBar],
                        alpha: 0, duration: 600,
                        onComplete: function() {
                            introBg.destroy(); landLabel.destroy(); landNameText.destroy();
                            introText.destroy(); introTopBar.destroy(); introBotBar.destroy();
                        }
                    });
                });
            } else {
                self.time.delayedCall(3000, function() {
                    self.tweens.add({
                        targets: [introBg, landLabel, landNameText, introTopBar, introBotBar],
                        alpha: 0, duration: 600,
                        onComplete: function() {
                            introBg.destroy(); landLabel.destroy(); landNameText.destroy();
                            introTopBar.destroy(); introBotBar.destroy();
                        }
                    });
                });
            }
        });
        } // end if !fromShop
    }

    createTouchControls() {
        var self = this;
        var cam = this.cameras.main;

        // Touch control container — fixed to camera (re-positions in update)
        this.touchContainer = this.add.container(0, 0).setDepth(300).setAlpha(0.5);
        this.touchControlsVisible = false;

        // Show controls on first touch anywhere
        this.input.on('pointerdown', function() {
            if (!self.touchControlsVisible) {
                self.touchControlsVisible = true;
                self.touchContainer.setAlpha(0.55);
            }
        });

        // D-pad layout (bottom-left) — relative positions, repositioned each frame
        var dpadCX = 90, dpadCY = Math.min(760, this.scale.height - 94), btnSize = 52, gap = 4;

        // D-pad background circle
        var dpadBg = this.add.circle(0, 0, 78, 0x000000, 0.3).setStrokeStyle(2, 0xffffff, 0.15);
        this.touchContainer.add(dpadBg);

        // UP
        var btnUp = this.add.rectangle(0, -btnSize - gap, btnSize, btnSize, 0x333355, 0.7)
            .setStrokeStyle(2, 0xffffff, 0.3).setInteractive();
        this.touchContainer.add(btnUp);
        var arrowUp = this.add.triangle(0, -btnSize - gap, 0, -14, 12, 6, -12, 6, 0xffffff, 0.6);
        this.touchContainer.add(arrowUp);
        btnUp.on('pointerdown', function() { self.touchDir.up = true; });
        btnUp.on('pointerup', function() { self.touchDir.up = false; });
        btnUp.on('pointerout', function() { self.touchDir.up = false; });

        // DOWN
        var btnDown = this.add.rectangle(0, btnSize + gap, btnSize, btnSize, 0x333355, 0.7)
            .setStrokeStyle(2, 0xffffff, 0.3).setInteractive();
        this.touchContainer.add(btnDown);
        var arrowDown = this.add.triangle(0, btnSize + gap, 0, -6, 12, 14, -12, 14, 0xffffff, 0.6).setAngle(180);
        this.touchContainer.add(arrowDown);
        btnDown.on('pointerdown', function() { self.touchDir.down = true; });
        btnDown.on('pointerup', function() { self.touchDir.down = false; });
        btnDown.on('pointerout', function() { self.touchDir.down = false; });

        // LEFT
        var btnLeft = this.add.rectangle(-btnSize - gap, 0, btnSize, btnSize, 0x333355, 0.7)
            .setStrokeStyle(2, 0xffffff, 0.3).setInteractive();
        this.touchContainer.add(btnLeft);
        var arrowLeft = this.add.triangle(-btnSize - gap, 0, 14, -12, 14, 12, -6, 0, 0xffffff, 0.6);
        this.touchContainer.add(arrowLeft);
        btnLeft.on('pointerdown', function() { self.touchDir.left = true; });
        btnLeft.on('pointerup', function() { self.touchDir.left = false; });
        btnLeft.on('pointerout', function() { self.touchDir.left = false; });

        // RIGHT
        var btnRight = this.add.rectangle(btnSize + gap, 0, btnSize, btnSize, 0x333355, 0.7)
            .setStrokeStyle(2, 0xffffff, 0.3).setInteractive();
        this.touchContainer.add(btnRight);
        var arrowRight = this.add.triangle(btnSize + gap, 0, -6, -12, 14, 0, -6, 12, 0xffffff, 0.6);
        this.touchContainer.add(arrowRight);
        btnRight.on('pointerdown', function() { self.touchDir.right = true; });
        btnRight.on('pointerup', function() { self.touchDir.right = false; });
        btnRight.on('pointerout', function() { self.touchDir.right = false; });

        // ACTION BUTTON (bottom-right) — chop/talk
        var actionX = this.scale.width - 90, actionY = Math.min(760, this.scale.height - 94);
        var actionBg = this.add.circle(actionX - dpadCX, actionY - dpadCY, 40, 0xe94560, 0.6)
            .setStrokeStyle(3, 0xffffff, 0.4).setInteractive();
        this.touchContainer.add(actionBg);
        var actionLabel = this.add.text(actionX - dpadCX, actionY - dpadCY, '\u2694', {
            fontFamily: 'Nunito', fontSize: '32px', fontStyle: '900', color: '#ffffff'
        }).setOrigin(0.5);
        this.touchContainer.add(actionLabel);
        actionBg.on('pointerdown', function() {
            actionBg.setFillStyle(0xff6680, 0.8);
            self.doAction();
        });
        actionBg.on('pointerup', function() { actionBg.setFillStyle(0xe94560, 0.6); });
        actionBg.on('pointerout', function() { actionBg.setFillStyle(0xe94560, 0.6); });

        // Store reference positions for camera-following
        this.dpadCX = dpadCX;
        this.dpadCY = dpadCY;
    }

    doAction() {
        // Block during QuickBattle
        if (this.quickBattleActive) return;

        // If dialog is open, dismiss it
        if (this.dialogActive) {
            this.dismissDialog();
            return;
        }

        // Check if near NPC
        var T = this.T;
        var pr = Math.floor(this.player.y / T);
        var pc = Math.floor(this.player.x / T);

        // Check adjacent tiles for NPC
        var dirs = [[0,0],[-1,0],[1,0],[0,-1],[0,1]];
        for (var d = 0; d < dirs.length; d++) {
            var cr = pr + dirs[d][0], cc = pc + dirs[d][1];
            if (cr >= 0 && cr < this.ROWS && cc >= 0 && cc < this.COLS && this.map[cr][cc] === 6) {
                // Found NPC
                var npcInfo = null;
                for (var n = 0; n < this.npcData.length; n++) {
                    if (this.npcData[n].r === cr && this.npcData[n].c === cc) {
                        npcInfo = this.npcData[n];
                        break;
                    }
                }
                if (npcInfo) {
                    if (npcInfo.msg === '__SHOP__') {
                        try { if (this.bgm) this.bgm.stop(); } catch(e) {}
                        this.scene.stop('UIScene');
                        var playerR = Math.floor(this.player.y / this.T);
                        var playerC = Math.floor(this.player.x / this.T);
                        this.scene.start('ShopScene', { playerPos: { r: playerR, c: playerC } });
                    } else {
                        this.showDialog(npcInfo.name, npcInfo.msg);
                    }
                    return;
                }
            }
        }

        // Check if near dungeon — requires Dungeon Key from shop
        for (d = 0; d < dirs.length; d++) {
            var dr = pr + dirs[d][0], dc = pc + dirs[d][1];
            if (dr >= 0 && dr < this.ROWS && dc >= 0 && dc < this.COLS && this.map[dr][dc] === 7) {
                if (gameState.hasDungeonKey) {
                    gameState.hasDungeonKey = false; // consume the key
                    try { if (this.bgm) this.bgm.stop(); } catch(e) {}
                    this.scene.stop('UIScene');
                    this.scene.start('CombatScene');
                } else {
                    this.showDialog('Dungeon Gate', 'You need a Dungeon Key! Buy one from the Merchant.');
                }
                return;
            }
        }

        // Otherwise, attack (chop grass)
        this.doAttack();
    }

    showDialog(name, msg) {
        this.dialogActive = true;
        var cam = this.cameras.main;
        var dx = cam.scrollX + this.scale.width / 2;
        var dy = cam.scrollY + 540;

        this.dialogGroup = this.add.container(0, 0).setDepth(100);

        var bg = this.add.rectangle(dx, dy, 440, 120, 0x16213e, 0.95).setStrokeStyle(3, COLORS.gold);
        this.dialogGroup.add(bg);

        var nameText = this.add.text(dx - 200, dy - 45, name, {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '800', color: '#f5c842'
        });
        this.dialogGroup.add(nameText);

        var msgText = this.add.text(dx - 200, dy - 15, msg, {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '700', color: '#ffffff',
            wordWrap: { width: 400 }
        });
        this.dialogGroup.add(msgText);

        var hint = this.add.text(dx + 180, dy + 40, '[SPACE]', {
            fontFamily: 'Nunito', fontSize: '16px', fontStyle: '700', color: '#aaaacc'
        }).setOrigin(1, 0.5);
        this.dialogGroup.add(hint);
    }

    dismissDialog() {
        if (this.dialogGroup) {
            this.dialogGroup.destroy(true);
            this.dialogGroup = null;
        }
        this.dialogActive = false;
    }

    doAttack() {
        if (this.isAttacking || this.dialogActive || this.quickBattleActive) return;
        this.isAttacking = true;
        this.player.play('hiro-attack');

        var T = this.T, sx = this.player.x, sy = this.player.y, sa = 0;
        if (this.facing === 'down') { sy += 36; sa = 90; }
        else if (this.facing === 'up') { sy -= 36; sa = -90; }
        else if (this.facing === 'left') { sx -= 36; sa = 180; }
        else { sx += 36; }

        var slash = this.add.sprite(sx, sy, 'slash-fx', 0).setScale(2.4).setDepth(15).setAngle(sa);
        slash.play('slash-anim');
        slash.on('animationcomplete', function() { slash.destroy(); });
        try { this.sound.play('sfx-slash', { volume: 0.4 }); } catch(e) {}

        // Check for chicken hit (short-circuits grass cutting)
        for (var ci = 0; ci < this.chickens.length; ci++) {
            var ch = this.chickens[ci];
            if (!ch.sprite || !ch.sprite.active) continue;
            var cdist = Phaser.Math.Distance.Between(sx, sy, ch.sprite.x, ch.sprite.y);
            if (cdist < 40) {
                var self2 = this;
                this.time.delayedCall(200, function() {
                    self2.isAttacking = false;
                    self2.player.play('hiro-idle-' + self2.facing);
                    self2.startQuickBattle({ type: 'chicken', data: {}, spriteRef: ch.sprite, index: ci });
                });
                return;
            }
        }

        // Find grass to cut
        var fr = Math.floor(this.player.y/T), fc = Math.floor(this.player.x/T);
        if (this.facing === 'down') fr++; else if (this.facing === 'up') fr--;
        else if (this.facing === 'left') fc--; else fc++;

        var key = fr+','+fc;
        if (!this.grassSprites[key]) key = Math.floor(this.player.y/T)+','+Math.floor(this.player.x/T);

        if (this.grassSprites[key]) {
            var gs = this.grassSprites[key];
            delete this.grassSprites[key];
            var parts = key.split(',');
            this.map[parseInt(parts[0])][parseInt(parts[1])] = 0;
            var gx = gs.x, gy = gs.y;

            for (var i = 0; i < 6; i++) {
                var colors = [0x22c55e, 0x16a34a, 0x4ade80, 0x27ae60, 0x2ecc40, 0x1abc9c];
                var p = this.add.rectangle(gx, gy, Phaser.Math.Between(4,10), Phaser.Math.Between(6,14), colors[i%6]).setDepth(20);
                p.setAngle(Phaser.Math.Between(0, 360));
                this.tweens.add({ targets: p, x: gx+Phaser.Math.Between(-60,60), y: gy+Phaser.Math.Between(-60,30), alpha: 0, angle: p.angle + Phaser.Math.Between(-90,90), duration: 350, ease: 'Quad.easeOut', onComplete: function() { p.destroy(); } });
            }
            gs.destroy(true);
            gameState.grassCut++;

            if (Math.random() < 0.7) {
                var coin = this.physics.add.sprite(gx, gy-10, 'coin-spin', 0).setScale(2).setDepth(12);
                coin.play('coin-spin-anim'); coin.body.setSize(12,12);
                this.coinGroup.add(coin);
                this.tweens.add({ targets: coin, y: gy-40, duration: 250, ease: 'Quad.easeOut', yoyo: true });
            }
        }

        var self = this;
        this.time.delayedCall(300, function() { self.isAttacking = false; self.player.play('hiro-idle-' + self.facing); });
    }

    grabCoin(player, coin) {
        if (coin.getData('got')) return;
        coin.setData('got', true);
        gameState.coins++;
        try { this.sound.play('sfx-coin', { volume: 0.5 }); } catch(e) {}

        var t = this.add.text(coin.x, coin.y-20, '+1', {
            fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#f5c842', stroke: '#000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(25);
        this.tweens.add({ targets: t, y: t.y-40, alpha: 0, duration: 500, onComplete: function() { t.destroy(); } });
        this.tweens.add({ targets: coin, alpha: 0, duration: 200, onComplete: function() { coin.destroy(); } });

        var ui = this.scene.get('UIScene');
        if (ui && ui.scene.isActive()) ui.events.emit('updateCoins', gameState.coins);
    }

    update(time, delta) {
        if (!this.player || !this.player.body) return;
        // Keep touch controls fixed to camera
        if (this.touchContainer) {
            this.touchContainer.setPosition(
                this.cameras.main.scrollX + this.dpadCX,
                this.cameras.main.scrollY + this.dpadCY
            );
        }
        if (this.quickBattleActive) { this.player.body.setVelocity(0,0); return; }
        if (this.dialogActive) { this.player.body.setVelocity(0,0); return; }
        if (this.isAttacking) { this.player.body.setVelocity(0,0); this.shadow.setPosition(this.player.x, this.player.y+20); return; }

        var speed = 220, vx = 0, vy = 0;
        var td = this.touchDir || {};
        if (this.cursors.left.isDown || this.wasd.A.isDown || td.left) vx = -speed;
        else if (this.cursors.right.isDown || this.wasd.D.isDown || td.right) vx = speed;
        if (this.cursors.up.isDown || this.wasd.W.isDown || td.up) vy = -speed;
        else if (this.cursors.down.isDown || this.wasd.S.isDown || td.down) vy = speed;
        if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

        // Tile collision - block on trees (2), water (3), houses (5), NPCs (6), shop building (9)
        var T = this.T, m = 10;
        var blocked = function(tile) { return tile === 2 || tile === 3 || tile === 5 || tile === 6 || tile === 9; };
        if (vx < 0) { var nc = Math.floor((this.player.x + vx/60 - m) / T); if (this.map[Math.floor(this.player.y/T)] && blocked(this.map[Math.floor(this.player.y/T)][nc])) vx = 0; }
        if (vx > 0) { var nc2 = Math.floor((this.player.x + vx/60 + m) / T); if (this.map[Math.floor(this.player.y/T)] && blocked(this.map[Math.floor(this.player.y/T)][nc2])) vx = 0; }
        if (vy < 0) { var nr = Math.floor((this.player.y + vy/60 - m) / T); if (this.map[nr] && blocked(this.map[nr][Math.floor(this.player.x/T)])) vy = 0; }
        if (vy > 0) { var nr2 = Math.floor((this.player.y + vy/60 + m) / T); if (this.map[nr2] && blocked(this.map[nr2][Math.floor(this.player.x/T)])) vy = 0; }

        // Block walking into dungeon tile (must use SPACE to interact)
        var nextR = Math.floor((this.player.y + vy/60) / T);
        var nextC = Math.floor((this.player.x + vx/60) / T);
        if (this.map[nextR] && this.map[nextR][nextC] === 7) {
            if (vy < 0) vy = 0;
            if (vy > 0) vy = 0;
            if (vx !== 0) {
                var testC = Math.floor((this.player.x + vx/60 + (vx > 0 ? m : -m)) / T);
                if (this.map[nextR] && this.map[nextR][testC] === 7) vx = 0;
            }
        }

        this.player.body.setVelocity(vx, vy);

        if (vx !== 0 || vy !== 0) {
            this.facing = Math.abs(vx) > Math.abs(vy) ? (vx < 0 ? 'left' : 'right') : (vy < 0 ? 'up' : 'down');
            var a = 'hiro-walk-' + this.facing;
            if (!this.player.anims.currentAnim || this.player.anims.currentAnim.key !== a) this.player.play(a);
        } else {
            if (!this.player.anims.currentAnim || !this.player.anims.currentAnim.key.startsWith('hiro-idle')) this.player.play('hiro-idle-' + this.facing);
        }
        this.shadow.setPosition(this.player.x, this.player.y+20);

        // === TRAP ANIMATION + COLLISION ===
        if (this.trapTiles.length > 0 && this.trapGfx) {
            var tt = this.landConfig.trapTheme;
            var tgc = Phaser.Display.Color.HexStringToColor(tt.glowColor).color;
            var tc2 = Phaser.Display.Color.HexStringToColor(tt.color2).color;
            this.trapGfx.clear();
            var pulse = 0.15 + 0.12 * Math.sin(time * 0.003);
            for (var ti = 0; ti < this.trapTiles.length; ti++) {
                var trap = this.trapTiles[ti];
                // Pulsing glow circle
                this.trapGfx.fillStyle(tgc, pulse);
                this.trapGfx.fillCircle(trap.x, trap.y, 22 + 4 * Math.sin(time * 0.004 + ti));
                // Spark particles (occasional)
                if (Math.random() < 0.03) {
                    var sparkX = trap.x + Phaser.Math.Between(-12, 12);
                    var sparkY = trap.y;
                    this.trapParticles.push({ x: sparkX, y: sparkY, vy: -0.8, life: 30, color: tc2 });
                }
            }
            // Update + draw particles
            for (var pi = this.trapParticles.length - 1; pi >= 0; pi--) {
                var p = this.trapParticles[pi];
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) { this.trapParticles.splice(pi, 1); continue; }
                var pa = p.life / 30;
                this.trapGfx.fillStyle(p.color, pa);
                this.trapGfx.fillCircle(p.x, p.y, 2 + pa);
            }

            // Trap collision check
            if (!this.trapImmunity) {
                var pr = Math.floor(this.player.y / T);
                var pc = Math.floor(this.player.x / T);
                if (this.map[pr] && this.map[pr][pc] === 8) {
                    this.trapHit(pr, pc);
                }
            }
        }

        // Overworld enemy collision check
        if (!this.encounterImmunity) {
            for (var ei = 0; ei < this.owEnemies.length; ei++) {
                var oe = this.owEnemies[ei];
                if (!oe.alive) continue;
                var dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, oe.sprite.x, oe.sprite.y);
                if (dist < 36) {
                    this.startQuickBattle({ type: 'enemy', data: oe.data, index: ei });
                    break;
                }
            }
        }
    }

    // === TRAP HIT ===
    trapHit(tr, tc) {
        var self = this;
        var T = this.T;
        this.trapImmunity = true;

        // Damage
        gameState.hearts -= 1;
        var ui = this.scene.get('UIScene');
        if (ui && ui.scene.isActive()) ui.events.emit('updateHearts');

        // Sound
        try { this.sound.play('sfx-trap', { volume: 0.5 }); } catch(e) {}

        // Red flash on player
        this.player.setTint(0xff0000);

        // Camera shake
        this.cameras.main.shake(200, 0.01);

        // Knockback — push player away from trap center
        var trapCX = tc * T + T/2, trapCY = tr * T + T/2;
        var dx = this.player.x - trapCX, dy = this.player.y - trapCY;
        var len = Math.sqrt(dx*dx + dy*dy) || 1;
        var kbDist = 30;
        var newX = this.player.x + (dx / len) * kbDist;
        var newY = this.player.y + (dy / len) * kbDist;
        // Clamp to world bounds
        newX = Phaser.Math.Clamp(newX, T, (this.COLS - 1) * T);
        newY = Phaser.Math.Clamp(newY, T, (this.ROWS - 1) * T);
        // Check blocked tiles at destination
        var destR = Math.floor(newY / T), destC = Math.floor(newX / T);
        if (this.map[destR] && (this.map[destR][destC] === 2 || this.map[destR][destC] === 3 || this.map[destR][destC] === 5)) {
            newX = this.player.x; newY = this.player.y;
        }
        this.tweens.add({ targets: this.player, x: newX, y: newY, duration: 150, ease: 'Quad.easeOut' });

        // Floating damage text
        var dmgText = this.add.text(this.player.x, this.player.y - 30, '-1', {
            fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900', color: '#ff4444',
            stroke: '#000000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(200);
        this.tweens.add({
            targets: dmgText, y: dmgText.y - 40, alpha: 0, duration: 800,
            onComplete: function() { dmgText.destroy(); }
        });

        // Clear tint after 300ms
        this.time.delayedCall(300, function() {
            if (self.player && self.player.active) self.player.clearTint();
        });

        // Immunity cooldown 1.5s
        this.time.delayedCall(1500, function() { self.trapImmunity = false; });

        // Death check
        if (gameState.hearts <= 0) {
            gameState.hearts = 0;
            this.time.delayedCall(500, function() {
                try { if (self.bgm) self.bgm.stop(); } catch(e) {}
                self.scene.stop('UIScene');
                self.scene.start('DeathScene', {
                    problems: gameState.totalProblems,
                    correct: gameState.totalCorrect,
                    bestCombo: gameState.bestCombo
                });
            });
        }
    }

    // === CHICKEN WANDER AI ===
    startChickenWander() {
        var self = this, T = this.T;
        for (var i = 0; i < this.chickens.length; i++) {
            (function(ch, delay) {
                ch.wanderTimer = self.time.addEvent({
                    delay: Phaser.Math.Between(1000, 3000),
                    loop: true,
                    startAt: delay,
                    callback: function() {
                        if (self.quickBattleActive || !ch.sprite || !ch.sprite.active) return;
                        var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                        var d = dirs[Math.floor(Math.random() * 4)];
                        var curR = Math.round((ch.sprite.y - T/2) / T);
                        var curC = Math.round((ch.sprite.x - T/2) / T);
                        var newR = curR + d[0], newC = curC + d[1];
                        if (newR < 1 || newR >= self.ROWS-1 || newC < 1 || newC >= self.COLS-1) return;
                        var tile = self.map[newR][newC];
                        if (tile === 0 || tile === 1 || tile === 4) {
                            var tx = newC * T + T/2, ty = newR * T + T/2;
                            ch.sprite.setFlipX(d[1] < 0);
                            self.tweens.add({ targets: ch.sprite, x: tx, y: ty, duration: 400, ease: 'Linear' });
                        }
                    }
                });
            })(this.chickens[i], Phaser.Math.Between(0, 2000));
        }
    }

    // === QUICK BATTLE SYSTEM ===
    startQuickBattle(source) {
        if (this.quickBattleActive) return;
        this.quickBattleActive = true;
        this.qbTypedAnswer = '';
        this.qbShowingAnswer = false;
        this.qbSource = source;

        var cam = this.cameras.main;
        var ox = cam.scrollX, oy = cam.scrollY;
        this.quickBattleContainer = this.add.container(0, 0).setDepth(200);

        // Dim overlay
        var dim = this.add.rectangle(ox + this.scale.width/2, oy + this.scale.height/2, this.scale.width, this.scale.height, 0x000000, 0.6);
        this.quickBattleContainer.add(dim);

        // Panel
        var panelX = ox + this.scale.width/2, panelY = oy + 350;
        var panel = this.add.rectangle(panelX, panelY, 380, 420, 0x16213e, 0.95).setStrokeStyle(3, COLORS.gold);
        this.quickBattleContainer.add(panel);

        // Title
        var title = source.type === 'chicken' ? 'SQUAWK!' : source.data.name;
        var titleColor = source.type === 'chicken' ? '#ffcc44' : '#ff6644';
        this.qbTitle = this.add.text(panelX, panelY - 180, title, {
            fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900', color: titleColor,
            stroke: '#000000', strokeThickness: 4
        }).setOrigin(0.5);
        this.quickBattleContainer.add(this.qbTitle);

        // Enemy/chicken sprite in panel
        var sprKey = source.type === 'chicken' ? 'chicken-white' : source.data.sprite;
        var sprAnim = source.type === 'chicken' ? 'chicken-idle' : source.data.anim;
        var qbSprite = this.add.sprite(panelX, panelY - 120, sprKey, 0).setScale(4);
        if (this.anims.exists(sprAnim)) qbSprite.play(sprAnim);
        this.quickBattleContainer.add(qbSprite);

        // Pick problem
        var pools = this.landConfig.problemPools;
        var pool;
        if (source.type === 'chicken') {
            if (this.chickenStreak >= 2) pool = pools.hard;
            else if (this.chickenStreak >= 1) pool = pools.medium;
            else pool = pools.easy;
        } else {
            pool = pools.easy;
        }
        this.qbProblem = pool[Math.floor(Math.random() * pool.length)];
        var op = this.qbProblem.op;
        var a = this.qbProblem.a, b = this.qbProblem.b;
        this.qbCorrectAnswer = {'+': a+b, '-': a-b, '\u00d7': a*b, '\u00f7': a/b}[op] || a+b;
        var opSymbol = {'+':'+', '-':'\u2212', '\u00d7':'\u00d7', '\u00f7':'\u00f7'}[op] || op;

        // Problem text
        this.qbProblemText = this.add.text(panelX, panelY - 60, a + ' ' + opSymbol + ' ' + b + ' = ?', {
            fontFamily: 'Nunito', fontSize: '42px', fontStyle: '900', color: '#ffffff'
        }).setOrigin(0.5);
        this.quickBattleContainer.add(this.qbProblemText);

        // Answer display
        var ansBg = this.add.rectangle(panelX, panelY - 10, 180, 48, 0x0a0a2e).setStrokeStyle(2, 0x4466ff);
        this.quickBattleContainer.add(ansBg);
        this.qbAnswerText = this.add.text(panelX, panelY - 10, '', {
            fontFamily: 'Nunito', fontSize: '38px', fontStyle: '900', color: '#ffffff'
        }).setOrigin(0.5);
        this.quickBattleContainer.add(this.qbAnswerText);

        // Feedback text
        this.qbFeedback = this.add.text(panelX, panelY + 24, '', {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#ffffff'
        }).setOrigin(0.5);
        this.quickBattleContainer.add(this.qbFeedback);

        // Mini numpad
        this.createQuickNumpad(panelX, panelY + 50);

        // Keyboard input for QuickBattle
        var self = this;
        this.qbKeyHandler = function(event) {
            if (!self.quickBattleActive || self.qbShowingAnswer) return;
            if (event.key >= '0' && event.key <= '9') {
                if (self.qbTypedAnswer.length < 3) {
                    self.qbTypedAnswer += event.key;
                    self.qbAnswerText.setText(self.qbTypedAnswer);
                }
            } else if (event.key === 'Backspace') {
                self.qbTypedAnswer = self.qbTypedAnswer.slice(0, -1);
                self.qbAnswerText.setText(self.qbTypedAnswer);
            } else if (event.key === 'Enter') {
                self.submitQuickAnswer();
            }
        };
        this.input.keyboard.on('keydown', this.qbKeyHandler);
    }

    createQuickNumpad(cx, topY) {
        var self = this;
        var btnW = 100, btnH = 50, gap = 6;
        var startX = cx - (btnW * 1.5 + gap);
        var layout = [['1','2','3'],['4','5','6'],['7','8','9'],['DEL','0','GO']];

        for (var row = 0; row < 4; row++) {
            for (var col = 0; col < 3; col++) {
                var label = layout[row][col];
                var bx = startX + col * (btnW + gap) + btnW/2;
                var by = topY + row * (btnH + gap) + btnH/2;
                var btnColor = label === 'GO' ? 0x22c55e : (label === 'DEL' ? 0x994444 : 0x2a2a4e);
                var bg = this.add.rectangle(bx, by, btnW, btnH, btnColor).setStrokeStyle(2, 0x555577)
                    .setInteractive({ useHandCursor: true });
                this.quickBattleContainer.add(bg);
                var displayLabel = label === 'DEL' ? '\u232B' : label;
                var txt = this.add.text(bx, by, displayLabel, {
                    fontFamily: 'Nunito', fontSize: '28px', fontStyle: '800', color: '#ffffff'
                }).setOrigin(0.5);
                this.quickBattleContainer.add(txt);
                (function(btn, lbl, origColor) {
                    btn.on('pointerover', function() { if (!self.qbShowingAnswer) btn.setFillStyle(origColor + 0x222222); });
                    btn.on('pointerout', function() { btn.setFillStyle(origColor); });
                    btn.on('pointerup', function() {
                        btn.setFillStyle(origColor);
                        if (!self.quickBattleActive || self.qbShowingAnswer) return;
                        if (lbl === 'DEL') {
                            self.qbTypedAnswer = self.qbTypedAnswer.slice(0, -1);
                            self.qbAnswerText.setText(self.qbTypedAnswer);
                        } else if (lbl === 'GO') {
                            self.submitQuickAnswer();
                        } else {
                            if (self.qbTypedAnswer.length < 3) {
                                self.qbTypedAnswer += lbl;
                                self.qbAnswerText.setText(self.qbTypedAnswer);
                            }
                        }
                    });
                })(bg, label, btnColor);
            }
        }
    }

    submitQuickAnswer() {
        if (this.qbTypedAnswer.length === 0 || this.qbShowingAnswer) return;
        var self = this;
        var answer = parseInt(this.qbTypedAnswer, 10);
        var source = this.qbSource;
        gameState.totalProblems++;

        if (answer === this.qbCorrectAnswer) {
            // CORRECT
            gameState.totalCorrect++;
            try { this.sound.play('sfx-correct', { volume: 0.5 }); } catch(e) {}

            // Green flash on panel
            this.qbFeedback.setText('').setColor('#22c55e');
            var cam = this.cameras.main;
            var flash = this.add.rectangle(cam.scrollX + this.scale.width/2, cam.scrollY + 350, 380, 420, 0x22c55e, 0.3).setDepth(201);
            this.tweens.add({ targets: flash, alpha: 0, duration: 400, onComplete: function() { flash.destroy(); } });

            if (source.type === 'enemy') {
                var oe = this.owEnemies[source.index];
                gameState.coins += source.data.coins;
                // Defeat enemy
                if (oe.patrolTween) oe.patrolTween.stop();
                oe.alive = false;
                this.tweens.add({ targets: oe.sprite, alpha: 0, duration: 400 });
                // Respawn after 20s
                this.time.delayedCall(20000, function() {
                    if (!oe.sprite || !oe.sprite.active) return;
                    oe.sprite.setPosition(oe.homeX, oe.homeY).setAlpha(1);
                    oe.alive = true;
                    var ed = oe.data, T = self.T;
                    var pd = ed.patrolRange * T;
                    var tp = { targets: oe.sprite, duration: 800 * ed.patrolRange, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 };
                    if (ed.patrolAxis === 'x') {
                        tp.x = { from: oe.homeX - pd, to: oe.homeX + pd };
                        tp.onYoyo = function() { oe.sprite.setFlipX(false); };
                        tp.onRepeat = function() { oe.sprite.setFlipX(true); };
                    } else {
                        tp.y = { from: oe.homeY - pd, to: oe.homeY + pd };
                    }
                    oe.patrolTween = self.tweens.add(tp);
                });
                // Coin popup
                var coinTxt = this.add.text(oe.sprite.x, oe.sprite.y - 20, '+' + source.data.coins, {
                    fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#f5c842', stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5).setDepth(25);
                this.tweens.add({ targets: coinTxt, y: coinTxt.y - 40, alpha: 0, duration: 600, onComplete: function() { coinTxt.destroy(); } });
            } else {
                // Chicken correct
                this.chickenStreak++;
                gameState.coins += 3;
                var coinTxt2 = this.add.text(source.spriteRef.x, source.spriteRef.y - 20, '+3', {
                    fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#f5c842', stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5).setDepth(25);
                this.tweens.add({ targets: coinTxt2, y: coinTxt2.y - 40, alpha: 0, duration: 600, onComplete: function() { coinTxt2.destroy(); } });
            }

            try { this.sound.play('sfx-coin', { volume: 0.5 }); } catch(e) {}
            this.time.delayedCall(800, function() { self.endQuickBattle(); });

        } else {
            // WRONG
            this.qbShowingAnswer = true;
            this.qbFeedback.setText('Answer: ' + this.qbCorrectAnswer).setColor('#ff8888');

            // Shield check
            if (gameState.hasShield) {
                gameState.hasShield = false;
                this.qbFeedback.setText('Shield! Answer: ' + this.qbCorrectAnswer).setColor('#66ccff');
            } else {
                gameState.hearts--;
            }

            // Reset streak
            gameState.streak = 0;

            if (source.type === 'enemy') {
                var oeW = this.owEnemies[source.index];
                if (oeW.patrolTween) oeW.patrolTween.stop();
                // Retreat to home
                this.tweens.add({ targets: oeW.sprite, x: oeW.homeX, y: oeW.homeY, alpha: 0.3, duration: 400 });
                oeW.alive = false;
                // Respawn after 15s
                this.time.delayedCall(15000, function() {
                    if (!oeW.sprite || !oeW.sprite.active) return;
                    oeW.sprite.setAlpha(1);
                    oeW.alive = true;
                    var ed2 = oeW.data, T2 = self.T;
                    var pd2 = ed2.patrolRange * T2;
                    var tp2 = { targets: oeW.sprite, duration: 800 * ed2.patrolRange, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 };
                    if (ed2.patrolAxis === 'x') {
                        tp2.x = { from: oeW.homeX - pd2, to: oeW.homeX + pd2 };
                        tp2.onYoyo = function() { oeW.sprite.setFlipX(false); };
                        tp2.onRepeat = function() { oeW.sprite.setFlipX(true); };
                    } else {
                        tp2.y = { from: oeW.homeY - pd2, to: oeW.homeY + pd2 };
                    }
                    oeW.patrolTween = self.tweens.add(tp2);
                });
            } else {
                // Chicken wrong — lose 1 coin, reset streak, chicken chase!
                this.chickenStreak = 0;
                gameState.coins = Math.max(0, gameState.coins - 1);
                var lostTxt = this.add.text(source.spriteRef.x, source.spriteRef.y - 20, '-1', {
                    fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#ef4444', stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5).setDepth(25);
                this.tweens.add({ targets: lostTxt, y: lostTxt.y - 40, alpha: 0, duration: 600, onComplete: function() { lostTxt.destroy(); } });
                var px = this.player.x, py = this.player.y;
                for (var ci = 0; ci < this.chickens.length; ci++) {
                    var ch = this.chickens[ci];
                    if (!ch.sprite || !ch.sprite.active) continue;
                    this.tweens.add({
                        targets: ch.sprite,
                        x: px + Phaser.Math.Between(-30, 30),
                        y: py + Phaser.Math.Between(-30, 30),
                        duration: 400, yoyo: true, ease: 'Quad.easeOut'
                    });
                }
            }

            // Check death
            if (gameState.hearts <= 0) {
                this.time.delayedCall(2500, function() {
                    self.endQuickBattle();
                    try { if (self.bgm) self.bgm.stop(); } catch(e) {}
                    self.scene.stop('UIScene');
                    self.scene.start('DeathScene', { problems: gameState.totalProblems, correct: gameState.totalCorrect, bestCombo: gameState.bestCombo });
                });
                return;
            }

            this.time.delayedCall(2500, function() { self.endQuickBattle(); });
        }
    }

    endQuickBattle() {
        if (this.quickBattleContainer) {
            this.quickBattleContainer.destroy(true);
            this.quickBattleContainer = null;
        }
        if (this.qbKeyHandler) {
            this.input.keyboard.off('keydown', this.qbKeyHandler);
            this.qbKeyHandler = null;
        }
        this.quickBattleActive = false;
        this.qbShowingAnswer = false;
        // Brief encounter immunity
        var self = this;
        this.encounterImmunity = true;
        this.time.delayedCall(200, function() { self.encounterImmunity = false; });
    }
}

// ============================================================
// COMBAT SCENE
// ============================================================
class CombatScene extends Phaser.Scene {
    constructor() { super({ key: 'CombatScene' }); }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.W = w; this.H = h;

        // Load land config first (needed for background)
        var landConfig = LAND_CONFIGS[gameState.currentLand];
        this.landConfig = landConfig;

        // Themed background
        this.drawCombatBackground(gameState.currentLand);

        // Vignette overlay (dark edges, draws eye to center)
        var vig = this.add.graphics().setDepth(3);
        vig.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0.6, 0.6, 0, 0);
        vig.fillRect(0, 0, w, 60);
        vig.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0, 0, 0.5, 0.5);
        vig.fillRect(0, h - 40, w, 40);
        vig.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0.4, 0, 0, 0.4);
        vig.fillRect(0, 0, 30, h);
        vig.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0, 0.4, 0.4, 0);
        vig.fillRect(w - 30, 0, 30, h);

        // Combat music
        this.sound.mute = gameMuted;
        try { this.combatMusic = this.sound.add('music-combat', { loop: true, volume: 0.35 }); this.combatMusic.play(); } catch(e) {}

        // Combat state
        var allEncounters = landConfig.encounters;
        var shuffled = shuffleArray(allEncounters);
        this.encounters = [shuffled[0], shuffled[1]];
        this.bossData = landConfig.bossData;
        this.encounterIndex = 0;
        this.isBoss = false;
        this.bossEnraged = false;
        this.typedAnswer = '';
        this.combatActive = true;
        this.showingAnswer = false;
        this.sessionProblems = 0;
        this.sessionCorrect = 0;

        // Missed-problem re-queue (spaced repetition lite)
        this.missedQueue = [];
        this.problemsSinceMiss = 0;
        this.missedRetry = false;

        // Frustration escape valve — track consecutive wrong answers
        this.consecutiveWrong = 0;
        this.frustrationEscape = false;

        // Special cutscene flags (only play once per combat session)
        this.played67 = false;
        this.played88 = false;

        // Tiered problem pools from config (shuffled, refill when exhausted)
        var pools = landConfig.problemPools;
        this.easySource = pools.easy;
        this.mediumSource = pools.medium;
        this.hardSource = pools.hard;
        this.easyPool = shuffleArray(pools.easy);
        this.easyIndex = 0;
        this.mediumPool = shuffleArray(pools.medium);
        this.mediumIndex = 0;
        this.hardPool = shuffleArray(pools.hard);
        this.hardIndex = 0;

        // Red tint overlay (hidden initially)
        this.redOverlay = this.add.rectangle(w/2, h/2, w, h, 0xff0000, 0).setDepth(200);

        // Launch UIScene for hearts
        this.scene.launch('UIScene');

        // Start first encounter
        this.startEncounter(this.encounters[0]);
    }

    drawCombatBackground(landNum) {
        var w = this.W, h = this.H;
        var bg = this.landConfig.combatBg || {};
        var skyTop = bg.skyTop || 0x87CEEB;
        var skyBot = bg.skyBot || 0x5BA3D9;

        // Sky gradient (6 horizontal strips for smooth gradient)
        var skyH = h * 0.35;
        for (var i = 0; i < 6; i++) {
            var t = i / 5;
            var stripH = skyH / 6;
            var stripY = i * stripH + stripH / 2;
            var r1 = (skyTop >> 16) & 0xff, g1 = (skyTop >> 8) & 0xff, b1 = skyTop & 0xff;
            var r2 = (skyBot >> 16) & 0xff, g2 = (skyBot >> 8) & 0xff, b2 = skyBot & 0xff;
            var r = Math.round(r1 + (r2 - r1) * t);
            var g = Math.round(g1 + (g2 - g1) * t);
            var b = Math.round(b1 + (b2 - b1) * t);
            this.add.rectangle(w / 2, stripY, w, stripH + 2, (r << 16) | (g << 8) | b).setDepth(0);
        }

        // Far hills (soft overlapping ellipses)
        var hillY = skyH;
        var hillFar = bg.hillFar || 0x4a8a3c;
        for (var hi = 0; hi <= w; hi += Math.round(w / 5)) {
            this.add.ellipse(hi, hillY + 15, 140, 70, hillFar, 0.7).setDepth(1);
        }

        // Near hills
        var hillNear = bg.hillNear || 0x6aaa4c;
        for (var hi2 = 0; hi2 <= w; hi2 += Math.round(w / 4)) {
            this.add.ellipse(hi2, hillY + 45, 160, 80, hillNear, 0.85).setDepth(1);
        }

        // Ground fill
        var groundColor = bg.ground || 0x5a9a3c;
        this.add.rectangle(w / 2, hillY + 100 + (h - hillY - 100) / 2, w, h - hillY - 60, groundColor).setDepth(1);

        // Ground line accent
        var groundDark = bg.groundDark || 0x4a8a2c;
        this.add.rectangle(w / 2, hillY + 70, w, 4, groundDark, 0.5).setDepth(2);

        // Land-specific ambient elements
        if (landNum === 2) {
            // River: subtle water band in background
            var waterY = hillY + 35;
            this.add.rectangle(w / 2, waterY, w, 20, bg.water || 0x2070b6, 0.5).setDepth(1);
            var shimmer = this.add.rectangle(w / 2 - 40, waterY, w * 0.5, 4, bg.waterShine || 0x4d9de2, 0.25).setDepth(1);
            this.tweens.add({ targets: shimmer, alpha: 0.08, x: shimmer.x + 30, duration: 3000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        } else {
            // Meadow: a few distant tree silhouettes
            var treePositions = [60, 200, 380];
            for (var i = 0; i < treePositions.length; i++) {
                var tx = treePositions[i];
                this.add.rectangle(tx, hillY + 20, 6, 24, 0x5a3a1a, 0.4).setDepth(1);
                this.add.circle(tx, hillY + 6, 16, 0x228B22, 0.35).setDepth(1);
            }
        }

        // Battle platform (where characters stand) — subtle raised strip
        var platY = 200;
        this.add.rectangle(w / 2, platY, 440, 8, bg.platform || 0x8B7355, 0.4).setDepth(2);
        this.add.rectangle(w / 2, platY + 5, 420, 3, bg.platformEdge || 0x7A6244, 0.3).setDepth(2);

        // Dark overlay below battle area (for numpad readability)
        this.add.rectangle(w / 2, 650, w, 420, 0x0d1117, 0.85).setDepth(2);
    }

    startEncounter(enemyData) {
        var w = this.W, h = this.H, self = this;
        var cbg = this.landConfig.combatBg || {};
        this.currentEnemy = {
            name: enemyData.name,
            hp: enemyData.hp,
            maxHp: enemyData.maxHp,
            sprite: enemyData.sprite,
            anim: enemyData.anim,
            scale: enemyData.scale || 5,
            isBoss: enemyData.isBoss || false,
            coins: enemyData.coins
        };
        this.combatActive = true;
        this.typedAnswer = '';
        this.showingAnswer = false;

        // Clear previous combat elements
        if (this.combatContainer) this.combatContainer.destroy(true);
        this.combatContainer = this.add.container(0, 0).setDepth(10);

        // === POKEMON-STYLE BATTLE LAYOUT ===

        // --- ENEMY ZONE (upper-right, y: 20-200) ---

        // Enemy info panel (Pokemon-style: name + HP bar in rounded panel, upper-right)
        var infoPanelX = w - 140, infoPanelY = 52;
        var infoPanel = this.add.rectangle(infoPanelX, infoPanelY, 250, 70, 0x000000, 0.45).setStrokeStyle(2, 0xffffff, 0.12);
        this.combatContainer.add(infoPanel);

        this.enemyNameText = this.add.text(infoPanelX - 100, infoPanelY - 20, this.currentEnemy.name, {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '800', color: '#ffffff',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0, 0.5);
        this.combatContainer.add(this.enemyNameText);

        // HP bar (inside info panel)
        var hpBarX = infoPanelX - 100;
        var hpBarBg = this.add.rectangle(infoPanelX, infoPanelY + 10, 220, 16, 0x222222, 0.9).setStrokeStyle(1, 0x555555);
        this.combatContainer.add(hpBarBg);
        this.hpBarGhost = this.add.rectangle(infoPanelX - 108, infoPanelY + 10, 216, 12, 0x666666).setOrigin(0, 0.5);
        this.combatContainer.add(this.hpBarGhost);
        this.hpBarFill = this.add.rectangle(infoPanelX - 108, infoPanelY + 10, 216, 12, 0x22c55e).setOrigin(0, 0.5);
        this.combatContainer.add(this.hpBarFill);
        this.hpText = this.add.text(infoPanelX, infoPanelY + 10, this.currentEnemy.hp + ' / ' + this.currentEnemy.maxHp, {
            fontFamily: 'Nunito', fontSize: '12px', fontStyle: '800', color: '#ffffff',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5);
        this.combatContainer.add(this.hpText);

        // Shield indicator
        if (gameState.hasShield) {
            this.shieldText = this.add.text(infoPanelX, infoPanelY + 30, 'SHIELD', {
                fontFamily: 'Nunito', fontSize: '12px', fontStyle: '700', color: '#66ccff'
            }).setOrigin(0.5);
            this.combatContainer.add(this.shieldText);
        }

        // Enemy sprite — upper-right area, bigger presence
        var enemyHomeX = w/2 + 80, enemyHomeY = 160;
        var startY = this.currentEnemy.isBoss ? -60 : enemyHomeY;
        this.enemyHomeX = enemyHomeX;
        this.enemyHomeY = enemyHomeY;
        // Shadow under enemy
        var enemyShadow = this.add.ellipse(enemyHomeX, enemyHomeY + 35, 70, 18, 0x000000, 0.3);
        this.combatContainer.add(enemyShadow);
        this.enemyShadow = enemyShadow;
        this.enemySprite = this.add.sprite(enemyHomeX, startY, this.currentEnemy.sprite, 0)
            .setScale(this.currentEnemy.scale + 1);
        if (this.anims.exists(this.currentEnemy.anim)) {
            this.enemySprite.play(this.currentEnemy.anim);
        }
        this.combatContainer.add(this.enemySprite);

        // --- BATTLEFIELD SEPARATOR (perspective ground line) ---
        var battleLineY = 240;
        this.add.rectangle(w/2, battleLineY, w - 40, 2, 0xffffff, 0.06).setDepth(5);

        // --- PROBLEM ZONE (center, y: 250-310) ---
        var probBg = this.add.rectangle(w/2, 280, 340, 60, 0x0d1117, 0.75).setStrokeStyle(2, 0x3355aa, 0.5);
        this.combatContainer.add(probBg);
        this.problemText = this.add.text(w/2, 280, '', {
            fontFamily: 'Nunito', fontSize: '46px', fontStyle: '900', color: '#ffffff',
