function generateNinjaCode() {
    var adj = ['RED','BLUE','DARK','SWIFT','BOLD','IRON','JADE','GOLD','SHADOW','STORM'];
    var ani = ['FOX','OWL','WOLF','BEAR','HAWK','LYNX','CRANE','TIGER','PANDA','VIPER'];
    return adj[Math.floor(Math.random()*10)] + '-' + ani[Math.floor(Math.random()*10)] + '-' + (Math.floor(1000 + Math.random()*9000));
}

function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}

// ============================================================
// SPLASH SCENE
// ============================================================
class SplashScene extends Phaser.Scene {
    constructor() { super({ key: 'SplashScene' }); }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.transitioning = false;
        this.cameras.main.setBackgroundColor('#000000');
        var res = window.devicePixelRatio || 3;
        var logoY = h * 0.38;

        // === CRT POWER-ON EFFECT ===
        // White horizontal scanline sweeps down the screen
        var powerLine = this.add.rectangle(w/2, 0, w, 3, 0xffffff, 0.9).setDepth(50);
        this.tweens.add({
            targets: powerLine, y: h, duration: 400, ease: 'Quad.easeIn',
            onComplete: function() { powerLine.destroy(); }
        });

        // Brief white flash after sweep
        var flash = this.add.rectangle(w/2, h/2, w, h, 0xffffff, 0).setDepth(49);
        this.tweens.add({ targets: flash, alpha: 0.15, duration: 100, delay: 300, yoyo: true, hold: 50,
            onComplete: function() { flash.destroy(); }
        });

        // === CRT SCANLINES OVERLAY ===
        var scanGfx = this.add.graphics().setDepth(40).setAlpha(0);
        for (var sy = 0; sy < h; sy += 4) {
            scanGfx.fillStyle(0x000000, 0.15);
            scanGfx.fillRect(0, sy, w, 2);
        }
        this.tweens.add({ targets: scanGfx, alpha: 1, duration: 500, delay: 400 });

        // === CRT VIGNETTE (dark corners) ===
        var vigGfx = this.add.graphics().setDepth(39).setAlpha(0);
        vigGfx.fillStyle(0x000000, 0.4);
        vigGfx.fillRect(0, 0, w, 30); vigGfx.fillRect(0, h - 30, w, 30);
        vigGfx.fillRect(0, 0, 20, h); vigGfx.fillRect(w - 20, 0, 20, h);
        vigGfx.fillStyle(0x000000, 0.2);
        vigGfx.fillRect(0, 30, w, 20); vigGfx.fillRect(0, h - 50, w, 20);
        vigGfx.fillRect(20, 0, 15, h); vigGfx.fillRect(w - 35, 0, 15, h);
        this.tweens.add({ targets: vigGfx, alpha: 1, duration: 600, delay: 400 });

        // === BROUGHT TO YOU BY — flickers on like a CRT warming up ===
        var brought = this.add.text(w/2, logoY - 40, 'Brought to you by', {
            fontFamily: 'Nunito', fontSize: '14px', fontStyle: '600', color: '#557766'
        }).setOrigin(0.5).setAlpha(0).setResolution(res).setDepth(10);
        // Rapid flicker sequence: on-off-on-off-on (CRT warmup)
        this.time.delayedCall(500, function() {
            self.tweens.add({ targets: brought, alpha: 0.6, duration: 40, yoyo: true, repeat: 2, onComplete: function() {
                self.tweens.add({ targets: brought, alpha: 0.3, duration: 50, yoyo: true, onComplete: function() {
                    brought.setAlpha(0.8);
                }});
            }});
        });

        // === GIFTED YOUNGSTERS — typewriter character reveal ===
        var titleStr = 'GIFTED YOUNGSTERS';
        var titleText = this.add.text(w/2, logoY, '', {
            fontFamily: 'Nunito', fontSize: '32px', fontStyle: '900', color: '#f5c842',
            stroke: '#000000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(10).setResolution(res);
        // Blinking cursor
        var cursor = this.add.text(w/2, logoY, '_', {
            fontFamily: 'Nunito', fontSize: '32px', fontStyle: '900', color: '#f5c842'
        }).setOrigin(0, 0.5).setDepth(10).setResolution(res);
        this.tweens.add({ targets: cursor, alpha: 0, duration: 300, yoyo: true, repeat: -1 });

        // Type characters one by one
        var charIdx = 0;
        this.time.addEvent({
            delay: 70, repeat: titleStr.length - 1,
            callback: function() {
                charIdx++;
                titleText.setText(titleStr.substring(0, charIdx));
                cursor.x = titleText.x + titleText.width/2 + 2;
                if (charIdx >= titleStr.length) cursor.destroy();
            }
        });

        // === GLOW behind title (fades in after typing) ===
        var glow = this.add.circle(w/2, logoY, 80, 0xf5c842, 0).setDepth(0);
        this.tweens.add({ targets: glow, alpha: 0.08, scaleX: 1.5, scaleY: 1.5, duration: 1200, delay: 500 + titleStr.length * 70, ease: 'Sine.easeOut' });

        // === SUBTITLE — fades in after title typed ===
        var subtitle = this.add.text(w/2, logoY + 50, 'Apps made for ADHD and other\nNeurodivergent children', {
            fontFamily: 'Nunito', fontSize: '15px', fontStyle: '600', color: '#668877',
            stroke: '#000000', strokeThickness: 2, align: 'center', lineSpacing: 4
        }).setOrigin(0.5).setAlpha(0).setResolution(res).setDepth(10);
        this.tweens.add({ targets: subtitle, alpha: 0.8, duration: 600, delay: 500 + titleStr.length * 70 + 200 });

        // === DECORATIVE LINE ===
        var line = this.add.rectangle(w/2, logoY + 85, 0, 2, 0x334433).setDepth(10);
        this.tweens.add({ targets: line, width: 200, duration: 600, delay: 500 + titleStr.length * 70 + 500, ease: 'Quad.easeOut' });

        // === SUBTLE CRT FLICKER (periodic) ===
        var screenOverlay = this.add.rectangle(w/2, h/2, w, h, 0xffffff, 0).setDepth(45);
        this.time.addEvent({
            delay: 800, repeat: 3,
            callback: function() {
                self.tweens.add({ targets: screenOverlay, alpha: 0.03, duration: 30, yoyo: true });
            }
        });

        function goToBoot() {
            if (self.transitioning) return;
            self.transitioning = true;
            // CRT power-off effect: screen squeezes to horizontal line then dot
            var blackout = self.add.rectangle(w/2, h/2, w, h, 0x000000, 0).setDepth(60);
            self.tweens.add({ targets: blackout, alpha: 1, duration: 200 });
            self.tweens.add({
                targets: self.cameras.main, scaleY: 0.005, duration: 200, delay: 100,
                onComplete: function() {
                    self.scene.start('BootScene');
                }
            });
        }

        // Transition to BootScene after 4.5s (extra time for typewriter)
        this.time.delayedCall(4500, goToBoot);

        // Skip on click/tap/key
        this.input.on('pointerdown', goToBoot);
        this.input.keyboard.on('keydown', goToBoot);
    }
}

        if (failedAssets.has('boss-frog')) {
            var bfg = this.make.graphics({ add: false });
            for (var bfi = 0; bfi < 5; bfi++) { bfg.fillStyle(0x338844); bfg.fillRect(bfi*40+4, 4, 32, 32); }
            bfg.generateTexture('boss-frog', 200, 40);
            var bft = this.textures.get('boss-frog');
            for (bfi = 0; bfi < 5; bfi++) bft.add(bfi, 0, bfi*40, 0, 40, 40);
            bfg.destroy();
        }
        if (!failedAssets.has('boss-frog') || true) {
            this.anims.create({ key: 'boss-frog-idle', frames: this.anims.generateFrameNumbers('boss-frog', { start: 0, end: 4 }), frameRate: 4, repeat: -1 });
        }
        // Boss serpent — procedurally generated water serpent (80x80, 6 frames)
        this.generateSerpentBoss();
        this.anims.create({ key: 'boss-serpent-idle', frames: this.anims.generateFrameNumbers('boss-serpent', { start: 0, end: 5 }), frameRate: 5, repeat: -1 });

        // Boss bamboo oni (GiantBamboo: 62x62, 6 frames)
        if (failedAssets.has('boss-bamboo')) {
            var bbg = this.make.graphics({ add: false });
            for (var bbi = 0; bbi < 6; bbi++) { bbg.fillStyle(0x2a8a2a); bbg.fillRect(bbi*62+4, 4, 54, 54); }
            bbg.generateTexture('boss-bamboo', 372, 62);
            var bbt = this.textures.get('boss-bamboo');
            for (bbi = 0; bbi < 6; bbi++) bbt.add(bbi, 0, bbi*62, 0, 62, 62);
            bbg.destroy();
        }
        this.anims.create({ key: 'boss-bamboo-idle', frames: this.anims.generateFrameNumbers('boss-bamboo', { start: 0, end: 5 }), frameRate: 4, repeat: -1 });

        // Boss shadow knight (GiantRedSamurai: 48x48, 12 frames — use first 6)
        if (failedAssets.has('boss-knight')) {
            var bkg = this.make.graphics({ add: false });
            for (var bki = 0; bki < 12; bki++) { bkg.fillStyle(0x8822aa); bkg.fillRect(bki*48+4, 4, 40, 40); }
            bkg.generateTexture('boss-knight', 576, 48);
            var bkt = this.textures.get('boss-knight');
            for (bki = 0; bki < 12; bki++) bkt.add(bki, 0, bki*48, 0, 48, 48);
            bkg.destroy();
        }
        this.anims.create({ key: 'boss-knight-idle', frames: this.anims.generateFrameNumbers('boss-knight', { start: 0, end: 5 }), frameRate: 4, repeat: -1 });

        // Boss KAGE (TenguRed: 82x82, 6 frames)
        if (failedAssets.has('boss-kage')) {
            var bkag = this.make.graphics({ add: false });
            for (var bkai = 0; bkai < 6; bkai++) { bkag.fillStyle(0xcc2222); bkag.fillRect(bkai*82+4, 4, 74, 74); }
            bkag.generateTexture('boss-kage', 492, 82);
            var bkat = this.textures.get('boss-kage');
            for (bkai = 0; bkai < 6; bkai++) bkat.add(bkai, 0, bkai*82, 0, 82, 82);
            bkag.destroy();
        }
        this.anims.create({ key: 'boss-kage-idle', frames: this.anims.generateFrameNumbers('boss-kage', { start: 0, end: 5 }), frameRate: 4, repeat: -1 });

        this.time.delayedCall(300, function() { this.scene.start('MenuScene'); }, [], this);
    }

    makeFallback(key, w, h, color, fw, count) {
        if (!failedAssets.has(key)) return;
        var g = this.make.graphics({ add: false });
        for (var i = 0; i < count; i++) { g.fillStyle(color); g.fillRect(i*fw+2, 2, fw-4, h > fw ? fw-4 : h-4); }
        g.generateTexture(key, w, h);
        var t = this.textures.get(key);
        var cols = Math.floor(w / fw);
        var rows = Math.floor(h / (h > fw ? fw : h));
        for (var row = 0; row < rows; row++)
            for (var col = 0; col < cols; col++)
                t.add(row * cols + col, 0, col * fw, row * (h > fw ? fw : h), fw, h > fw ? fw : h);
        g.destroy();
    }

    generateSerpentBoss() {
        var fw = 80, fh = 80, nf = 6;
        var can = this.textures.createCanvas('boss-serpent', fw * nf, fh);
        var ctx = can.context;

        for (var f = 0; f < nf; f++) {
            var ox = f * fw;
            var phase = (f / nf) * Math.PI * 2;

            // Water splash behind body
            ctx.fillStyle = 'rgba(40,140,200,0.15)';
            for (var sw = 0; sw < 8; sw++) {
                var swx = 15 + sw * 7 + Math.sin(phase + sw * 0.9) * 4;
                var swy = 58 + Math.cos(phase + sw * 1.2) * 5;
                ctx.beginPath(); ctx.arc(ox + swx, swy, 3 + Math.sin(phase + sw) * 1.5, 0, Math.PI * 2); ctx.fill();
            }

            // Body path: S-curve, thick in middle, tapers at tail
            var bodyPts = [];
            for (var i = 0; i <= 24; i++) {
                var t = i / 24;
                var bx = 8 + t * 52;
                var by = 38 + Math.sin(t * Math.PI * 3 + phase) * 12;
                var r = (t < 0.15) ? t * 60 : (t > 0.85) ? (1 - t) * 53 : 9 - Math.abs(t - 0.5) * 4;
                bodyPts.push({ x: bx, y: by, r: Math.max(r, 1.5) });
            }

            // Body shadow
            for (var i = 0; i < bodyPts.length; i++) {
                var p = bodyPts[i];
                ctx.fillStyle = 'rgba(0,30,30,0.25)';
                ctx.beginPath(); ctx.arc(ox + p.x, p.y + 3, p.r + 1.5, 0, Math.PI * 2); ctx.fill();
            }

            // Body segments — gradient from dark teal back to lighter belly
            for (var i = 0; i < bodyPts.length; i++) {
                var p = bodyPts[i];
                // Back (upper half)
                ctx.fillStyle = '#0e5a5a';
                ctx.beginPath(); ctx.arc(ox + p.x, p.y, p.r, Math.PI, 0); ctx.fill();
                // Belly (lower half)
                ctx.fillStyle = '#3aaa88';
                ctx.beginPath(); ctx.arc(ox + p.x, p.y, p.r, 0, Math.PI); ctx.fill();
                // Scale highlights on back
                if (i % 3 === 0 && p.r > 4) {
                    ctx.fillStyle = '#1a7a6a';
                    ctx.beginPath(); ctx.arc(ox + p.x, p.y - p.r * 0.5, 2, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Dorsal fin ridge
            for (var i = 4; i < bodyPts.length - 4; i += 2) {
                var p = bodyPts[i];
                if (p.r > 5) {
                    ctx.fillStyle = '#0a4848';
                    ctx.beginPath();
                    ctx.moveTo(ox + p.x - 2, p.y - p.r + 1);
                    ctx.lineTo(ox + p.x, p.y - p.r - 4);
                    ctx.lineTo(ox + p.x + 2, p.y - p.r + 1);
                    ctx.closePath(); ctx.fill();
                }
            }

            // === HEAD (right side, larger) ===
            var hx = 64, hy = 38 + Math.sin(Math.PI * 3 + phase) * 12;

            // Neck glow (water energy)
            ctx.fillStyle = 'rgba(40,180,160,0.12)';
            ctx.beginPath(); ctx.arc(ox + hx - 4, hy, 16, 0, Math.PI * 2); ctx.fill();

            // Head base
            ctx.fillStyle = '#0c6060';
            ctx.beginPath(); ctx.ellipse(ox + hx, hy, 13, 10, -0.15, 0, Math.PI * 2); ctx.fill();

            // Jaw (slightly lighter)
            ctx.fillStyle = '#2a9a80';
            ctx.beginPath(); ctx.ellipse(ox + hx + 2, hy + 4, 10, 5, -0.1, 0, Math.PI); ctx.fill();

            // Crown/crest — 3 spiky fins
            ctx.fillStyle = '#084848';
            var crests = [[-5, -12], [0, -15], [5, -13]];
            for (var ci = 0; ci < crests.length; ci++) {
                ctx.beginPath();
                ctx.moveTo(ox + hx + crests[ci][0] - 3, hy - 8);
                ctx.lineTo(ox + hx + crests[ci][0], hy + crests[ci][1]);
                ctx.lineTo(ox + hx + crests[ci][0] + 3, hy - 8);
                ctx.closePath(); ctx.fill();
            }

            // Eye glow (outer)
            ctx.fillStyle = 'rgba(255,220,0,0.25)';
            ctx.beginPath(); ctx.arc(ox + hx + 5, hy - 3, 6, 0, Math.PI * 2); ctx.fill();

            // Eye (bright yellow-orange)
            var eyeGrad = ctx.createRadialGradient(ox + hx + 5, hy - 3, 0, ox + hx + 5, hy - 3, 3.5);
            eyeGrad.addColorStop(0, '#ffe040');
            eyeGrad.addColorStop(1, '#ff8800');
            ctx.fillStyle = eyeGrad;
            ctx.beginPath(); ctx.arc(ox + hx + 5, hy - 3, 3.5, 0, Math.PI * 2); ctx.fill();

            // Slit pupil
            ctx.fillStyle = '#1a0000';
            ctx.beginPath(); ctx.ellipse(ox + hx + 5, hy - 3, 1, 3, 0, 0, Math.PI * 2); ctx.fill();

            // Mouth line
            ctx.strokeStyle = '#063030';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(ox + hx + 6, hy + 4);
            ctx.quadraticCurveTo(ox + hx + 14, hy + 2, ox + hx + 13, hy + 5);
            ctx.stroke();

            // Fangs
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(ox + hx + 10, hy + 4); ctx.lineTo(ox + hx + 9, hy + 10); ctx.lineTo(ox + hx + 12, hy + 5);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(ox + hx + 7, hy + 5); ctx.lineTo(ox + hx + 6, hy + 9); ctx.lineTo(ox + hx + 9, hy + 5);
            ctx.closePath(); ctx.fill();

            // Water droplets around body
            ctx.fillStyle = 'rgba(120,220,255,0.5)';
            for (var w = 0; w < 6; w++) {
                var wx = 12 + Math.sin(phase + w * 1.4) * 28 + w * 8;
                var wy = 62 + Math.cos(phase + w * 1.8) * 4;
                ctx.beginPath(); ctx.arc(ox + wx, wy, 1.2 + Math.sin(phase + w) * 0.5, 0, Math.PI * 2); ctx.fill();
            }

            // Tail tip flourish
            var tp = bodyPts[0];
            ctx.fillStyle = '#0a5050';
            ctx.beginPath();
            ctx.moveTo(ox + tp.x, tp.y - 4);
            ctx.lineTo(ox + tp.x - 6, tp.y - 8);
            ctx.lineTo(ox + tp.x - 2, tp.y);
            ctx.lineTo(ox + tp.x - 7, tp.y + 5);
            ctx.lineTo(ox + tp.x, tp.y + 3);
            ctx.closePath(); ctx.fill();
        }

        can.refresh();

        // Register frames
        var tex = this.textures.get('boss-serpent');
        for (var fi = 0; fi < nf; fi++) {
            tex.add(fi, 0, fi * fw, 0, fw, fh);
        }
    }
}

// ============================================================
// PROLOGUE SCENE — Cinematic story intro
// ============================================================
class PrologueScene extends Phaser.Scene {
    constructor() { super({ key: 'PrologueScene' }); }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.w = w; this.h = h;
        this.prologueStep = 0;

        // Pure black background
        this.add.rectangle(w/2, h/2, w, h, 0x000000);

        // Cinematic letterbox bars
        this.topBar = this.add.rectangle(w/2, 0, w, 80, 0x000000).setOrigin(0.5, 0).setDepth(500);
        this.botBar = this.add.rectangle(w/2, h, w, 80, 0x000000).setOrigin(0.5, 1).setDepth(500);

        // Starfield background (subtle, slowly drifting)
        this.stars = [];
        for (var i = 0; i < 40; i++) {
            var sx = Phaser.Math.Between(10, w - 10);
            var sy = Phaser.Math.Between(90, h - 90);
            var sz = Phaser.Math.FloatBetween(0.5, 2);
            var star = this.add.circle(sx, sy, sz, 0xffffff, Phaser.Math.FloatBetween(0.1, 0.4)).setDepth(0);
            this.tweens.add({ targets: star, alpha: 0.05, duration: Phaser.Math.Between(1500, 4000), yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 2000) });
            this.stars.push(star);
        }

        // Container for all story elements (easy cleanup)
        this.storyContainer = this.add.container(0, 0).setDepth(10);

        // Skip button (always visible)
        var skipBtn = this.add.text(w - 30, h - 50, 'SKIP \u25B6', {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#555566'
        }).setOrigin(1, 0.5).setDepth(501).setInteractive({ useHandCursor: true });
        skipBtn.on('pointerover', function() { skipBtn.setColor('#aaaacc'); });
        skipBtn.on('pointerout', function() { skipBtn.setColor('#555566'); });
        skipBtn.on('pointerup', function() { self.endPrologue(); });

        // Keyboard skip
        this.input.keyboard.on('keydown-SPACE', function() {
            if (self.prologueStep >= 5) self.endPrologue();
            else self.prologueStep = 99; // fast-forward flag
        });
        this.input.keyboard.on('keydown-ENTER', function() { self.endPrologue(); });
        this.input.keyboard.on('keydown-ESC', function() { self.endPrologue(); });

        // Prologue music — epic story theme
        try {
            this.sound.mute = gameMuted;
            this.prologueMusic = this.sound.add('music-story', { volume: 0.5, loop: true });
            this.prologueMusic.play();
        } catch(e) {}

        // Start the cinematic sequence
        this.runPrologue();
    }

    typewriterText(x, y, text, style, speed, cb) {
        var self = this;
        speed = speed || 35;
        var fullText = text;
        var display = this.add.text(x, y, '', style).setOrigin(0.5).setDepth(20).setAlpha(1);
        this.storyContainer.add(display);
        var charIndex = 0;
        var timer = this.time.addEvent({
            delay: speed,
            callback: function() {
                charIndex++;
                display.setText(fullText.substring(0, charIndex));
                if (charIndex >= fullText.length) {
                    timer.remove();
                    if (cb) cb(display);
                }
            },
            loop: true
        });
        return display;
    }

    fadeIn(gameObj, duration, delay) {
        gameObj.setAlpha(0);
        this.tweens.add({ targets: gameObj, alpha: 1, duration: duration || 800, delay: delay || 0 });
        return gameObj;
    }

    clearStory(duration, cb) {
        var self = this;
        this.tweens.add({
            targets: this.storyContainer, alpha: 0, duration: duration || 600,
            onComplete: function() {
                self.storyContainer.removeAll(true);
                self.storyContainer.setAlpha(1);
                if (cb) cb();
            }
        });
    }

    runPrologue() {
        var w = this.w, h = this.h, self = this;

        // === BEAT 1: "Long ago..." (0-3.5s) ===
        this.time.delayedCall(500, function() {
            self.prologueStep = 1;
            self.typewriterText(w/2, h/2 - 40,
                'Long ago, the ninja world\nwas protected by a sacred artifact...',
                { fontFamily: 'Nunito', fontSize: '24px', fontStyle: '700', color: '#8888aa', align: 'center', lineSpacing: 8 },
                40
            );
        });

        // === BEAT 2: THE SCROLL OF NUMBERS (3.5-7.5s) ===
        this.time.delayedCall(3800, function() {
            if (self.prologueStep >= 99) return;
            self.prologueStep = 2;
            self.clearStory(400, function() {
                var cx = w / 2, cy = h / 2 - 50;

                // Outer aura — large soft gold pulse
                var auraOuter = self.add.circle(cx, cy, 100, 0xf5c842, 0.06).setDepth(2);
                self.storyContainer.add(auraOuter);
                self.tweens.add({ targets: auraOuter, scaleX: 1.6, scaleY: 1.6, alpha: 0.02, duration: 2000, yoyo: true, repeat: -1 });

                // Middle aura — warm glow
                var auraMid = self.add.circle(cx, cy, 60, 0xffdd66, 0.1).setDepth(3);
                self.storyContainer.add(auraMid);
                self.tweens.add({ targets: auraMid, scaleX: 1.3, scaleY: 1.3, alpha: 0.04, duration: 1500, yoyo: true, repeat: -1, delay: 200 });

                // Scroll body — layered for depth
                var scrollShadow = self.add.rectangle(cx + 3, cy + 3, 70, 95, 0x000000, 0.4).setDepth(5);
                self.storyContainer.add(scrollShadow);

                // Scroll parchment (main body)
                var scrollBody = self.add.rectangle(cx, cy, 70, 95, 0xf5d98a, 0.95).setDepth(6);
                self.storyContainer.add(scrollBody);
                self.fadeIn(scrollBody, 800);
                self.fadeIn(scrollShadow, 800);

                // Scroll edge highlights (left and right rollers)
                var rollerL = self.add.rectangle(cx - 35, cy, 8, 105, 0xc4944a).setDepth(7);
                var rollerR = self.add.rectangle(cx + 35, cy, 8, 105, 0xc4944a).setDepth(7);
                self.storyContainer.add(rollerL);
                self.storyContainer.add(rollerR);
                self.fadeIn(rollerL, 600);
                self.fadeIn(rollerR, 600);

                // Roller caps (top/bottom knobs)
                var caps = [
                    { x: cx - 35, y: cy - 53 }, { x: cx - 35, y: cy + 53 },
                    { x: cx + 35, y: cy - 53 }, { x: cx + 35, y: cy + 53 }
                ];
                for (var c = 0; c < caps.length; c++) {
                    var cap = self.add.circle(caps[c].x, caps[c].y, 7, 0xd4a44a).setStrokeStyle(1, 0xffffff, 0.3).setDepth(8).setAlpha(0);
                    self.storyContainer.add(cap);
                    self.tweens.add({ targets: cap, alpha: 1, duration: 500, delay: 400 });
                }

                // Horizontal lines on the scroll (text markings)
                for (var line = 0; line < 6; line++) {
                    var lw = Phaser.Math.Between(24, 48);
                    var lx = cx - lw / 2 + Phaser.Math.Between(-5, 5);
                    var ly = cy - 32 + line * 13;
                    var mark = self.add.rectangle(lx + lw / 2, ly, lw, 2, 0xb08040, 0.3).setDepth(9).setAlpha(0);
                    self.storyContainer.add(mark);
                    self.tweens.add({ targets: mark, alpha: 1, duration: 300, delay: 600 + line * 80 });
                }

                // Golden shimmer particles drifting upward around scroll
                for (var p = 0; p < 12; p++) {
                    var px = cx + Phaser.Math.Between(-50, 50);
                    var py = cy + Phaser.Math.Between(50, 70);
                    var pSize = Phaser.Math.FloatBetween(1, 3);
                    var shimmer = self.add.circle(px, py, pSize, 0xf5c842, Phaser.Math.FloatBetween(0.3, 0.7)).setDepth(11);
                    self.storyContainer.add(shimmer);
                    self.tweens.add({
                        targets: shimmer, y: py - Phaser.Math.Between(80, 160), alpha: 0,
                        x: px + Phaser.Math.Between(-20, 20),
                        duration: Phaser.Math.Between(2000, 4000), delay: Phaser.Math.Between(300, 1500), repeat: -1
                    });
                }

                // Orbiting math symbols — larger ring, glow behind each
                var symbols = ['+', '\u2212', '\u00d7', '\u00f7', '='];
                var symColors = [0x22c55e, 0x3b82f6, 0x22aa44, 0x8844ff, 0xf5c842];
                for (var i = 0; i < symbols.length; i++) {
                    var angle = (i / symbols.length) * Math.PI * 2 - Math.PI / 2;
                    var orbitR = 80;
                    var ox = cx + Math.cos(angle) * orbitR;
                    var oy = cy + Math.sin(angle) * orbitR;

                    // Glow behind symbol
                    var symGlow = self.add.circle(ox, oy, 14, symColors[i], 0.2).setDepth(12).setAlpha(0);
                    self.storyContainer.add(symGlow);
                    self.tweens.add({ targets: symGlow, alpha: 0.15, duration: 400, delay: i * 180 + 500 });
                    // Continuous orbit tween for glow
                    (function(glow, idx, r) {
                        var startA = (idx / 5) * Math.PI * 2 - Math.PI / 2;
                        self.tweens.addCounter({
                            from: 0, to: 360, duration: 6000, repeat: -1,
                            onUpdate: function(tw) {
                                var a = startA + Phaser.Math.DegToRad(tw.getValue());
                                glow.setPosition(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                            }
                        });
                    })(symGlow, i, orbitR);

                    var sym = self.add.text(ox, oy, symbols[i], {
                        fontFamily: 'Nunito', fontSize: '24px', fontStyle: '900', color: '#ffffff',
                        stroke: '#000000', strokeThickness: 2
                    }).setOrigin(0.5).setDepth(13).setAlpha(0);
                    self.storyContainer.add(sym);
                    self.tweens.add({ targets: sym, alpha: 0.85, duration: 400, delay: i * 180 + 500 });
                    // Orbit the symbol too
                    (function(s, idx, r) {
                        var startA = (idx / 5) * Math.PI * 2 - Math.PI / 2;
                        self.tweens.addCounter({
                            from: 0, to: 360, duration: 6000, repeat: -1,
                            onUpdate: function(tw) {
                                var a = startA + Phaser.Math.DegToRad(tw.getValue());
                                s.setPosition(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                            }
                        });
                    })(sym, i, orbitR);
                }

                // Title — bigger, with glow
                self.time.delayedCall(600, function() {
                    var titleGlow = self.add.text(w/2, h/2 + 70, 'THE SCROLL OF NUMBERS', {
                        fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#f5c842'
                    }).setOrigin(0.5).setDepth(19).setAlpha(0);
                    self.storyContainer.add(titleGlow);
                    // Blurred glow behind
                    self.tweens.add({ targets: titleGlow, alpha: 0.3, duration: 500, delay: 100 });

                    var titleText = self.add.text(w/2, h/2 + 70, 'THE SCROLL OF NUMBERS', {
                        fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: '#f5c842',
                        stroke: '#000000', strokeThickness: 4
                    }).setOrigin(0.5).setDepth(20).setScale(0);
                    self.storyContainer.add(titleText);
                    self.tweens.add({ targets: titleText, scaleX: 1, scaleY: 1, duration: 600, ease: 'Back.easeOut', delay: 200 });
                });
            });
        });

        // === BEAT 3: KAGE APPEARS (7.5-14.5s) ===
        this.time.delayedCall(7800, function() {
            if (self.prologueStep >= 99) return;
            self.prologueStep = 3;
            self.clearStory(500, function() {
                var cx = w / 2, cy = h / 2 - 20;

                // Slow creeping red fog from edges
                var fogL = self.add.rectangle(0, h/2, w * 0.6, h, 0x1a0000, 0).setOrigin(0, 0.5).setDepth(1);
                var fogR = self.add.rectangle(w, h/2, w * 0.6, h, 0x1a0000, 0).setOrigin(1, 0.5).setDepth(1);
                self.storyContainer.add(fogL);
                self.storyContainer.add(fogR);
                self.tweens.add({ targets: [fogL, fogR], alpha: 0.35, duration: 1500 });

                // Dark tendrils radiating from center (8 shadow lines)
                for (var t = 0; t < 8; t++) {
                    var tAngle = (t / 8) * Math.PI * 2;
                    var tendril = self.add.rectangle(cx, cy, 3, 0, 0x220000, 0.4).setOrigin(0.5, 1)
                        .setAngle(tAngle * 180 / Math.PI + 90).setDepth(2);
                    self.storyContainer.add(tendril);
                    self.tweens.add({
                        targets: tendril, displayHeight: Phaser.Math.Between(120, 250),
                        duration: 2000, delay: t * 100, ease: 'Quad.easeOut'
                    });
                }

                // Kage body — built from shapes for a humanoid silhouette
                // Cloak / body (triangle-ish)
                var cloakPts = [
                    { x: cx - 30, y: cy + 50 }, { x: cx + 30, y: cy + 50 },
                    { x: cx + 18, y: cy - 10 }, { x: cx - 18, y: cy - 10 }
                ];
                var cloak = self.add.rectangle(cx, cy + 20, 60, 60, 0x080808).setDepth(10).setAlpha(0);
                self.storyContainer.add(cloak);

        // === BEAT 4: SCROLL SHATTERS (15-22s) ===
        this.time.delayedCall(15000, function() {

                        // Scroll explodes — pieces fly

                        self.tweens.add({ targets: scrollRR, alpha: 0, x: cx + 100, angle: 90, duration: 500, ease: 'Quad.easeOut' });

                        // Central explosion flash

                        self.storyContainer.add(explosionFlash);
                        self.tweens.add({ targets: explosionFlash, scaleX: 10, scaleY: 10, alpha: 0, duration: 400, ease: 'Quad.easeOut',

                        // Shockwave ring
                        var shockwave = self.add.circle(cx, cy, 10, 0xf5c842, 0).setStrokeStyle(3, 0xf5c842, 0.8).setDepth(24);
                        self.storyContainer.add(shockwave);
                        self.tweens.add({ targets: shockwave, scaleX: 12, scaleY: 12, alpha: 0, duration: 600, ease: 'Quad.easeOut',

                        // 5 fragments fly outward with trails
                        var fragColors = [0x22c55e, 0x3b82f6, 0x22aa44, 0x8844ff, 0xf5c842];
                        var fragSyms = ['+', '\u2212', '\u00d7', '\u00f7', '\u221e'];
                        var fragNames = ['Sums', 'Differences', 'Products', 'Quotients', 'Balance'];
                        var fragTargets = [

                            { x: w - 40, y: cy + 100 }, // bottom-right
                            { x: cx, y: cy + 200 }     // bottom-center
                        ];

                        for (var i = 0; i < 5; i++) {
                            (function(idx) {
                                var delay = idx * 100 + 50;

                                // Fragment glow trail
                                var fragGlow = self.add.circle(cx, cy, 18, fragColors[idx], 0.4).setDepth(20);
                                self.storyContainer.add(fragGlow);
                                self.tweens.add({
                                    targets: fragGlow,
                                    x: fragTargets[idx].x, y: fragTargets[idx].y,

                                // Fragment circle
                                var frag = self.add.circle(cx, cy, 14, fragColors[idx], 0.95)
                                    .setStrokeStyle(2, 0xffffff, 0.7).setDepth(22);
                                self.storyContainer.add(frag);

                                // Symbol on fragment
                                var fragSym = self.add.text(cx, cy, fragSyms[idx], {
                                    fontFamily: 'Nunito', fontSize: '16px', fontStyle: '900', color: '#ffffff'
                                }).setOrigin(0.5).setDepth(23);
                                self.storyContainer.add(fragSym);

                                self.tweens.add({
                                    targets: [frag, fragSym],
                                    x: fragTargets[idx].x, y: fragTargets[idx].y,
                                    duration: 1200, ease: 'Cubic.easeOut', delay: delay
                                });

                                // Fragment lingers then fades
                                self.tweens.add({
                                    targets: [frag, fragSym], alpha: 0,
                                    duration: 800, delay: delay + 1400
                                });

                                // Spark trail behind each fragment
                                for (var s = 0; s < 5; s++) {
                                    var trailDelay = delay + s * 60;
                                    var trail = self.add.circle(cx, cy, Phaser.Math.Between(1, 3), fragColors[idx], 0.6).setDepth(19);
                                    self.storyContainer.add(trail);
                                    var midX = cx + (fragTargets[idx].x - cx) * (s / 5) * 0.8 + Phaser.Math.Between(-15, 15);
                                    var midY = cy + (fragTargets[idx].y - cy) * (s / 5) * 0.8 + Phaser.Math.Between(-15, 15);
                                    self.tweens.add({
                                        targets: trail, x: midX, y: midY, alpha: 0,
                                        duration: Phaser.Math.Between(400, 700), delay: trailDelay, ease: 'Quad.easeOut',
                                        onComplete: function() { trail.destroy(); }
                                    });
                                }
                            })(i);
                        }

                        // Shatter debris — golden splinters
                        for (var j = 0; j < 30; j++) {
                            var sAngle = (j / 30) * Math.PI * 2 + Phaser.Math.FloatBetween(-0.2, 0.2);
                            var sDist = Phaser.Math.Between(50, 180);
                            var sx = cx + Math.cos(sAngle) * sDist;
                            var sy = cy + Math.sin(sAngle) * sDist;
                            var sColor = [0xf5c842, 0xffdd66, 0xffffff, 0xf5d98a, fragColors[j % 5]][j % 5];
                            var sSize = Phaser.Math.Between(1, 4);

                            self.storyContainer.add(splinter);
                            self.tweens.add({
                                targets: splinter, x: sx, y: sy, alpha: 0,

        this.time.delayedCall(22000, function() {

                );

        // === BEAT 6: HIRO RISES (27-33s) ===
        this.time.delayedCall(27500, function() {
            if (self.prologueStep >= 99) return;
            self.prologueStep = 6;
            self.clearStory(500, function() {
                self.typewriterText(w/2, h/2 - 160,
                    'Now, one young ninja must rise\nto recover the fragments...',
                    { fontFamily: 'Nunito', fontSize: '22px', fontStyle: '700', color: '#8888cc', align: 'center', lineSpacing: 6 },
                    35
                );

                // Hiro appears with dramatic light
                self.time.delayedCall(2200, function() {
                    // Light burst
                    var lightBurst = self.add.circle(w/2, h/2 + 10, 10, 0xf5c842, 0.6).setDepth(8);
                    self.storyContainer.add(lightBurst);
                    self.tweens.add({ targets: lightBurst, scaleX: 8, scaleY: 8, alpha: 0, duration: 800, ease: 'Quad.easeOut' });

                    var heroGlow = self.add.circle(w/2, h/2 + 10, 45, 0x4488ff, 0.15).setDepth(9);

                    var heroSprite = self.add.sprite(w/2, h/2 + 10, 'hiro-walk', 3).setScale(6).setDepth(15).setAlpha(0);
                    self.storyContainer.add(heroSprite);
                    self.tweens.add({ targets: heroSprite, alpha: 1, duration: 600 });

                    // HIRO name
                    self.time.delayedCall(600, function() {
                        var heroName = self.add.text(w/2, h/2 + 80, 'HIRO', {
                            fontFamily: 'Nunito', fontSize: '38px', fontStyle: '900', color: '#4488ff',

                        self.storyContainer.add(heroName);
                        self.tweens.add({ targets: heroName, scaleX: 1, scaleY: 1, duration: 500, ease: 'Back.easeOut' });

                        var heroSub = self.add.text(w/2, h/2 + 118, 'The Last Ninja', {
                            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '700', color: '#6688cc'
                        }).setOrigin(0.5).setDepth(20).setAlpha(0);
                        self.storyContainer.add(heroSub);
                        self.tweens.add({ targets: heroSub, alpha: 1, duration: 500, delay: 300 });
                    });
                });
            });
        });

        // === BEAT 7: RECOVER THE FRAGMENTS (34-39.5s) ===
        this.time.delayedCall(34000, function() {
            if (self.prologueStep >= 99) return;
            self.prologueStep = 7;
            self.clearStory(500, function() {
                var cx = w / 2, cy = h / 2;
                var fragColors = [0x22c55e, 0x3b82f6, 0x22aa44, 0x8844ff, 0xf5c842];
                var fragSyms = ['+', '\u2212', '\u00d7', '\u00f7', '\u221e'];
                var fragLabels = ['Addition', 'Subtraction', 'Multiplication', 'Division', 'Balance'];
                var fragNames = ['Fragment of\nSums', 'Fragment of\nDifferences', 'Fragment of\nProducts', 'Fragment of\nQuotients', 'The Sacred\nScroll'];

                // 5 fragments in a pentagon formation
                var radius = 100;
                var centerY = cy - 40;

                for (var i = 0; i < 5; i++) {
                    (function(idx) {
                        var angle = -Math.PI / 2 + (idx / 5) * Math.PI * 2;
                        var fx = cx + Math.cos(angle) * radius;
                        var fy = centerY + Math.sin(angle) * radius;
                        var delay = idx * 300;

                        // Connection line to center (like a constellation)
                        if (idx < 5) {
                            var nextAngle = -Math.PI / 2 + ((idx + 1) % 5 / 5) * Math.PI * 2;
                            var nx = cx + Math.cos(nextAngle) * radius;
                            var ny = centerY + Math.sin(nextAngle) * radius;
                            var lineToNext = self.add.line(0, 0, fx, fy, nx, ny, 0xffffff, 0.08).setOrigin(0).setDepth(10).setAlpha(0);
                            self.storyContainer.add(lineToNext);
                            self.tweens.add({ targets: lineToNext, alpha: 1, duration: 400, delay: delay + 600 });
                        }
                        // Line to center
                        var lineToCenter = self.add.line(0, 0, fx, fy, cx, centerY, 0xffffff, 0.05).setOrigin(0).setDepth(10).setAlpha(0);
                        self.storyContainer.add(lineToCenter);
                        self.tweens.add({ targets: lineToCenter, alpha: 1, duration: 400, delay: delay + 400 });

                        // Fragment outer glow
                        var fragGlow = self.add.circle(fx, fy, 28, fragColors[idx], 0.12).setDepth(12).setAlpha(0);
                        self.storyContainer.add(fragGlow);
                        self.tweens.add({ targets: fragGlow, alpha: 1, duration: 400, delay: delay });
                        self.tweens.add({ targets: fragGlow, scaleX: 1.4, scaleY: 1.4, alpha: 0.04, duration: 1200, yoyo: true, repeat: -1, delay: delay + 400 });

                        // Fragment circle
                        var fragCircle = self.add.circle(fx, fy, 20, fragColors[idx], 0.85)
                            .setStrokeStyle(2, 0xffffff, 0.6).setDepth(14).setScale(0);
                        self.storyContainer.add(fragCircle);
                        self.tweens.add({ targets: fragCircle, scaleX: 1, scaleY: 1, duration: 400, ease: 'Back.easeOut', delay: delay });

                        // Symbol
                        var sym = self.add.text(fx, fy, fragSyms[idx], {
                            fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff'
                        }).setOrigin(0.5).setDepth(15).setScale(0);
                        self.storyContainer.add(sym);
                        self.tweens.add({ targets: sym, scaleX: 1, scaleY: 1, duration: 400, ease: 'Back.easeOut', delay: delay + 100 });

                        // Label below
                        var label = self.add.text(fx, fy + 30, fragLabels[idx], {
                            fontFamily: 'Nunito', fontSize: '11px', fontStyle: '700', color: '#888899'
                        }).setOrigin(0.5).setDepth(15).setAlpha(0);
                        self.storyContainer.add(label);
                        self.tweens.add({ targets: label, alpha: 1, duration: 300, delay: delay + 200 });

                        // Floating sparkle per fragment
                        var sparkle = self.add.circle(fx + 12, fy - 12, 2, 0xffffff, 0).setDepth(16);
                        self.storyContainer.add(sparkle);
                        self.tweens.add({ targets: sparkle, alpha: 0.8, duration: 400, delay: delay + 300 });
                        self.tweens.add({ targets: sparkle, y: fy - 22, alpha: 0, duration: 1500, yoyo: true, repeat: -1, delay: delay + 700 });
                    })(i);
                }

                // Center scroll silhouette (empty, waiting to be restored)
                self.time.delayedCall(1800, function() {
                    var scrollOutline = self.add.rectangle(cx, centerY, 30, 40, 0x000000, 0)

                    var questionMark = self.add.text(cx, centerY, '?', {
                        fontFamily: 'Nunito', fontSize: '20px', fontStyle: '900', color: '#f5c842'
                    }).setOrigin(0.5).setDepth(14).setAlpha(0);
                    self.storyContainer.add(questionMark);
                    self.tweens.add({ targets: questionMark, alpha: 0.4, duration: 600, yoyo: true, repeat: -1, delay: 200 });
                });

                // Mission text — typed dramatically
                self.time.delayedCall(2200, function() {
                    self.typewriterText(cx, cy + 110,
                        'Recover the five fragments.\nRestore the Sacred Scroll.\nDefeat Kage.',
                        { fontFamily: 'Nunito', fontSize: '24px', fontStyle: '800', color: '#ffffff', align: 'center', lineSpacing: 14, stroke: '#000000', strokeThickness: 3 },
                        45
                    );
                });
            });
        });

        // === BEAT 8: FINAL — "Your journey begins" (40s+) ===
        this.time.delayedCall(40500, function() {
            if (self.prologueStep >= 99) return;
            self.prologueStep = 8;
            self.clearStory(800, function() {
                var finalText = self.add.text(w/2, h/2, 'Your journey begins.', {
                    fontFamily: 'Nunito', fontSize: '30px', fontStyle: '900', color: '#f5c842',
                    stroke: '#000000', strokeThickness: 4
                }).setOrigin(0.5).setDepth(20).setAlpha(0);
                self.storyContainer.add(finalText);
                self.tweens.add({
                    targets: finalText, alpha: 1, duration: 1000,
                    onComplete: function() {
                        self.tweens.add({
                            targets: finalText, alpha: 0, duration: 1500, delay: 2000,
                            onComplete: function() { self.endPrologue(); }
                        });
                    }
                });
            });
        });
    }

    endPrologue() {
        if (this.endingPrologue) return;
        this.endingPrologue = true;

        var self = this;
        // Fade out music
        try { if (this.prologueMusic) this.tweens.add({ targets: this.prologueMusic, volume: 0, duration: 800, onComplete: function() { self.prologueMusic.stop(); } }); } catch(e) {}

        // Fade to black then go to WorldScene
        this.cameras.main.fadeOut(800, 0, 0, 0);
        this.cameras.main.on('camerafadeoutcomplete', function() {
            self.scene.start('WorldScene');
        });
    }
}
