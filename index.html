        }).setOrigin(0.5);
        this.combatContainer.add(this.problemText);

        // --- HIRO ZONE (lower-left, y: 320-470) ---

        // Hiro info panel (lower-left, Pokemon-style)
        var heroInfoX = 130, heroInfoY = 330;
        var heroPanel = this.add.rectangle(heroInfoX, heroInfoY, 220, 38, 0x000000, 0.35).setStrokeStyle(1, 0xffffff, 0.1);
        this.combatContainer.add(heroPanel);

        // Combo counter (inside hero panel)
        this.comboText = this.add.text(heroInfoX - 90, heroInfoY, '', {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '900', color: '#f5c842',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0, 0.5);
        this.combatContainer.add(this.comboText);

        // Hiro sprite — lower-left, facing RIGHT toward enemy
        var heroHomeX = 100, heroHomeY = 410;
        this.heroHomeX = heroHomeX;
        this.heroHomeY = heroHomeY;
        // Shadow under Hiro
        var heroShadow = this.add.ellipse(heroHomeX, heroHomeY + 25, 50, 14, 0x000000, 0.3);
        this.combatContainer.add(heroShadow);
        this.heroShadow = heroShadow;
        // Frame 3 = right-facing (col3, row0) — already faces right toward enemy
        this.heroSprite = this.add.sprite(heroHomeX, heroHomeY, 'hiro-walk', 3).setScale(5).setDepth(11);
        this.combatContainer.add(this.heroSprite);

        // Hiro charging glow
        this.heroChargeGlow = this.add.circle(heroHomeX, heroHomeY, 35, 0x4488ff, 0).setDepth(10);
        this.combatContainer.add(this.heroChargeGlow);
        // Shadow mode glow
        this.heroGlow = this.add.circle(heroHomeX, heroHomeY, 40, 0xf5c842, 0).setDepth(10);
        this.combatContainer.add(this.heroGlow);

        // --- ANSWER + FEEDBACK AREA (right of Hiro) ---
        var ansColor = cbg.numAnswerBg || 0x16213e;
        var answerPanel = this.add.rectangle(w/2 + 70, 420, 200, 52, ansColor, 0.85).setStrokeStyle(2, 0xffffff, 0.15);
        this.combatContainer.add(answerPanel);
        this.answerText = this.add.text(w/2 + 70, 420, '', {
            fontFamily: 'Nunito', fontSize: '46px', fontStyle: '900', color: '#ffffff',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5);
        this.combatContainer.add(this.answerText);

        this.feedbackText = this.add.text(w/2, 465, '', {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '700', color: '#ffffff'
        }).setOrigin(0.5);
        this.combatContainer.add(this.feedbackText);

        // === BOTTOM AREA: Numpad (y: 500-854) ===
        this.createNumpad();

        // Keyboard input
        this.input.keyboard.removeAllListeners();
        this.input.keyboard.on('keydown', function(event) {
            if (!self.combatActive || self.showingAnswer) return;
            if (event.key >= '0' && event.key <= '9') {
                self.typeDigit(event.key);
            } else if (event.key === 'Backspace') {
                self.typeBackspace();
            } else if (event.key === 'Enter') {
                self.submitAnswer();
            }
        });

        if (this.currentEnemy.isBoss) {
            // === BOSS INTRO: cinematic 4-second entrance with story ===
            this.combatActive = false;
            var storyData = STORY.lands[gameState.currentLand] || {};

            // Dark overlay for dramatic entrance
            var bossOverlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0.6).setDepth(90);
            this.combatContainer.add(bossOverlay);

            // Story narration text (typewriter)
            var bossStoryText = this.add.text(w/2, 100, '', {
                fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#aa8866',
                align: 'center', lineSpacing: 6, stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(100);
            this.combatContainer.add(bossStoryText);

            var bossIntroMsg = storyData.bossIntro || 'A powerful enemy appears...';
            var bCharIdx = 0;
            var bTypeTimer = this.time.addEvent({
                delay: 30, callback: function() {
                    bCharIdx++;
                    bossStoryText.setText(bossIntroMsg.substring(0, bCharIdx));
                    if (bCharIdx >= bossIntroMsg.length) bTypeTimer.remove();
                }, loop: true
            });

            // Boss drops from above with bounce (delayed 1.5s for story text)
            this.time.delayedCall(1500, function() {
                self.tweens.add({
                    targets: self.enemySprite, y: self.enemyHomeY, duration: 800,
                    ease: 'Bounce.easeOut'
                });
                self.cameras.main.shake(600, 0.015);
            });

            // Boss name scales in dramatically at 2.5s
            this.time.delayedCall(2500, function() {
                var bossNameText = (storyData.bossName || self.currentEnemy.name).toUpperCase();
                var bossTitle = self.add.text(w/2, 300, bossNameText, {
                    fontFamily: 'Nunito', fontSize: '44px', fontStyle: '900', color: '#ff4444',
                    stroke: '#000000', strokeThickness: 6
                }).setOrigin(0.5).setScale(0).setDepth(100);
                self.combatContainer.add(bossTitle);
                self.tweens.add({
                    targets: bossTitle, scaleX: 1.05, scaleY: 1.05,
                    duration: 500, ease: 'Back.easeOut'
                });

                // After 1.5s more, clear intro and start combat
                self.time.delayedCall(1500, function() {
                    self.tweens.add({ targets: [bossTitle, bossStoryText, bossOverlay], alpha: 0, duration: 400,
                        onComplete: function() { bossTitle.destroy(); bossStoryText.destroy(); bossOverlay.destroy(); }
                    });
                    self.combatActive = true;
                    self.tweens.add({ targets: self.enemySprite, y: self.enemyHomeY + 5, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                    self.nextProblem();
                });
            });
        } else {
            // Regular enemy — immediate start with idle bounce
            this.tweens.add({ targets: this.enemySprite, y: this.enemyHomeY + 5, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            this.nextProblem();
            this.cameras.main.fadeIn(400);
        }
    }

    createNumpad() {
        var w = this.W, self = this;
        var cbg = this.landConfig.combatBg || {};
        var startX = w/2 - 150;
        var startY = 510;
        var btnW = 115, btnH = 64, gap = 8;

        this.numpadButtons = [];

        // Numpad backing panel (themed wood/stone)
        var panelColor = cbg.numPanel || 0x2a2a3e;
        var panelBg = this.add.rectangle(w/2, startY + 145, 370, 310, panelColor, 0.95)
            .setStrokeStyle(2, 0xffffff, 0.1);
        this.combatContainer.add(panelBg);
        // Panel highlight edge (top)
        var panelHL = this.add.rectangle(w/2, startY - 2, 360, 2, 0xffffff, 0.08);
        this.combatContainer.add(panelHL);

        var layout = [
            ['1','2','3'],
            ['4','5','6'],
            ['7','8','9'],
            ['DEL','0','GO']
        ];

        var btnBase = cbg.numBtn || 0x3a3a5e;
        var btnStroke = cbg.numBtnStroke || 0x5a5a7e;

        for (var row = 0; row < 4; row++) {
            for (var col = 0; col < 3; col++) {
                var label = layout[row][col];
                var bx = startX + col * (btnW + gap) + btnW/2;
                var by = startY + row * (btnH + gap) + btnH/2;

                var btnColor = btnBase;
                if (label === 'GO') btnColor = cbg.numGo || 0x22c55e;
                else if (label === 'DEL') btnColor = cbg.numDel || 0x994444;

                // Button shadow (depth effect)
                var shadow = this.add.rectangle(bx + 2, by + 3, btnW, btnH, 0x000000, 0.3);
                this.combatContainer.add(shadow);

                var bg = this.add.rectangle(bx, by, btnW, btnH, btnColor)
                    .setStrokeStyle(2, btnStroke)
                    .setInteractive({ useHandCursor: true });
                this.combatContainer.add(bg);

                // Inner highlight (gives carved/beveled look)
                var hl = this.add.rectangle(bx, by - 2, btnW - 6, 2, 0xffffff, 0.08);
                this.combatContainer.add(hl);

                var displayLabel = label === 'DEL' ? '\u232B' : (label === 'GO' ? '\u2694' : label);
                var fontSize = (label === 'GO' || label === 'DEL') ? '28px' : '34px';
                var txt = this.add.text(bx, by, displayLabel, {
                    fontFamily: 'Nunito', fontSize: fontSize, fontStyle: '800', color: '#ffffff',
                    stroke: '#000000', strokeThickness: 1
                }).setOrigin(0.5);
                this.combatContainer.add(txt);

                bg.setData('label', label);
                bg.setData('origColor', btnColor);
                bg.setData('textObj', txt);
                bg.setData('shadowObj', shadow);
                this.numpadButtons.push(bg);

                // Press feedback (scale down + color shift for tactile feel)
                (function(btn, lbl, origColor, shadowObj) {
                    btn.on('pointerover', function() {
                        if (!self.showingAnswer) btn.setFillStyle(origColor + 0x111111);
                    });
                    btn.on('pointerout', function() {
                        btn.setFillStyle(origColor);
                        btn.setScale(1);
                        shadowObj.setVisible(true);
                    });
                    btn.on('pointerdown', function() {
                        if (!self.showingAnswer) {
                            btn.setScale(0.95);
                            shadowObj.setVisible(false);
                        }
                    });
                    btn.on('pointerup', function() {
                        btn.setFillStyle(origColor);
                        btn.setScale(1);
                        shadowObj.setVisible(true);
                        if (!self.combatActive || self.showingAnswer) return;
                        if (lbl === 'DEL') self.typeBackspace();
                        else if (lbl === 'GO') self.submitAnswer();
                        else self.typeDigit(lbl);
                    });
                })(bg, label, btnColor, shadow);
            }
        }
    }

    typeDigit(d) {
        if (this.typedAnswer.length < 4) {
            this.typedAnswer += d;
            this.answerText.setText(this.typedAnswer);
            this.updateChargeGlow();
        }
    }

    typeBackspace() {
        this.typedAnswer = this.typedAnswer.slice(0, -1);
        this.answerText.setText(this.typedAnswer);
        this.updateChargeGlow();
    }

    updateChargeGlow() {
        // Hiro's sword glow builds with each digit entered
        if (!this.heroChargeGlow) return;
        var len = this.typedAnswer.length;
        if (len === 0) {
            this.heroChargeGlow.setAlpha(0);
            if (this.chargeTween) { this.chargeTween.stop(); this.chargeTween = null; }
        } else {
            var intensity = Math.min(len / 3, 1) * 0.35;
            this.heroChargeGlow.setAlpha(intensity);
            this.heroChargeGlow.setScale(1 + len * 0.15);
            if (!this.chargeTween) {
                this.chargeTween = this.tweens.add({
                    targets: this.heroChargeGlow, alpha: intensity * 0.5,
                    duration: 400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
                });
            }
        }
    }

    pickFromPool(pool, poolKey, indexKey, source) {
        if (this[indexKey] >= this[poolKey].length) {
            this[poolKey] = shuffleArray(source);
            this[indexKey] = 0;
        }
        return this[poolKey][this[indexKey]++];
    }

    nextProblem() {
        // Frustration escape valve: after 3+ consecutive wrong, force EASY problem
        var frustrationActive = this.consecutiveWrong >= 3;

        // Missed-problem re-queue: every 3 fresh problems, retry a missed one (skip if frustrated)
        if (!frustrationActive && this.missedQueue.length > 0 && this.problemsSinceMiss >= 3) {
            this.currentProblem = this.missedQueue[0];
            this.missedRetry = true;
            this.problemsSinceMiss = 0;
        } else if (frustrationActive) {
            // Give an EASY problem to rebuild confidence
            this.currentProblem = this.pickFromPool(this.easySource, 'easyPool', 'easyIndex', this.easySource);
            this.missedRetry = false;
            this.frustrationEscape = true;
        } else {
            // Pick from appropriate tier based on boss state
            if (this.currentEnemy.isBoss && this.bossEnraged) {
                this.currentProblem = this.pickFromPool(this.hardSource, 'hardPool', 'hardIndex', this.hardSource);
            } else if (this.currentEnemy.isBoss) {
                this.currentProblem = this.pickFromPool(this.mediumSource, 'mediumPool', 'mediumIndex', this.mediumSource);
            } else {
                this.currentProblem = this.pickFromPool(this.easySource, 'easyPool', 'easyIndex', this.easySource);
            }
            this.missedRetry = false;
            this.frustrationEscape = false;
            this.problemsSinceMiss++;
        }

        // Compute correct answer based on operation (future-proof for Lands 2-5)
        var op = this.currentProblem.op;
        var a = this.currentProblem.a, b = this.currentProblem.b;
        this.correctAnswer = {'+': a+b, '-': a-b, '\u00d7': a*b, '\u00f7': a/b}[op] || a+b;

        // Operation-aware display
        var opSymbol = {'+':'+', '-':'\u2212', '\u00d7':'\u00d7', '\u00f7':'\u00f7'}[op] || op;
        this.problemText.setText(a + ' ' + opSymbol + ' ' + b + ' = ?');
        this.typedAnswer = '';
        this.answerText.setText('');
        this.feedbackText.setText('');

        // Show hint if player has hint item
        if (gameState.hasHint) {
            gameState.hasHint = false;
            var hintVal = this.correctAnswer;
            var lo = Math.max(hintVal - 2, 0);
            var hi = hintVal + 2;
            this.feedbackText.setText('Hint: between ' + lo + ' and ' + hi).setColor('#66ccff');
        }
    }

    submitAnswer() {
        if (this.typedAnswer.length === 0) return;
        var w = this.W, self = this;
        var answer = parseInt(this.typedAnswer, 10);
        gameState.totalProblems++;
        this.sessionProblems++;

        // Kill charge glow
        if (this.chargeTween) { this.chargeTween.stop(); this.chargeTween = null; }
        if (this.heroChargeGlow) this.heroChargeGlow.setAlpha(0);

        if (answer === this.correctAnswer) {
            // CORRECT
            gameState.totalCorrect++;
            this.sessionCorrect++;
            gameState.streak++;
            this.consecutiveWrong = 0; // Reset frustration counter
            if (gameState.streak > gameState.bestCombo) gameState.bestCombo = gameState.streak;

            // REVENGE HIT — special celebration when a missed problem is finally answered correctly
            var isRevenge = this.missedRetry;
            if (isRevenge) {
                this.missedQueue.shift();
            }

            // === SPECIAL CUTSCENE CHECK ===
            var p = this.currentProblem;
            var specialType = null;
            if ((p.a === 6 && p.b === 7) || (p.a === 7 && p.b === 6) || this.correctAnswer === 67) {
                if (!this.played67) specialType = '67';
            }
            if (p.a === 8 && p.b === 8 && (p.op === '×' || p.op === '*')) {
                if (!this.played88) specialType = '88';
            }
            // 9+9=18 "Old Enough to Vote"
            if (p.a === 9 && p.b === 9 && p.op === '+' && !this.playedVote) specialType = 'vote';
            // 7×8=56 "5-6-7-8 Dance"
            if (p.a === 7 && p.b === 8 && (p.op === '×' || p.op === '*') && !this.played5678) specialType = '5678';
            // 4×4=16 "Sweet Sixteen"
            if (p.a === 4 && p.b === 4 && (p.op === '×' || p.op === '*') && !this.played16) specialType = 'sweet16';
            // 6×6=36 "Six-Pack"
            if (p.a === 6 && p.b === 6 && (p.op === '×' || p.op === '*') && !this.played36) specialType = 'sixpack';
            // 3×7=21 "Blackjack"
            if (((p.a === 3 && p.b === 7) || (p.a === 7 && p.b === 3)) && (p.op === '×' || p.op === '*') && !this.played21) specialType = 'blackjack';
            // 8×7=56 "5678 Remix Moonwalk"
            if (p.a === 8 && p.b === 7 && (p.op === '×' || p.op === '*') && !this.playedMoonwalk) specialType = 'moonwalk';
            // 81÷9=9 "The Mirror"
            if (p.a === 81 && p.b === 9 && (p.op === '÷') && !this.playedMirror) specialType = 'mirror';
            // 5×8=40 "The Big 4-0"
            if (((p.a === 5 && p.b === 8) || (p.a === 8 && p.b === 5)) && (p.op === '×' || p.op === '*') && !this.played40) specialType = 'big40';
            // 2×2=4 "Too Easy"
            if (p.a === 2 && p.b === 2 && (p.op === '×' || p.op === '*') && !this.playedEasy) specialType = 'tooeasy';
            // 6×8=48 "Four-Ate"
            if (((p.a === 6 && p.b === 8) || (p.a === 8 && p.b === 6)) && (p.op === '×' || p.op === '*') && !this.played48) specialType = 'fourate';
            // 72÷8=9 "Full Circle"
            if (p.a === 72 && p.b === 8 && (p.op === '÷') && !this.playedCircle) specialType = 'circle';

            if (specialType) {
                this.combatActive = false;
                this.playSpecialCutscene(specialType, function() {
                    self.combatActive = true;
                    self.doCorrectImpact(isRevenge);
                });
            } else {
                // === HIT PAUSE: 60ms freeze before impact (makes hits feel weighty) ===
                this.combatActive = false;
                this.time.delayedCall(60, function() {
                    self.combatActive = true;
                    self.doCorrectImpact(isRevenge);
                });
            }

        } else {
            // WRONG — show correct answer gently, no punishment animation
            this.showingAnswer = true;
            this.consecutiveWrong++;

            // Add to missed queue for spaced repetition (unless already a retry)
            if (!this.missedRetry) {
                this.missedQueue.push({ a: this.currentProblem.a, b: this.currentProblem.b, op: this.currentProblem.op });
            }

            // Build full equation string for learning: "6 + 8 = 14"
            var p = this.currentProblem;
            var opDisp = {'+':'+', '-':'\u2212', '\u00d7':'\u00d7', '\u00f7':'\u00f7'}[p.op] || p.op;
            var eqStr = p.a + ' ' + opDisp + ' ' + p.b + ' = ' + this.correctAnswer;

            // Red screen tint (gentle)
            this.redOverlay.setAlpha(0.15);
            this.tweens.add({ targets: this.redOverlay, alpha: 0, duration: 600 });

            // Shield check
            if (gameState.hasShield) {
                gameState.hasShield = false;
                this.feedbackText.setText('Shield blocked! ' + eqStr).setColor('#66ccff');
                if (this.shieldText) this.shieldText.setText('');
            } else {
                gameState.hearts--;
                this.feedbackText.setText(eqStr).setColor('#ff8888');
            }

            // === ENEMY ATTACK ANIMATION (multi-phase, Pokemon-style) ===
            this.doEnemyAttack();

            // Frustration escape message after 3 wrong in a row
            if (this.consecutiveWrong >= 3) {
                var helpText = this.add.text(w/2, 340, 'Take a breath... easier one coming!', {
                    fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#66ccff',
                    stroke: '#000000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(100).setAlpha(0);
                this.combatContainer.add(helpText);
                this.tweens.add({ targets: helpText, alpha: 1, duration: 300, yoyo: true, hold: 1500, onComplete: function() { helpText.destroy(); } });
            }

            // Reset combo
            gameState.streak = 0;
            this.updateComboDisplay();

            // Check death
            if (gameState.hearts <= 0) {
                this.combatActive = false;
                try { if (this.combatMusic) this.combatMusic.stop(); } catch(e) {}
                this.time.delayedCall(2000, function() {
                    self.scene.stop('UIScene');
                    self.scene.start('DeathScene', {
                        problems: self.sessionProblems,
                        correct: self.sessionCorrect,
                        bestCombo: gameState.bestCombo
                    });
                });
                return;
            }

            // Show correct answer for 2.5s, then next problem
            this.time.delayedCall(2500, function() {
                self.showingAnswer = false;
                self.nextProblem();
            });
        }
    }

    playSpecialCutscene(type, callback) {
        var w = this.W, h = this.H, self = this;
        var cutContainer = this.add.container(0, 0).setDepth(200);

        if (type === '67') {
            this.played67 = true;

            // Party SFX
            try { self.sound.play('sfx-party', { volume: 0.7 }); } catch(e) {}

            // Voice: "SIX... SEVEN!" via Web Speech API
            try {
                if ('speechSynthesis' in window && !gameMuted) {
                    var utter = new SpeechSynthesisUtterance('SIX... SEVEN!');
                    utter.rate = 0.85;
                    utter.pitch = 1.6;
                    utter.volume = 0.9;
                    // Try to pick a young/fun sounding voice
                    var voices = window.speechSynthesis.getVoices();
                    var kidVoice = voices.find(function(v) { return v.name.indexOf('Samantha') >= 0; })
                        || voices.find(function(v) { return v.name.indexOf('Karen') >= 0; })
                        || voices.find(function(v) { return v.name.indexOf('Zarvox') >= 0; })
                        || voices.find(function(v) { return v.lang.indexOf('en') >= 0 && v.localService; });
                    if (kidVoice) utter.voice = kidVoice;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utter);
                }
            } catch(e) {}

            // White transparent overlay — makes it POP
            var bg = this.add.rectangle(w/2, h/2, w, h, 0xffffff, 0).setAlpha(0);
            cutContainer.add(bg);
            this.tweens.add({ targets: bg, alpha: 0.85, duration: 300 });

            // Google-style screen wobble
            this.time.delayedCall(200, function() {
                self.tweens.add({ targets: self.cameras.main, scrollY: self.cameras.main.scrollY - 4, duration: 80, yoyo: true, repeat: 8, ease: 'Sine.easeInOut' });
            });

            // "SIX SEVEN!" text — big, gold, bouncing in
            var sixSevenText = this.add.text(w/2, h/2 - 80, 'SIX SEVEN!', {
                fontFamily: 'Nunito', fontSize: '52px', fontStyle: '900', color: '#f5c842',
                stroke: '#000000', strokeThickness: 6
            }).setOrigin(0.5).setScale(0);
            cutContainer.add(sixSevenText);
            this.tweens.add({ targets: sixSevenText, scaleX: 1, scaleY: 1, duration: 400, ease: 'Back.easeOut', delay: 300 });
            this.tweens.add({ targets: sixSevenText, y: h/2 - 75, duration: 300, yoyo: true, repeat: -1, delay: 700, ease: 'Sine.easeInOut' });

            // Hiro doing the seesaw hand gesture
            var heroY = h/2 + 60;
            var hero = this.add.sprite(w/2, heroY, 'hiro-walk', 3).setScale(6);
            cutContainer.add(hero);
            this.tweens.add({ targets: hero, alpha: 1, duration: 200, delay: 200 });

            // Two "hands" — alternating seesaw (palms up, bouncing)
            var handL = this.add.rectangle(w/2 - 50, heroY - 35, 20, 10, 0xffcc99, 0.9).setStrokeStyle(1, 0xddaa77);
            var handR = this.add.rectangle(w/2 + 50, heroY - 35, 20, 10, 0xffcc99, 0.9).setStrokeStyle(1, 0xddaa77);
            cutContainer.add(handL);
            cutContainer.add(handR);

            // Seesaw motion — left up when right down, alternating
            this.tweens.add({ targets: handL, y: heroY - 55, duration: 250, yoyo: true, repeat: 5, delay: 400, ease: 'Sine.easeInOut' });
            this.tweens.add({ targets: handR, y: heroY - 55, duration: 250, yoyo: true, repeat: 5, delay: 525, ease: 'Sine.easeInOut' });

            // "6" and "7" floating numbers
            var sixText = this.add.text(w/2 - 100, h/2 + 10, '6', {
                fontFamily: 'Nunito', fontSize: '72px', fontStyle: '900', color: '#ff6644',
                stroke: '#000000', strokeThickness: 5
            }).setOrigin(0.5).setAlpha(0);
            var sevenText = this.add.text(w/2 + 100, h/2 + 10, '7', {
                fontFamily: 'Nunito', fontSize: '72px', fontStyle: '900', color: '#4488ff',
                stroke: '#000000', strokeThickness: 5
            }).setOrigin(0.5).setAlpha(0);

        }
        var lungeTargetX = this.heroHomeX + 100;
        var lungeTargetY = this.heroHomeY - 40;
        this.tweens.add({
            targets: this.heroSprite,
            x: lungeTargetX, y: lungeTargetY, scaleX: 5.5, scaleY: 5.5,
            duration: 120, ease: 'Quad.easeIn'
        });

        // === PHASE 2: IMPACT (at 120ms) ===
        this.time.delayedCall(120, function() {
            try { self.sound.play('sfx-correct', { volume: 0.6 }); } catch(e) {}

            // --- SPEED LINES (anime swoosh) ---
            for (var i = 0; i < 8; i++) {
                var angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
                var lineLen = Phaser.Math.Between(80, 160);
                var lx = slashX + Math.cos(angle) * 20;
                var ly = slashY + Math.sin(angle) * 20;
                var line = self.add.rectangle(lx, ly, lineLen, 3, 0xffffff, 0.8)
                    .setAngle(angle * 180 / Math.PI).setDepth(100);
                self.tweens.add({
                    targets: line, alpha: 0, scaleX: 1.5,
                    duration: 200, ease: 'Quad.easeOut',
                    onComplete: function() { line.destroy(); }
                });
            }

            // --- DOUBLE SLASH SPRITE ---
            var dslash = self.add.sprite(slashX, slashY, 'fx-slash-double', 0).setScale(5).setDepth(110).setAngle(-30);
            if (self.anims.exists('slash-double-anim')) {
                dslash.play('slash-double-anim');
                dslash.on('animationcomplete', function() { dslash.destroy(); });
            } else {
                self.time.delayedCall(200, function() { dslash.destroy(); });
            }

            // --- ORIGINAL SLASH (layered for extra impact) ---
            var slash1 = self.add.sprite(slashX - 15, slashY - 10, 'slash-fx', 0).setScale(4).setDepth(105).setAngle(15);
            slash1.play('slash-anim');
            slash1.on('animationcomplete', function() { slash1.destroy(); });

            // --- WHITE IMPACT FLASH (whole screen, very brief) ---
            var whiteFlash = self.add.rectangle(w/2, h/2, w, h, 0xffffff, 0.5).setDepth(150);
            self.tweens.add({ targets: whiteFlash, alpha: 0, duration: 120, onComplete: function() { whiteFlash.destroy(); } });

            // --- SCREEN SHAKE (heavy) ---
            var shakeIntensity = dmg >= 2 ? 0.025 : 0.015;
            self.cameras.main.shake(200, shakeIntensity);

            // --- WHITE FLASH ON ENEMY ---
            self.enemySprite.setTintFill(0xffffff);
        });

        // === PHASE 3: EXPLOSION + RECOIL (at 200ms) ===
        this.time.delayedCall(200, function() {
            // --- EXPLOSION SPRITE at impact ---
            var explosion = self.add.sprite(slashX, slashY, 'fx-explosion', 0).setScale(4).setDepth(115);
            if (self.anims.exists('explosion-anim')) {
                explosion.play('explosion-anim');
                explosion.on('animationcomplete', function() { explosion.destroy(); });
            } else {
                self.tweens.add({ targets: explosion, alpha: 0, scaleX: 6, scaleY: 6, duration: 300, onComplete: function() { explosion.destroy(); } });
            }

            // --- IMPACT RING (expanding circle) ---
            var ring = self.add.circle(slashX, slashY, 10, 0xffffff, 0).setStrokeStyle(3, 0xffffff, 0.8).setDepth(108);
            self.tweens.add({
                targets: ring, scaleX: 4, scaleY: 4, alpha: 0,
                duration: 300, ease: 'Quad.easeOut',
                onComplete: function() { ring.destroy(); }
            });
            // Second ring (slightly delayed, colored)
            var ring2Color = isRevenge ? 0xf5c842 : (dmg >= 2 ? 0xff44ff : 0x22c55e);
            var ring2 = self.add.circle(slashX, slashY, 8, ring2Color, 0).setStrokeStyle(2, ring2Color, 0.6).setDepth(107);
            self.tweens.add({
                targets: ring2, scaleX: 5, scaleY: 5, alpha: 0,
                duration: 400, ease: 'Quad.easeOut', delay: 50,
                onComplete: function() { ring2.destroy(); }
            });

            // --- ENEMY RECOIL: dramatic squash/stretch + knockback ---
            var recoilDist = dmg >= 2 ? 35 : 20;
            self.tweens.add({
                targets: self.enemySprite,
                x: self.enemyHomeX + recoilDist,
                scaleX: eScale * 1.25, scaleY: eScale * 0.75,
                duration: 80, ease: 'Quad.easeOut',
                onComplete: function() {
                    self.tweens.add({
                        targets: self.enemySprite,
                        x: self.enemyHomeX, scaleX: eScale, scaleY: eScale,
                        duration: 250, ease: 'Bounce.easeOut'
                    });
                }
            });

            // Clear enemy white flash
            self.time.delayedCall(80, function() {
                if (self.bossEnraged) self.enemySprite.setTint(0xff4444);
                else self.enemySprite.clearTint();
            });

            // --- SMOKE PUFF at impact ---
            var smoke = self.add.sprite(slashX + 10, slashY + 10, 'fx-smoke', 0).setScale(3).setDepth(104).setAlpha(0.6);
            if (self.anims.exists('smoke-anim')) {
                smoke.play('smoke-anim');
                smoke.on('animationcomplete', function() { smoke.destroy(); });
            } else {
                self.tweens.add({ targets: smoke, alpha: 0, scaleX: 4, scaleY: 4, duration: 400, onComplete: function() { smoke.destroy(); } });
            }
        });

        // === PHASE 4: HIRO RETURNS + DAMAGE + PARTICLES (at 300ms) ===
        this.time.delayedCall(300, function() {
            // Hiro slides back to home
            self.heroSprite.setFrame(3); // back to idle facing frame
            self.tweens.add({
                targets: self.heroSprite,
                x: self.heroHomeX, y: self.heroHomeY, scaleX: 5, scaleY: 5,
                duration: 200, ease: 'Back.easeOut'
            });

            // --- FLOATING DAMAGE NUMBER ---
            var dmgColor = dmg >= 2 ? '#ff44ff' : (gameState.streak >= 3 ? '#f5c842' : '#ffffff');
            var dmgSize = dmg >= 2 ? '48px' : (gameState.streak >= 3 ? '40px' : '34px');
            var dmgText = self.add.text(slashX, slashY - 30, '-' + dmg, {
                fontFamily: 'Nunito', fontSize: dmgSize, fontStyle: '900', color: dmgColor,
                stroke: '#000000', strokeThickness: 6
            }).setOrigin(0.5).setDepth(120);
            self.tweens.add({
                targets: dmgText, y: dmgText.y - 70, scaleX: 1.4, scaleY: 1.4,
                duration: 250, ease: 'Back.easeOut',
                onComplete: function() {
                    self.tweens.add({ targets: dmgText, alpha: 0, y: dmgText.y - 30, duration: 500, onComplete: function() { dmgText.destroy(); } });
                }
            });

            // --- REWARD PARTICLES (bigger burst) ---
            var particleCount = isRevenge ? 16 : (dmg >= 2 ? 14 : 10);
            var colors = isRevenge ? [0xf5c842, 0xffd700, 0xffaa00, 0xffffff] : [0x22c55e, 0xf5c842, 0xffffff, 0x44ff88, 0x88ff44, 0xffff44, 0x44ffff, 0xff44ff];
            for (var i = 0; i < particleCount; i++) {
                var pAngle = (i / particleCount) * Math.PI * 2;
                var pDist = Phaser.Math.Between(30, 70);
                var px = slashX + Math.cos(pAngle) * pDist;
                var py = slashY + Math.sin(pAngle) * pDist;
                var pc = colors[i % colors.length];
                var pSize = Phaser.Math.Between(3, 8);
                // Mix circles and stars for variety
                var particle = (i % 3 === 0)
                    ? self.add.star(slashX, slashY, 5, pSize/2, pSize, pc).setDepth(106)
                    : self.add.circle(slashX, slashY, pSize, pc).setDepth(106);
                self.tweens.add({
                    targets: particle, x: px, y: py, alpha: 0, angle: Phaser.Math.Between(-180, 180),
                    scaleX: 0, scaleY: 0,
                    duration: Phaser.Math.Between(400, 700), ease: 'Quad.easeOut',
                    onComplete: function() { particle.destroy(); }
                });
            }
        });

        // === REVENGE HIT CELEBRATION (at 350ms, on top of everything) ===
        if (isRevenge) {
            this.time.delayedCall(350, function() {
                var revengeText = self.add.text(w/2, 300, 'REVENGE HIT!', {
                    fontFamily: 'Nunito', fontSize: '36px', fontStyle: '900', color: '#f5c842',
                    stroke: '#000000', strokeThickness: 6
                }).setOrigin(0.5).setScale(0).setDepth(200);
                self.combatContainer.add(revengeText);
                self.tweens.add({
                    targets: revengeText, scaleX: 1.2, scaleY: 1.2, duration: 350, ease: 'Back.easeOut',
                    onComplete: function() {
                        self.tweens.add({ targets: revengeText, alpha: 0, duration: 600, delay: 500, onComplete: function() { revengeText.destroy(); } });
                    }
                });
                // Golden star burst
                for (var i = 0; i < 14; i++) {
                    var sa = (i / 14) * Math.PI * 2;
                    var sd = Phaser.Math.Between(40, 80);
                    var star = self.add.star(slashX, slashY, 5, 4, 10, 0xf5c842).setDepth(115);
                    self.tweens.add({
                        targets: star, x: slashX + Math.cos(sa) * sd, y: slashY + Math.sin(sa) * sd,
                        angle: 360, alpha: 0, scaleX: 0, scaleY: 0,
                        duration: 600, ease: 'Quad.easeOut', onComplete: function() { star.destroy(); }
                    });
                }
                gameState.coins++;
                var bonusCoin = self.add.text(w/2, 340, '+1 bonus coin!', {
                    fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#f5c842',
                    stroke: '#000000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(200).setAlpha(0);
                self.combatContainer.add(bonusCoin);
                self.tweens.add({ targets: bonusCoin, alpha: 1, y: 330, duration: 300, delay: 200, onComplete: function() {
                    self.tweens.add({ targets: bonusCoin, alpha: 0, duration: 500, delay: 600, onComplete: function() { bonusCoin.destroy(); } });
                }});
            });
        }

        // === HP + COMBO UPDATES ===
        this.currentEnemy.hp -= dmg;
        this.time.delayedCall(250, function() {
            self.updateHpBar();
            self.updateComboDisplay();
        });

        // === BOSS PHASE 2 TRANSITION ===
        if (this.currentEnemy.isBoss && !this.bossEnraged && this.currentEnemy.hp <= this.currentEnemy.maxHp / 2 && this.currentEnemy.hp > 0) {
            this.bossEnraged = true;
            this.time.delayedCall(500, function() {
                var enrageText = self.add.text(w/2, 280, 'BOSS ENRAGED!', {
                    fontFamily: 'Nunito', fontSize: '42px', fontStyle: '900', color: '#ff2222',
                    stroke: '#000000', strokeThickness: 6
                }).setOrigin(0.5).setScale(0).setDepth(200);
                self.combatContainer.add(enrageText);
                self.tweens.add({
                    targets: enrageText, scaleX: 1.2, scaleY: 1.2, duration: 400,
                    ease: 'Back.easeOut', onComplete: function() {
                        self.tweens.add({ targets: enrageText, alpha: 0, duration: 800, delay: 600, onComplete: function() { enrageText.destroy(); } });
                    }
                });
                self.enemySprite.setTint(0xff4444);
                self.cameras.main.shake(500, 0.02);
                // Red flash
                var redFlash = self.add.rectangle(w/2, h/2, w, h, 0xff0000, 0.2).setDepth(150);
                self.tweens.add({ targets: redFlash, alpha: 0, duration: 500, onComplete: function() { redFlash.destroy(); } });
            });
        }

        // === NEXT STATE (at 500ms) ===
        if (this.currentEnemy.hp <= 0) {
            this.combatActive = false;
            this.time.delayedCall(700, function() { self.enemyDefeated(); });
        } else {
            this.time.delayedCall(400, function() { self.nextProblem(); });
        }
    }

    doEnemyAttack() {
        var self = this;
        var w = this.W, h = this.H;
        var heroX = this.heroHomeX || 100, heroY = this.heroHomeY || 410;
        var eHomeX = this.enemyHomeX, eHomeY = this.enemyHomeY;
        var eScale = this.currentEnemy.scale + 1;
        var isBoss = this.currentEnemy.isBoss;

        // Pick attack FX: bosses get double claw, regular enemies alternate claw types
        var clawKey, clawAnim;
        if (isBoss) {
            clawKey = 'fx-claw-double'; clawAnim = 'claw-double-anim';
        } else {
            // Alternate between single and double claw for variety
            var pick = Phaser.Math.Between(0, 2);
            if (pick === 0) { clawKey = 'fx-claw'; clawAnim = 'claw-anim'; }
            else if (pick === 1) { clawKey = 'fx-claw-double'; clawAnim = 'claw-double-anim'; }
            else { clawKey = 'fx-slash-double'; clawAnim = 'slash-double-anim'; }
        }

        // === PHASE 1: ENEMY WINDS UP (0-100ms) ===
        // Enemy pulls back slightly before lunging (anticipation)
        this.tweens.add({
            targets: this.enemySprite,
            x: eHomeX + (isBoss ? 20 : 12), scaleX: eScale * 1.1, scaleY: eScale * 0.92,
            duration: 100, ease: 'Quad.easeIn'
        });

        // === PHASE 2: ENEMY LUNGE (at 100ms) ===
        this.time.delayedCall(100, function() {
            try { self.sound.play('sfx-slash', { volume: 0.3 }); } catch(e) {}

            // Enemy lunges toward Hiro
            var lungeX = isBoss ? heroX + 60 : heroX + 80;
            var lungeY = isBoss ? heroY - 60 : heroY - 30;
            var lungeScale = isBoss ? eScale * 1.2 : eScale * 1.08;

            self.tweens.add({
                targets: self.enemySprite,
                x: lungeX, y: lungeY,
                scaleX: lungeScale, scaleY: lungeScale,
                duration: 130, ease: 'Quad.easeIn'
            });

            // Speed lines converging on Hiro (attack incoming)
            for (var i = 0; i < 6; i++) {
                var angle = Math.PI + (i / 6) * Math.PI - Math.PI/2; // right-to-left converging
                var startDist = Phaser.Math.Between(100, 160);
                var lx = heroX + Math.cos(angle) * startDist;
                var ly = heroY + Math.sin(angle) * startDist;
                var lineLen = Phaser.Math.Between(40, 80);
                var sline = self.add.rectangle(lx, ly, lineLen, 2, 0xff6666, 0.7)
                    .setAngle(angle * 180 / Math.PI).setDepth(100);
                self.tweens.add({
                    targets: sline, x: heroX, y: heroY, alpha: 0, scaleX: 0.3,
                    duration: 150, ease: 'Quad.easeIn',
                    onComplete: function() { sline.destroy(); }
                });
            }
        });

        // === PHASE 3: IMPACT ON HIRO (at 230ms) ===
        this.time.delayedCall(230, function() {
            try { self.sound.play('sfx-wrong', { volume: 0.5 }); } catch(e) {}

            // --- CLAW/SLASH FX at Hiro's position ---
            var claw = self.add.sprite(heroX, heroY - 20, clawKey, 0).setScale(5).setDepth(115);
            if (isBoss) claw.setScale(6.5).setTint(0xff4444); // bigger, redder for boss
            claw.setAngle(Phaser.Math.Between(-20, 20)); // slight random rotation
            if (self.anims.exists(clawAnim)) {
                claw.play(clawAnim);
                claw.on('animationcomplete', function() { claw.destroy(); });
            } else {
                self.tweens.add({ targets: claw, alpha: 0, scaleX: 7, scaleY: 7, duration: 250, onComplete: function() { claw.destroy(); } });
            }

            // --- RED IMPACT FLASH (brief) ---
            var redFlash = self.add.rectangle(w/2, h/2, w, h, 0xff0000, isBoss ? 0.25 : 0.15).setDepth(150);
            self.tweens.add({ targets: redFlash, alpha: 0, duration: 200, onComplete: function() { redFlash.destroy(); } });

            // --- SCREEN SHAKE ---
            self.cameras.main.shake(isBoss ? 350 : 200, isBoss ? 0.025 : 0.012);

            // --- IMPACT RING (red, expanding from Hiro) ---
            var impactRing = self.add.circle(heroX, heroY, 8, 0xff4444, 0).setStrokeStyle(3, 0xff4444, 0.7).setDepth(108);
            self.tweens.add({
                targets: impactRing, scaleX: 3.5, scaleY: 3.5, alpha: 0,
                duration: 300, ease: 'Quad.easeOut',
                onComplete: function() { impactRing.destroy(); }
            });

            // --- HIRO TAKES HIT: knockback + squash ---
            if (self.heroSprite) {
                // White flash on Hiro (like taking damage)
                self.heroSprite.setTintFill(0xffffff);
                self.time.delayedCall(80, function() { self.heroSprite.clearTint(); });

                self.tweens.add({
                    targets: self.heroSprite,
                    x: heroX - 35, scaleX: 4.2, scaleY: 5.6,
                    duration: 80, ease: 'Quad.easeOut',
                    onComplete: function() {
                        // Bounce back
                        self.tweens.add({
                            targets: self.heroSprite,
                            x: heroX, scaleX: 5, scaleY: 5,
                            duration: 300, ease: 'Bounce.easeOut'
                        });
                    }
                });
            }

            // --- HIT SPARKS (red/orange particles flying off Hiro) ---
            var sparkColors = [0xff4444, 0xff6644, 0xff8844, 0xffaa44, 0xffffff];
            var sparkCount = isBoss ? 10 : 6;
            for (var i = 0; i < sparkCount; i++) {
                var sAngle = Math.PI + (i / sparkCount) * Math.PI; // fly left/up from Hiro
                var sDist = Phaser.Math.Between(25, 60);
                var sx = heroX + Math.cos(sAngle) * sDist;
                var sy = (heroY - 10) + Math.sin(sAngle) * sDist;
                var sc = sparkColors[i % sparkColors.length];
                var sparkSize = Phaser.Math.Between(2, 5);
                var spark = self.add.circle(heroX, heroY - 10, sparkSize, sc).setDepth(112);
                self.tweens.add({
                    targets: spark, x: sx, y: sy, alpha: 0, scaleX: 0, scaleY: 0,
                    duration: Phaser.Math.Between(250, 500), ease: 'Quad.easeOut',
                    onComplete: function() { spark.destroy(); }
                });
            }

            // --- BOSS EXTRA: smoke puff on impact ---
            if (isBoss) {
                var smoke = self.add.sprite(heroX - 10, heroY, 'fx-smoke', 0).setScale(3.5).setDepth(104).setAlpha(0.5).setTint(0xff6644);
                if (self.anims.exists('smoke-anim')) {
                    smoke.play('smoke-anim');
                    smoke.on('animationcomplete', function() { smoke.destroy(); });
                } else {
                    self.tweens.add({ targets: smoke, alpha: 0, scaleX: 5, scaleY: 5, duration: 400, onComplete: function() { smoke.destroy(); } });
                }
            }
        });

        // === PHASE 4: ENEMY RETURNS (at 400ms) ===
        this.time.delayedCall(400, function() {
            // Enemy slides back to home position
            self.tweens.add({
                targets: self.enemySprite,
                x: eHomeX, y: eHomeY, scaleX: eScale, scaleY: eScale,
                duration: 250, ease: 'Back.easeOut'
            });
        });
    }

    updateHpBar() {
        var pct = Math.max(0, this.currentEnemy.hp / this.currentEnemy.maxHp);
        var barWidth = 216; // matches HP bar in info panel
        var targetWidth = barWidth * pct;
        var barColor = pct > 0.5 ? 0x22c55e : (pct > 0.25 ? 0xf5c842 : 0xef4444);

        // Smooth HP drain animation (bar shrinks over 300ms)
        this.tweens.add({
            targets: this.hpBarFill, displayWidth: targetWidth,
            duration: 300, ease: 'Quad.easeOut'
        });
        this.hpBarFill.setFillStyle(barColor);

        // Ghost bar trails behind (drains slower, shows where HP was)
        if (this.hpBarGhost) {
            this.tweens.add({
                targets: this.hpBarGhost, displayWidth: targetWidth,
                duration: 600, ease: 'Quad.easeOut', delay: 100
            });
        }

        this.hpText.setText(Math.max(0, this.currentEnemy.hp) + ' / ' + this.currentEnemy.maxHp);
    }

    updateComboDisplay() {
        var s = gameState.streak;
        var self = this;
        if (s >= 8) {
            this.comboText.setText('SHADOW MODE!').setColor('#ff44ff');
            this.heroGlow.setAlpha(0.4);
            this.tweens.add({ targets: this.heroGlow, alpha: 0.1, duration: 500, yoyo: true, repeat: -1 });
            if (s === 8) {
                try { this.sound.play('sfx-shadow', { volume: 0.6 }); } catch(e) {}
                // Shadow mode burst particles
                var hx = self.heroHomeX || 100, hy = self.heroHomeY || 410;
                for (var i = 0; i < 8; i++) {
                    var sp = this.add.circle(hx, hy, 5, 0xff44ff).setDepth(55);
                    this.tweens.add({
                        targets: sp, x: hx + Phaser.Math.Between(-50, 50), y: hy + Phaser.Math.Between(-50, 50),
                        alpha: 0, duration: 500, onComplete: function() { sp.destroy(); }
                    });
                }
            }
        } else if (s >= 5) {
            this.comboText.setText(s + 'x COMBO!').setColor('#f5c842');
            this.heroGlow.setAlpha(0.15);
            this.cameras.main.flash(200, 245, 200, 66, false);
            // Scale-up bounce on combo text
            this.comboText.setScale(1.4);
            this.tweens.add({ targets: this.comboText, scaleX: 1, scaleY: 1, duration: 300, ease: 'Back.easeOut' });
        } else if (s >= 3) {
            this.comboText.setText(s + 'x COMBO!').setColor('#f5c842');
            this.heroGlow.setAlpha(0);
            // Scale-up bounce
            this.comboText.setScale(1.3);
            this.tweens.add({ targets: this.comboText, scaleX: 1, scaleY: 1, duration: 300, ease: 'Back.easeOut' });
            if (s === 3) { try { this.sound.play('sfx-combo3', { volume: 0.5 }); } catch(e) {} }
        } else {
            this.comboText.setText(s > 0 ? s + 'x' : '');
            this.heroGlow.setAlpha(0);
        }
    }

    enemyDefeated() {
        var w = this.W, h = this.H, self = this;
        var coinsEarned = this.currentEnemy.coins;
        gameState.coins += coinsEarned;

        // Enemy defeated screen
        if (this.combatContainer) this.combatContainer.destroy(true);
        this.combatContainer = this.add.container(0, 0).setDepth(10);

        var victoryBg = this.add.rectangle(w/2, h/2 - 50, 380, 200, 0x16213e, 0.95)
            .setStrokeStyle(3, COLORS.gold);
        this.combatContainer.add(victoryBg);

        var defText = this.add.text(w/2, h/2 - 110, 'Enemy defeated!', {
            fontFamily: 'Nunito', fontSize: '32px', fontStyle: '900', color: '#22c55e',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5);
        this.combatContainer.add(defText);

        var coinText = this.add.text(w/2, h/2 - 50, '+' + coinsEarned + ' coins', {
            fontFamily: 'Nunito', fontSize: '28px', fontStyle: '800', color: '#f5c842',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5);
        this.combatContainer.add(coinText);
        this.tweens.add({ targets: coinText, scaleX: 1.2, scaleY: 1.2, duration: 300, yoyo: true });

        try { this.sound.play('sfx-coin', { volume: 0.6 }); } catch(e) {}

        this.encounterIndex++;

        if (this.isBoss) {
            // Land complete!
            this.time.delayedCall(1500, function() { self.landComplete(); });
        } else if (this.encounterIndex >= this.encounters.length) {
            // Boss time — cinematic warning
            var storyData = STORY.lands[gameState.currentLand] || {};
            var bossName = (storyData.bossName || this.bossData.name || 'BOSS').toUpperCase();

            // Screen darkens — fully opaque so battle UI is hidden
            var bossDark = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0).setDepth(50);
            this.combatContainer.add(bossDark);
            this.tweens.add({ targets: bossDark, alpha: 0.85, duration: 800 });

            // "WARNING" flash — BIG AND BOLD, fills the screen
            var warnText = this.add.text(w/2, h/2 - 60, 'WARNING', {
                fontFamily: 'Nunito', fontSize: '72px', fontStyle: '900', color: '#ff2222',
                stroke: '#000000', strokeThickness: 8
            }).setOrigin(0.5).setAlpha(0).setDepth(51);
            this.combatContainer.add(warnText);
            this.tweens.add({ targets: warnText, alpha: 1, duration: 200, yoyo: true, repeat: 3, delay: 300 });

            // Red danger lines flanking WARNING

                self.startEncounter(self.bossData);

        } else {

            this.time.delayedCall(1200, function() {

    landComplete() {

                    // --- FRAGMENT ORB (bigger, more dramatic) ---

                    self.tweens.add({ targets: fragCircle, scaleX: 1, scaleY: 1, duration: 700, ease: 'Back.easeOut', delay: 250 });
                    self.tweens.add({ targets: fragCircle, y: 226, duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: 950 });

                    // --- FRAGMENT SYMBOL (bigger) ---
                    var fragSym = self.add.text(w/2, 220, storyData.fragmentSymbol || '?', {

                    // --- ORBITING SPARKLES around fragment ---
                    for (var os = 0; os < 6; os++) {
