                    var aura2 = self.add.circle(kx, ky + 10, 120, 0x330000, 0).setDepth(55);
                    self.combatContainer.add(aura1); self.combatContainer.add(aura2);
                    self.tweens.add({ targets: aura1, alpha: 0.15, duration: 600 });
                    self.tweens.add({ targets: aura2, alpha: 0.2, duration: 600, delay: 100 });
                    self.tweens.add({ targets: aura1, scaleX: 1.4, scaleY: 1.4, alpha: 0.05, duration: 2000, yoyo: true, repeat: -1, delay: 600 });
                    self.tweens.add({ targets: aura2, scaleX: 1.3, scaleY: 1.3, alpha: 0.08, duration: 1800, yoyo: true, repeat: -1, delay: 800 });

                    // Red energy ring that pulses outward
                    var ring = self.add.circle(kx, ky, 10, 0x000000, 0).setStrokeStyle(3, 0xff0000, 0.6).setDepth(56);
                    self.combatContainer.add(ring);
                    self.tweens.add({ targets: ring, scaleX: 15, scaleY: 15, alpha: 0, duration: 1200, ease: 'Quad.easeOut' });

                    // Kage materializes from NOTHING — starts as a point and expands
                    // Cloak body — MASSIVE
                    var kCloak = self.add.rectangle(kx, ky + 35, 120, 120, 0x060606).setDepth(60).setScale(0).setAlpha(0);
                    self.combatContainer.add(kCloak);
                    self.tweens.add({ targets: kCloak, alpha: 1, scaleX: 1, scaleY: 1, duration: 600, ease: 'Back.easeOut' });

                    // Broad shoulders with sharp edges
                    var kShoulderL = self.add.triangle(kx - 58, ky - 8, 0, 45, 55, 0, 55, 45, 0x0a0a0a).setDepth(61).setScale(0).setAlpha(0);
                    var kShoulderR = self.add.triangle(kx + 58, ky - 8, 0, 0, 55, 45, 0, 45, 0x0a0a0a).setDepth(61).setScale(0).setAlpha(0);
                    self.combatContainer.add(kShoulderL); self.combatContainer.add(kShoulderR);
                    self.tweens.add({ targets: [kShoulderL, kShoulderR], alpha: 1, scaleX: 1, scaleY: 1, duration: 500, delay: 100, ease: 'Back.easeOut' });

                    // Head — LARGER
                    var kHead = self.add.circle(kx, ky - 42, 36, 0x0c0c0c).setDepth(62).setScale(0).setAlpha(0);
                    self.combatContainer.add(kHead);
                    self.tweens.add({ targets: kHead, alpha: 1, scaleX: 1, scaleY: 1, duration: 400, delay: 200, ease: 'Back.easeOut' });

                    // Horns — MASSIVE, menacing
                    var kHornL = self.add.triangle(kx - 32, ky - 82, 0, 42, 16, 0, 32, 42, 0x0a0a0a).setDepth(63).setAlpha(0);
                    var kHornR = self.add.triangle(kx + 32, ky - 82, 0, 42, 16, 0, 32, 42, 0x0a0a0a).setDepth(63).setAlpha(0);
                    self.combatContainer.add(kHornL); self.combatContainer.add(kHornR);
                    self.tweens.add({ targets: [kHornL, kHornR], alpha: 1, duration: 300, delay: 350 });

                    // Glowing red outline around entire silhouette
                    var outline = self.add.circle(kx, ky, 90, 0x000000, 0).setStrokeStyle(2, 0xff0000, 0).setDepth(59);
                    self.combatContainer.add(outline);
                    self.tweens.add({ targets: outline, alpha: 1, duration: 500, delay: 400, onUpdate: function() {
                        outline.setStrokeStyle(2, 0xff0000, outline.alpha * 0.3);
                    }});
                    self.tweens.add({ targets: outline, scaleX: 1.05, scaleY: 1.05, duration: 1500, yoyo: true, repeat: -1, delay: 900 });

                    // Red eyes — DRAMATIC SNAP OPEN with flash
                    self.time.delayedCall(600, function() {
                        // Build tension — eye slits (closed)
                        var kEyeSlitL = self.add.rectangle(kx - 16, ky - 46, 18, 1, 0xff0000, 0).setDepth(65);
                        var kEyeSlitR = self.add.rectangle(kx + 16, ky - 46, 18, 1, 0xff0000, 0).setDepth(65);
                        self.combatContainer.add(kEyeSlitL); self.combatContainer.add(kEyeSlitR);

                        // SNAP open — height goes from 1 to 12
                        self.tweens.add({ targets: [kEyeSlitL, kEyeSlitR], alpha: 1, displayHeight: 12, duration: 120, delay: 200, ease: 'Quad.easeOut',
                            onComplete: function() {
                                // FLASH — entire screen goes red for a split second
                                self.cameras.main.flash(150, 255, 30, 30, true);
                                self.cameras.main.shake(200, 0.025);
                            }
                        });

                        // Massive eye glow
                        var kEyeGlowL = self.add.circle(kx - 16, ky - 46, 28, 0xff0000, 0).setDepth(64);
                        var kEyeGlowR = self.add.circle(kx + 16, ky - 46, 28, 0xff0000, 0).setDepth(64);
                        self.combatContainer.add(kEyeGlowL); self.combatContainer.add(kEyeGlowR);
                        self.tweens.add({ targets: [kEyeGlowL, kEyeGlowR], alpha: 0.25, duration: 300, delay: 200 });
                        self.tweens.add({ targets: [kEyeGlowL, kEyeGlowR], alpha: 0.08, scaleX: 1.8, scaleY: 1.8, duration: 1200, yoyo: true, repeat: -1, delay: 600 });

                        // Bright eye cores with pulsing
                        self.tweens.add({ targets: [kEyeSlitL, kEyeSlitR], alpha: 0.6, duration: 800, yoyo: true, repeat: -1, delay: 500 });

                        // White hot pupil centers
                        var kPupilL = self.add.circle(kx - 16, ky - 46, 4, 0xffffff, 0).setDepth(66);
                        var kPupilR = self.add.circle(kx + 16, ky - 46, 4, 0xffffff, 0).setDepth(66);
                        self.combatContainer.add(kPupilL); self.combatContainer.add(kPupilR);
                        self.tweens.add({ targets: [kPupilL, kPupilR], alpha: 0.9, duration: 100, delay: 350 });
                        self.tweens.add({ targets: [kPupilL, kPupilR], alpha: 0.4, duration: 800, yoyo: true, repeat: -1, delay: 500 });
                    });

                    // 24 dark swirling particles — orbit Kage
                    for (var k = 0; k < 24; k++) {
                        var kpAngle = (k / 24) * Math.PI * 2;
                        var kpR = Phaser.Math.Between(55, 120);
                        var kp = self.add.circle(
                            kx + Math.cos(kpAngle) * kpR,
                            ky + Math.sin(kpAngle) * kpR,
                            Phaser.Math.Between(1, 5), k % 3 === 0 ? 0x880000 : 0x440000, 0.6
                        ).setDepth(59);
                        self.combatContainer.add(kp);
                        self.tweens.add({
                            targets: kp,
                            x: kx + Math.cos(kpAngle + 1.5) * (kpR - 20),
                            y: ky + Math.sin(kpAngle + 1.5) * (kpR - 20),
                            alpha: 0, duration: 2500, repeat: -1, delay: k * 60
                        });
                    }

                    // Red fog from bottom — 8 layers
                    for (var rf = 0; rf < 8; rf++) {
                        var fog = self.add.ellipse(w/2 + Phaser.Math.Between(-120, 120), h/2 + 60 + rf * 18, 200, 35, 0x330000, 0).setDepth(55);
                        self.combatContainer.add(fog);
                        self.tweens.add({ targets: fog, alpha: 0.1, duration: 600, delay: rf * 100 });
                        self.tweens.add({ targets: fog, x: fog.x + Phaser.Math.Between(-40, 40), alpha: 0.02, duration: 2500, yoyo: true, repeat: -1, delay: 600 + rf * 200 });
                    }

                    // "KAGE" label — HUGE, blood red, scales in
                    self.time.delayedCall(900, function() {
                        var kageLabel = self.add.text(kx, ky - 125, 'KAGE', {
                            fontFamily: 'Nunito', fontSize: '48px', fontStyle: '900', color: '#ff1111',
                            stroke: '#000000', strokeThickness: 6
                        }).setOrigin(0.5).setDepth(67).setScale(0.3).setAlpha(0);
                        self.combatContainer.add(kageLabel);
                        self.tweens.add({ targets: kageLabel, alpha: 1, scaleX: 1, scaleY: 1, duration: 400, ease: 'Back.easeOut' });
                        // Pulsing glow on name
                        self.tweens.add({ targets: kageLabel, alpha: 0.7, duration: 1200, yoyo: true, repeat: -1, delay: 600 });

                        // Taunt text (bigger, more readable)
                        var tauntText = self.add.text(w/2, h/2 + 65, '', {
                            fontFamily: 'Nunito', fontSize: '22px', fontStyle: '700', color: '#ff6666',
                            align: 'center', lineSpacing: 10, stroke: '#000000', strokeThickness: 4
                        }).setOrigin(0.5).setDepth(67);
                        self.combatContainer.add(tauntText);

                        var tauntMsg = storyData.kageTaunt;
                        var tIdx = 0;
                        var tTimer = self.time.addEvent({
                            delay: 40, callback: function() {
                                tIdx++;
                                tauntText.setText(tauntMsg.substring(0, tIdx));
                                if (tIdx >= tauntMsg.length) tTimer.remove();
                            }, loop: true
                        });
                    });
                });

                // === PHASE 4: NEXT LAND PREVIEW (at 18s from start) ===
                self.time.delayedCall(8500, function() {
                    // Fade Kage
                    self.tweens.add({
                        targets: self.combatContainer, alpha: 0, duration: 800,
                        onComplete: function() {
                            self.combatContainer.removeAll(true);
                            self.combatContainer.setAlpha(1);

                            var previewBg = self.add.rectangle(w/2, h/2, w, h, 0x0a0a1e, 0.95).setDepth(10);
                            self.combatContainer.add(previewBg);

                            // Next land preview text
                            if (storyData.nextLandPreview) {
                                var previewText = self.add.text(w/2, h/2 - 60, storyData.nextLandPreview, {
                                    fontFamily: 'Nunito', fontSize: '22px', fontStyle: '700', color: '#bbccdd',
                                    align: 'center', lineSpacing: 12, stroke: '#000000', strokeThickness: 3
                                }).setOrigin(0.5).setDepth(15).setAlpha(0);
                                self.combatContainer.add(previewText);
                                self.tweens.add({ targets: previewText, alpha: 1, duration: 800 });
                            }

                            // Stats
                            var acc = self.sessionProblems > 0 ? Math.round(self.sessionCorrect / self.sessionProblems * 100) : 0;
                            var statsBlock = self.add.text(w/2, h/2 + 50,
                                'Problems: ' + self.sessionProblems + '  |  Correct: ' + self.sessionCorrect + '  |  ' + acc + '%\nBest Combo: ' + gameState.bestCombo + 'x', {
                                fontFamily: 'Nunito', fontSize: '16px', fontStyle: '700', color: '#667788',
                                align: 'center', lineSpacing: 4
                            }).setOrigin(0.5).setDepth(15).setAlpha(0);
                            self.combatContainer.add(statsBlock);
                            self.tweens.add({ targets: statsBlock, alpha: 1, duration: 600, delay: 400 });

                            // CONTINUE button
                            self.time.delayedCall(1000, function() {
                                var contBtn = self.add.rectangle(w/2, h/2 + 140, 260, 56, COLORS.green)
                                    .setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff, 0.3).setDepth(15).setAlpha(0);
                                self.combatContainer.add(contBtn);
                                var contLabel = self.add.text(w/2, h/2 + 140, 'CONTINUE', {
                                    fontFamily: 'Nunito', fontSize: '26px', fontStyle: '800', color: '#ffffff'
                                }).setOrigin(0.5).setDepth(16).setAlpha(0);
                                self.combatContainer.add(contLabel);
                                self.tweens.add({ targets: [contBtn, contLabel], alpha: 1, duration: 500 });

                                contBtn.on('pointerover', function() { contBtn.setScale(1.05); });
                                contBtn.on('pointerout', function() { contBtn.setScale(1.0); });
                                contBtn.on('pointerup', function() {
                                    self.scene.stop('UIScene');
                                    if (LAND_CONFIGS[gameState.currentLand]) {
                                        self.scene.start('WorldScene');
                                    } else {
                                        self.scene.start('VictoryScene');
                                    }
                                });
                            });
                        }
                    });
                });
            });
        } else {
            // No Kage taunt (final land or no data) — show continue after fragment ceremony
            this.time.delayedCall(8000, function() {
                // Stats
                var acc = self.sessionProblems > 0 ? Math.round(self.sessionCorrect / self.sessionProblems * 100) : 0;
                var statsBlock = self.add.text(w/2, h/2 + 200,
                    'Problems: ' + self.sessionProblems + '  |  Correct: ' + self.sessionCorrect + '  |  ' + acc + '%', {
                    fontFamily: 'Nunito', fontSize: '16px', fontStyle: '700', color: '#667788',
                    align: 'center'
                }).setOrigin(0.5).setDepth(16).setAlpha(0);
                self.combatContainer.add(statsBlock);
                self.tweens.add({ targets: statsBlock, alpha: 1, duration: 400 });

                var contBtn = self.add.rectangle(w/2, h/2 + 260, 260, 56, COLORS.green)
                    .setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff, 0.3).setDepth(16).setAlpha(0);
                self.combatContainer.add(contBtn);
                var contLabel = self.add.text(w/2, h/2 + 260, 'CONTINUE', {
                    fontFamily: 'Nunito', fontSize: '26px', fontStyle: '800', color: '#ffffff'
                }).setOrigin(0.5).setDepth(17).setAlpha(0);
                self.combatContainer.add(contLabel);
                self.tweens.add({ targets: [contBtn, contLabel], alpha: 1, duration: 500 });

                contBtn.on('pointerover', function() { contBtn.setScale(1.05); });
                contBtn.on('pointerout', function() { contBtn.setScale(1.0); });
                contBtn.on('pointerup', function() {
                    self.scene.stop('UIScene');
                    if (LAND_CONFIGS[gameState.currentLand]) {
                        self.scene.start('WorldScene');
                    } else {
                        self.scene.start('VictoryScene');
                    }
                });
            });
        }
    }
}

// ============================================================
// VICTORY SCENE (all available lands completed)
// ============================================================
class VictoryScene extends Phaser.Scene {
    constructor() { super({ key: 'VictoryScene' }); }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.add.rectangle(w/2, h/2, w, h, 0x0a0a1e);

        try { this.sound.play('sfx-levelup', { volume: 0.8 }); } catch(e) {}

        // Stars background (more dense, more magical)
        for (var i = 0; i < 50; i++) {
            var sx = Phaser.Math.Between(10, w - 10), sy = Phaser.Math.Between(10, h - 10);
            var sz = Phaser.Math.FloatBetween(0.5, 2.5);
            var sc = [0xffffff, 0xf5c842, 0x88aaff, 0xffdd88][i % 4];
            var star = this.add.circle(sx, sy, sz, sc, Phaser.Math.FloatBetween(0.2, 0.8));
            this.tweens.add({ targets: star, alpha: 0.05, duration: Phaser.Math.Between(800, 3000), yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 2000) });
        }

        // Determine how many lands completed
        var landsCompleted = gameState.landsCompleted || 2;
        var allLandsCleared = landsCompleted >= 5;

        // === SCROLL ASSEMBLY SEQUENCE ===
        // Show fragments merging into scroll

        // Fragment data
        var allFrags = [
            { symbol: '+', name: 'Sums', color: 0x22c55e },
            { symbol: '\u2212', name: 'Differences', color: 0x3b82f6 },
            { symbol: '\u00d7', name: 'Products', color: 0x22aa44 },
            { symbol: '\u00f7', name: 'Quotients', color: 0x8844ff },
            { symbol: '\u221e', name: 'The Scroll', color: 0xf5c842 }
        ];

        // Title — changes based on completion
        var titleStr = allLandsCleared ? 'THE SCROLL IS RESTORED' : 'JOURNEY CONTINUES...';
        var titleColor = allLandsCleared ? '#f5c842' : '#aabbcc';
        var title = this.add.text(w/2, 80, titleStr, {
            fontFamily: 'Nunito', fontSize: '32px', fontStyle: '900', color: titleColor,
            stroke: '#000000', strokeThickness: 5
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({ targets: title, alpha: 1, duration: 1000 });

        // Story text
        var storyMsg = allLandsCleared
            ? 'Kage has fallen. The five fragments\nmerge in a blinding flash of light.\nThe Sacred Scroll of Numbers is whole again.\n\nBalance returns to the ninja world.\nYou are a true Math Ninja.'
            : 'You\'ve recovered ' + landsCompleted + ' of 5 fragments.\nThe Scroll pulses with growing power.\nMore lands await...';

        var storyText = this.add.text(w/2, 150, '', {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#ccccdd',
            align: 'center', lineSpacing: 8, stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5).setAlpha(1);

        // Typewriter for story
        var sIdx = 0;
        var sTimer = this.time.addEvent({
            delay: 30, callback: function() {
                sIdx++; storyText.setText(storyMsg.substring(0, sIdx));
                if (sIdx >= storyMsg.length) sTimer.remove();
            }, loop: true
        });

        // Fragments appear in a circle
        var fragCenterY = allLandsCleared ? 420 : 400;
        this.time.delayedCall(2000, function() {
            var fragCount = Math.min(landsCompleted, 5);
            var angleStep = (Math.PI * 2) / 5;
            var radius = 70;

            for (var f = 0; f < 5; f++) {
                var angle = -Math.PI / 2 + f * angleStep;
                var fx = w/2 + Math.cos(angle) * radius;
                var fy = fragCenterY + Math.sin(angle) * radius;
                var isCollected = f < fragCount;

                var fragCircle = self.add.circle(fx, fy, 22,
                    isCollected ? allFrags[f].color : 0x222233,
                    isCollected ? 0.85 : 0.2
                ).setStrokeStyle(2, isCollected ? 0xffffff : 0x333344, isCollected ? 0.6 : 0.2).setAlpha(0);
                self.tweens.add({ targets: fragCircle, alpha: 1, duration: 400, delay: f * 250 });

                if (isCollected) {
                    self.tweens.add({ targets: fragCircle, scaleX: 1.15, scaleY: 1.15, alpha: 0.5, duration: 1200, yoyo: true, repeat: -1, delay: f * 250 + 400 });

                    var fragSym = self.add.text(fx, fy, allFrags[f].symbol, {
                        fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff'
                    }).setOrigin(0.5).setAlpha(0);
                    self.tweens.add({ targets: fragSym, alpha: 1, duration: 400, delay: f * 250 });
                } else {
                    var qMark = self.add.text(fx, fy, '?', {
                        fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#444455'
                    }).setOrigin(0.5).setAlpha(0);
                    self.tweens.add({ targets: qMark, alpha: 1, duration: 400, delay: f * 250 });
                }
            }

            // If all collected, merge into scroll
            if (allLandsCleared) {
                self.time.delayedCall(2000, function() {
                    // Flash
                    var flash = self.add.rectangle(w/2, h/2, w, h, 0xf5c842, 0).setDepth(50);
                    self.tweens.add({
                        targets: flash, alpha: 0.6, duration: 300,
                        onComplete: function() {
                            self.tweens.add({ targets: flash, alpha: 0, duration: 800, onComplete: function() { flash.destroy(); } });
                        }
                    });
                    self.cameras.main.shake(500, 0.02);

                    // Scroll appears at center
                    var scrollGlow = self.add.circle(w/2, fragCenterY, 50, 0xf5c842, 0.3).setDepth(51);
                    self.tweens.add({ targets: scrollGlow, scaleX: 1.5, scaleY: 1.5, alpha: 0.1, duration: 1500, yoyo: true, repeat: -1 });

                    var scrollRect = self.add.rectangle(w/2, fragCenterY, 60, 80, 0xf5c842, 0.95)
                        .setStrokeStyle(3, 0xffffff, 0.9).setDepth(52).setScale(0);
                    self.tweens.add({ targets: scrollRect, scaleX: 1, scaleY: 1, duration: 600, ease: 'Back.easeOut' });

                    var scrollLabel = self.add.text(w/2, fragCenterY, '\u221e', {
                        fontFamily: 'Nunito', fontSize: '36px', fontStyle: '900', color: '#ffffff'
                    }).setOrigin(0.5).setDepth(53).setScale(0);
                    self.tweens.add({ targets: scrollLabel, scaleX: 1, scaleY: 1, duration: 600, ease: 'Back.easeOut', delay: 200 });
                });
            }
        });

        // Hiro with golden glow
        var heroY = allLandsCleared ? 580 : 560;
        this.time.delayedCall(3000, function() {
            var heroGlow = self.add.circle(w/2, heroY, 40, 0xf5c842, 0.2);
            self.tweens.add({ targets: heroGlow, scaleX: 1.5, scaleY: 1.5, alpha: 0.05, duration: 1200, yoyo: true, repeat: -1 });

            var ninja = self.add.sprite(w/2, heroY, 'hiro-walk', 3).setScale(5).setAlpha(0);
            self.tweens.add({ targets: ninja, alpha: 1, duration: 600 });
            self.tweens.add({ targets: ninja, y: heroY + 8, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

            var heroTitle = self.add.text(w/2, heroY + 40, allLandsCleared ? 'MATH NINJA MASTER' : 'HIRO', {
                fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900',
                color: allLandsCleared ? '#f5c842' : '#4488ff',
                stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setAlpha(0);
            self.tweens.add({ targets: heroTitle, alpha: 1, duration: 400, delay: 400 });
        });

        // Stats
        this.time.delayedCall(4000, function() {
            var acc = gameState.totalProblems > 0 ? Math.round(gameState.totalCorrect / gameState.totalProblems * 100) : 0;
            var statsText = self.add.text(w/2, 670,
                'Problems: ' + gameState.totalProblems + '  |  Correct: ' + gameState.totalCorrect + '  |  ' + acc + '%\nBest Combo: ' + gameState.bestCombo + 'x  |  Lands: ' + landsCompleted + '/5', {
                fontFamily: 'Nunito', fontSize: '16px', fontStyle: '700', color: '#667788',
                align: 'center', lineSpacing: 4
            }).setOrigin(0.5).setAlpha(0);
            self.tweens.add({ targets: statsText, alpha: 1, duration: 500 });
        });

        // Celebration particles
        for (i = 0; i < 20; i++) {
            var px = Phaser.Math.Between(20, w - 20);
            var py = Phaser.Math.Between(60, h - 60);
            var pc = [0xf5c842, 0x22c55e, 0xe94560, 0x4488ff, 0xff44ff, 0x44ffff][i % 6];
            var sparkle = this.add.star(px, h + 20, 5, 3, 8, pc);
            this.tweens.add({
                targets: sparkle, y: py, alpha: 0, angle: 360,
                duration: Phaser.Math.Between(2000, 5000), ease: 'Quad.easeOut',
                delay: Phaser.Math.Between(0, 2000)
            });
        }

        // Back to menu button (after delay)
        this.time.delayedCall(5000, function() {
            var btn = self.add.rectangle(w/2, 740, 260, 56, COLORS.accent)
                .setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff, 0.3).setAlpha(0);
            var btnTxt = self.add.text(w/2, 740, 'MAIN MENU', {
                fontFamily: 'Nunito', fontSize: '26px', fontStyle: '800', color: '#ffffff'
            }).setOrigin(0.5).setAlpha(0);
            self.tweens.add({ targets: [btn, btnTxt], alpha: 1, duration: 500 });
            btn.on('pointerover', function() { btn.setScale(1.05); });
            btn.on('pointerout', function() { btn.setScale(1.0); });
            btn.on('pointerup', function() {
                gameState.coins = 0; gameState.hearts = 5; gameState.grassCut = 0;
                gameState.streak = 0; gameState.bestCombo = 0; gameState.currentLand = 1;
                gameState.totalProblems = 0; gameState.totalCorrect = 0;
                gameState.inventory = []; gameState.land1Complete = false;
                gameState.hasShield = false; gameState.hasHint = false; gameState.hasDungeonKey = false;
                self.scene.start('MenuScene');
            });
        });
    }
}

// ============================================================
// SHOP SCENE — 2D Side-Scroll Interior
// ============================================================
class ShopScene extends Phaser.Scene {
    constructor() { super({ key: 'ShopScene' }); }

    init(data) {
        this.shopData = data || {};
    }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        var gfx = this.add.graphics().setDepth(0);

        // === ROOM LAYOUT (Zelda-style overhead) ===
        var wallT = 28;
        var roomL = Math.max(20, (w - 480) / 2);
        var roomR = w - roomL;
        var roomT = 50, roomB = h - 10;
        var innerL = roomL + wallT, innerR = roomR - wallT;
        var innerT = roomT + wallT, innerB = roomB - wallT;
        var innerW = innerR - innerL, innerH = innerB - innerT;
        var cx = (innerL + innerR) / 2;
        this.innerL = innerL; this.innerR = innerR;
        this.innerT = innerT; this.innerB = innerB;

        // === BLACK BACKGROUND ===
        gfx.fillStyle(0x0a0a0a, 1);
        gfx.fillRect(0, 0, w, h);

        // === STONE WALLS ===
        var brickW = 28, brickH = 14;
        var stoneA = 0x6a5a48, stoneB = 0x5a4a38, stoneC = 0x7a6a58;
        var wallRects = [
            [roomL, roomT, roomR - roomL, wallT],           // top
            [roomL, innerB, roomR - roomL, wallT],           // bottom
            [roomL, roomT, wallT, roomB - roomT],            // left
            [innerR, roomT, wallT, roomB - roomT]            // right
        ];
        for (var wi = 0; wi < wallRects.length; wi++) {
            var wr = wallRects[wi];
            for (var by = wr[1]; by < wr[1] + wr[3]; by += brickH) {
                var rowOff = (Math.floor((by - wr[1]) / brickH)) % 2 === 0 ? 0 : brickW / 2;
                for (var bx = wr[0]; bx < wr[0] + wr[2]; bx += brickW) {
                    var bc = ((bx + by) * 7) % 3 === 0 ? stoneC : ((bx * 3 + by) % 2 === 0 ? stoneA : stoneB);
                    gfx.fillStyle(bc, 1);
                    gfx.fillRect(bx + rowOff, by, brickW - 2, brickH - 2);
                }
            }
        }
        gfx.lineStyle(2, 0x8a7a60, 0.6);
        gfx.strokeRect(innerL, innerT, innerW, innerH);

        // === WOODEN FLOOR ===
        var plankH = 24;
        for (var py = innerT; py < innerB; py += plankH) {
            var pc = ((py - innerT) / plankH) % 2 === 0 ? 0x8a6a3a : 0x7a5a2a;
            gfx.fillStyle(pc, 1);
            gfx.fillRect(innerL, py, innerW, plankH - 2);
            gfx.fillStyle(0x5a4020, 0.5);
            gfx.fillRect(innerL, py + plankH - 2, innerW, 2);
            if ((py * 7) % 5 === 0) {
                var kx = innerL + ((py * 13) % (innerW - 20)) + 10;
                gfx.fillStyle(0x6a4a20, 0.4);
                gfx.fillCircle(kx, py + plankH / 2, 4);
            }
        }

        // === BACK WALL AREA ===
        var backWallH = innerH * 0.28;
        for (var vx = innerL; vx < innerR; vx += 20) {
            var vpc = ((vx - innerL) / 20) % 2 === 0 ? 0x4a3a28 : 0x3a2a18;
            gfx.fillStyle(vpc, 1);
            gfx.fillRect(vx, innerT, 18, backWallH);
            gfx.fillStyle(0x2a1a08, 0.4);
            gfx.fillRect(vx + 18, innerT, 2, backWallH);
        }

        // === COUNTER ===
        var counterY = innerT + backWallH;
        var counterH = 18;
        var counterFrontY = counterY + counterH + 10;
        this.counterFrontY = counterFrontY;
        gfx.fillStyle(0x5a3a1a, 1);
        gfx.fillRect(innerL + 10, counterY, innerW - 20, counterH);
        gfx.fillStyle(0x7a5a2a, 1);
        gfx.fillRect(innerL + 10, counterY, innerW - 20, 4);
        gfx.fillStyle(0x4a2a0a, 1);
        gfx.fillRect(innerL + 10, counterY + counterH, innerW - 20, 10);

        // === ITEMS ON COUNTER ===
        this.shopItems = [
            { name: 'Health Potion', desc: 'Restore 2 hearts', cost: 35, key: 'potion', symbol: '\u2764', color: 0xee3333, shelfIdx: 0 },
            { name: 'Bamboo Shield', desc: 'Block 1 wrong answer', cost: 30, key: 'shield', symbol: '\u{1F6E1}', color: 0x44cccc, shelfIdx: 1 },
            { name: 'Scroll Hint', desc: 'Hint on next problem', cost: 20, key: 'hint', symbol: '?', color: 0x88cc22, shelfIdx: 2 },
            { name: 'Dungeon Key', desc: 'Unlock the dungeon', cost: 30, key: 'dungeonkey', symbol: '\u{1F511}', color: 0xf5c842, shelfIdx: 3 }
        ];
        this.selectedItem = null;
        this.shelfIcons = [];
        this.shelfGlows = [];

        var itemSpacing = innerW / 5;
        var itemY = innerT + backWallH / 2;
        this.itemPositions = [];
        for (var si = 0; si < 4; si++) {
            this.itemPositions.push({ x: innerL + itemSpacing * (si + 1), y: itemY });
        }

        // Price labels on back wall
        for (si = 0; si < this.shopItems.length; si++) {
            this.add.text(this.itemPositions[si].x, innerT + 12, '' + this.shopItems[si].cost, {
                fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff',
                stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5, 0).setDepth(5);
        }
        for (si = 0; si < this.shopItems.length; si++) {
            this.createShelfItem(this.shopItems[si], this.itemPositions[si]);
        }

        // === MERCHANT ===
        var merchX = innerR - 40, merchY = counterY - 10;
        this.merchantSprite = this.add.sprite(merchX, merchY, 'npc-merchant', 0).setScale(3).setDepth(4);
        if (this.anims.exists('npc-merchant-idle')) this.merchantSprite.play('npc-merchant-idle');
        this.add.text(merchX, merchY - 28, 'Merchant', {
            fontFamily: 'Nunito', fontSize: '11px', fontStyle: '700', color: '#f5c842',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5).setDepth(5);
        var bubGfx = this.add.graphics().setDepth(6);
        bubGfx.fillStyle(0xffffff, 0.9);
        bubGfx.fillRoundedRect(merchX - 90, merchY - 54, 130, 22, 6);
        bubGfx.fillTriangle(merchX - 10, merchY - 32, merchX, merchY - 32, merchX - 5, merchY - 24);
        this.add.text(merchX - 25, merchY - 43, 'Click an item to buy!', {
            fontFamily: 'Nunito', fontSize: '11px', fontStyle: '800', color: '#333333'
        }).setOrigin(0.5).setDepth(7);

        // === LANTERNS ===
        var lanterns = [{ x: innerL + 18, y: innerT + 14 }, { x: innerR - 18, y: innerT + 14 }];
        for (var li = 0; li < lanterns.length; li++) {
            var lp = lanterns[li];
            gfx.fillStyle(0x555555, 1); gfx.fillRect(lp.x - 5, lp.y, 10, 14);
            gfx.fillStyle(0x444444, 1); gfx.fillRect(lp.x - 7, lp.y - 2, 14, 3);
            var flame = this.add.circle(lp.x, lp.y + 6, 4, 0xff8800, 0.8).setDepth(3);
            this.tweens.add({ targets: flame, scaleX: { from: 0.7, to: 1.3 }, scaleY: { from: 0.9, to: 1.3 }, alpha: { from: 0.6, to: 1.0 }, duration: 350, yoyo: true, repeat: -1, delay: li * 180 });
            var flameGlow = this.add.circle(lp.x, lp.y + 6, 22, 0xff8800, 0.06).setDepth(2);
            this.tweens.add({ targets: flameGlow, alpha: { from: 0.04, to: 0.1 }, scaleX: { from: 0.9, to: 1.15 }, scaleY: { from: 0.9, to: 1.15 }, duration: 500, yoyo: true, repeat: -1 });
        }

        // === EXIT DOOR (bottom wall, center) ===
        var doorW = 40, doorH = wallT + 8;
        var doorX = cx - doorW / 2, doorY = innerB - 4;
        gfx.fillStyle(0x5a3a1a, 1); gfx.fillRect(doorX, doorY, doorW, doorH);
        gfx.fillStyle(0x4a2a0a, 1); gfx.fillRect(doorX + 4, doorY + 4, doorW - 8, doorH - 4);
        gfx.fillStyle(0xccaa44, 1); gfx.fillCircle(doorX + doorW - 10, doorY + doorH / 2, 3);
        var exitLabel = this.add.text(cx, doorY - 8, 'EXIT', {
            fontFamily: 'Nunito', fontSize: '14px', fontStyle: '800', color: '#ccaa44',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(10);
        this.tweens.add({ targets: exitLabel, y: doorY - 12, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        // Exit zone for physics overlap
        this.exitZone = this.add.zone(cx, innerB + 4, doorW + 10, 20);
        this.physics.add.existing(this.exitZone, true);

        // === DUST MOTES ===
        for (var di = 0; di < 6; di++) {
            var mote = this.add.circle(
                Phaser.Math.Between(innerL + 20, innerR - 20),
                Phaser.Math.Between(counterFrontY + 10, innerB - 30),
                Phaser.Math.FloatBetween(1, 2.5), 0xf5c842, 0.25
            ).setDepth(8);
            this.tweens.add({ targets: mote, x: mote.x + Phaser.Math.Between(-25, 25), y: mote.y - Phaser.Math.Between(10, 30), alpha: { from: 0.15, to: 0.35 }, duration: Phaser.Math.Between(3000, 5000), yoyo: true, repeat: -1, delay: di * 400 });
        }

        // === BREAKABLE JARS (grey ceramic pots — Zelda style) ===
        this.jars = [];
        var floorMidY = counterFrontY + (innerB - counterFrontY) / 2;
        var jarPositions = [
            { x: innerL + 30, y: counterFrontY + 30 },
            { x: innerR - 30, y: counterFrontY + 25 },
            { x: innerL + 50, y: floorMidY + 40 },
            { x: innerR - 50, y: floorMidY + 20 },
            { x: cx + 60, y: floorMidY - 10 }
        ];
        // Half have coins (indices 0, 2, 4)
        var coinJars = [0, 2, 4];
        for (var ji = 0; ji < jarPositions.length; ji++) {
            var jp = jarPositions[ji];
            var coinAmt = coinJars.indexOf(ji) >= 0 ? 1 : 0;
            var jarContainer = this.createJar(jp.x, jp.y);
            var shadow = this.add.ellipse(jp.x, jp.y + 16, 26, 10, 0x000000, 0.2).setDepth(3);
            var jarBody = this.add.rectangle(jp.x, jp.y, 22, 26, 0x000000, 0).setDepth(0);
            this.physics.add.existing(jarBody, true);
            this.jars.push({ x: jp.x, y: jp.y, alive: true, body: jarBody, shadow: shadow, container: jarContainer, coins: coinAmt, idx: ji });
        }

        // === PLAYER (physics-enabled, walkable) ===
        var spawnY = floorMidY + 60;
        this.player = this.physics.add.sprite(cx, spawnY, 'hiro-idle', 0).setScale(3).setDepth(10);
        this.player.body.setSize(12, 12).setOffset(2, 4);
        this.player.play('hiro-idle-down');
        this.shadow = this.add.ellipse(cx, spawnY + 20, 30, 10, 0x000000, 0.25).setDepth(9);
        this.facing = 'down';

        // Physics bounds — walkable area below counter
        var pad = 8;
        this.physics.world.setBounds(innerL + pad, counterFrontY, innerW - pad * 2, innerB - counterFrontY - pad);
        this.player.setCollideWorldBounds(true);

        // Collide player with jar bodies
        for (ji = 0; ji < this.jars.length; ji++) {
            this.physics.add.collider(this.player, this.jars[ji].body);
        }

        // Exit overlap
        this.exitTriggered = false;
        this.physics.add.overlap(this.player, this.exitZone, function() {
            if (self.exitTriggered) return;
            self.exitTriggered = true;
            self.scene.start('WorldScene', { fromShop: true, playerPos: self.shopData.playerPos });
        });

        // Coin group
        this.coinGroup = this.physics.add.group();
        this.physics.add.overlap(this.player, this.coinGroup, function(player, coin) {
            coin.destroy();
            gameState.coins++;
            self.coinDisplay.setText('' + gameState.coins);
            try { self.sound.play('sfx-coin', { volume: 0.4 }); } catch(e) {}
        });

        // === COIN COUNTER (top bar) ===
        this.add.rectangle(w/2, 25, w, 44, 0x1a1a2e, 0.9).setDepth(50);
        var coinIcon = this.add.sprite(w/2 - 50, 25, 'coin-spin', 0).setScale(1.8).setDepth(51);
        coinIcon.play('coin-spin-anim');
        this.coinDisplay = this.add.text(w/2 - 25, 25, '' + gameState.coins, {
            fontFamily: 'Nunito', fontSize: '24px', fontStyle: '900', color: '#f5c842',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0, 0.5).setDepth(51);

        // === SELECTION PANEL (hidden initially) ===
        this.selPanel = this.add.container(0, h + 10).setDepth(60);
        var panelBg = this.add.rectangle(w/2, 0, w, 160, 0x16213e, 0.95).setStrokeStyle(2, COLORS.gold);
        this.selPanel.add(panelBg);
        this.selName = this.add.text(w/2, -54, '', { fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff', stroke: '#000000', strokeThickness: 3 }).setOrigin(0.5);
        this.selPanel.add(this.selName);
        this.selDesc = this.add.text(w/2, -28, '', { fontFamily: 'Nunito', fontSize: '15px', fontStyle: '600', color: '#aabbcc' }).setOrigin(0.5);
        this.selPanel.add(this.selDesc);
        this.selCost = this.add.text(w/2, -6, '', { fontFamily: 'Nunito', fontSize: '17px', fontStyle: '700', color: '#f5c842' }).setOrigin(0.5);
        this.selPanel.add(this.selCost);
        this.buyBtn = this.add.rectangle(w/2, 32, 140, 42, COLORS.green).setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff, 0.3);
        this.selPanel.add(this.buyBtn);
        this.selPanel.add(this.add.text(w/2, 32, 'BUY', { fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff' }).setOrigin(0.5));
        this.buyBtn.on('pointerover', function() { self.buyBtn.setScale(1.05); });
        this.buyBtn.on('pointerout', function() { self.buyBtn.setScale(1.0); });
        this.buyBtn.on('pointerup', function() { if (self.selectedItem) self.buyItem(self.selectedItem); });

        // Feedback text
        this.feedbackText = this.add.text(w/2, counterFrontY + 20, '', {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '700', color: '#22c55e',
            stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(55);

        // === INPUT ===
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys('W,S,A,D');
        this.input.keyboard.on('keydown-SPACE', this.doAction, this);
        this.input.keyboard.on('keydown-ESC', function() {
            self.scene.start('WorldScene', { fromShop: true, playerPos: self.shopData.playerPos });
        });

        // Mobile touch controls
        this.touchDir = { left: false, right: false, up: false, down: false };
        this.isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        if (this.isMobile) this.createShopTouchControls();

    }

    createJar(x, y) {
        var c = this.add.container(x, y).setDepth(5);
        var g = this.add.graphics();
        // === Grey ceramic pot (top-down Zelda style) ===
        // Body — wide rounded pot shape
        g.fillStyle(0x6a7a88, 1);         // main grey-blue body
        g.fillEllipse(0, 2, 24, 22);      // wide belly
        g.fillStyle(0x5a6a78, 1);         // darker lower body
        g.fillEllipse(0, 6, 22, 14);
        // Neck (narrower top)
        g.fillStyle(0x7a8a98, 1);
        g.fillEllipse(0, -8, 16, 10);
        // Rim/lip — lighter ring at top
        g.fillStyle(0x8a9aaa, 1);
        g.fillEllipse(0, -12, 18, 6);
        g.fillStyle(0x9aaabb, 1);
        g.fillEllipse(0, -12, 14, 4);
        // Opening (dark inside)
        g.fillStyle(0x2a3a44, 1);
        g.fillEllipse(0, -12, 10, 3);
        // Left highlight (light reflection)
        g.fillStyle(0x9aaabb, 0.5);
        g.fillEllipse(-6, -2, 5, 14);
        g.fillStyle(0xb0c0cc, 0.3);
        g.fillEllipse(-5, -4, 3, 8);
        // Right shadow
        g.fillStyle(0x4a5a66, 0.4);
        g.fillEllipse(7, 0, 5, 12);
        // Base shadow
        g.fillStyle(0x4a5a66, 0.6);
        g.fillEllipse(0, 10, 20, 5);
        // Decorative band (horizontal stripe)
        g.lineStyle(2, 0x8a9aaa, 0.5);
        g.strokeEllipse(0, 0, 23, 8);
        // Small cross/X mark detail (like Zelda pots)
        g.lineStyle(1.5, 0x5a6a78, 0.6);
        g.lineBetween(-4, -3, 4, 3);
        g.lineBetween(4, -3, -4, 3);
        c.add(g);
        return c;
    }

    doAction() {
        var px = this.player.x, py = this.player.y;

        // Check if near a jar — break it
        for (var j = 0; j < this.jars.length; j++) {
            var jar = this.jars[j];
            if (!jar.alive) continue;
            var dist = Phaser.Math.Distance.Between(px, py, jar.x, jar.y);
            if (dist < 40) {
                this.breakJar(jar);
                return;
            }
        }
    }

    breakJar(jar) {
        jar.alive = false;
        jar.body.destroy();
        jar.shadow.destroy();
        jar.container.destroy();

        // Particle burst (grey ceramic shards flying out)
        var shardColors = [0x6a7a88, 0x7a8a98, 0x5a6a78, 0x8a9aaa];
        for (var s = 0; s < 8; s++) {
            var shard = this.add.rectangle(
                jar.x, jar.y,
                Phaser.Math.Between(3, 6), Phaser.Math.Between(3, 6),
                shardColors[s % shardColors.length]
            ).setDepth(12).setAngle(Phaser.Math.Between(0, 360));
            this.tweens.add({
                targets: shard,
                x: jar.x + Phaser.Math.Between(-30, 30),
                y: jar.y + Phaser.Math.Between(-25, 15),
                alpha: 0, angle: Phaser.Math.Between(-180, 180),
                duration: 400, ease: 'Quad.easeOut',
                onComplete: function() { shard.destroy(); }
            });
        }

        try { this.sound.play('sfx-slash', { volume: 0.4 }); } catch(e) {}

        // Drop coins
        if (jar.coins > 0) {
            for (var c = 0; c < jar.coins; c++) {
                var coin = this.coinGroup.create(
                    jar.x + Phaser.Math.Between(-8, 8),
                    jar.y + Phaser.Math.Between(-8, 8),
                    'coin-spin', 0
                ).setScale(1.2).setDepth(11);
                coin.play('coin-spin-anim');
                coin.body.setSize(12, 12);
                // Bounce out slightly
                this.tweens.add({
                    targets: coin,
                    x: jar.x + Phaser.Math.Between(-20, 20),
                    y: jar.y + Phaser.Math.Between(-15, 15),
                    duration: 300, ease: 'Quad.easeOut'
                });
            }
        }
    }

    createShopTouchControls() {
        var h = this.scale.height, w = this.scale.width, self = this;
        var dSize = 44, dPad = 10, baseX = 60, baseY = h - 90;
        var dirs = [
            { key: 'up', x: baseX, y: baseY - dSize - dPad, label: '\u25B2' },
            { key: 'down', x: baseX, y: baseY + dSize + dPad, label: '\u25BC' },
            { key: 'left', x: baseX - dSize - dPad, y: baseY, label: '\u25C0' },
            { key: 'right', x: baseX + dSize + dPad, y: baseY, label: '\u25B6' }
        ];
        for (var i = 0; i < dirs.length; i++) {
            var d = dirs[i];
            var btn = this.add.circle(d.x, d.y, dSize / 2, 0xffffff, 0.15).setDepth(100).setScrollFactor(0).setInteractive();
            this.add.text(d.x, d.y, d.label, { fontSize: '18px', color: '#ffffff' }).setOrigin(0.5).setDepth(101).setScrollFactor(0).setAlpha(0.5);
            (function(key) {
                btn.on('pointerdown', function() { self.touchDir[key] = true; });
                btn.on('pointerup', function() { self.touchDir[key] = false; });
                btn.on('pointerout', function() { self.touchDir[key] = false; });
            })(d.key);
        }
        // Action button
        var actBtn = this.add.circle(w - 60, h - 90, 28, 0xe94560, 0.4).setDepth(100).setScrollFactor(0).setInteractive();
        this.add.text(w - 60, h - 90, '\u2694', { fontSize: '24px', color: '#ffffff' }).setOrigin(0.5).setDepth(101).setScrollFactor(0);
        actBtn.on('pointerdown', function() { self.doAction(); });
    }

    update() {
        if (!this.player || !this.player.body) return;
        var speed = 160;
        var vx = 0, vy = 0;
        var cur = this.cursors, ws = this.wasd, td = this.touchDir;

        if (cur.left.isDown || ws.A.isDown || td.left) vx = -speed;
        else if (cur.right.isDown || ws.D.isDown || td.right) vx = speed;
        if (cur.up.isDown || ws.W.isDown || td.up) vy = -speed;
        else if (cur.down.isDown || ws.S.isDown || td.down) vy = speed;

        this.player.setVelocity(vx, vy);

        // Animation
        if (vx < 0) { this.player.play('hiro-walk-left', true); this.facing = 'left'; }
        else if (vx > 0) { this.player.play('hiro-walk-right', true); this.facing = 'right'; }
        else if (vy < 0) { this.player.play('hiro-walk-up', true); this.facing = 'up'; }
        else if (vy > 0) { this.player.play('hiro-walk-down', true); this.facing = 'down'; }
        else { this.player.play('hiro-idle-' + this.facing, true); }

        // Shadow follows
        this.shadow.setPosition(this.player.x, this.player.y + 20);

        // Proximity hint near jars
        if (this.player.y > this.counterFrontY + 50) this.counterHintShown = false;
    }

    createShelfItem(item, pos) {
        var self = this;
        var iconBg = this.add.rectangle(pos.x, pos.y, 36, 36, item.color, 0.9).setStrokeStyle(2, 0xffffff, 0.5).setDepth(5).setInteractive({ useHandCursor: true });
        var iconText = this.add.text(pos.x, pos.y, item.symbol, {
            fontFamily: 'Nunito', fontSize: '20px', fontStyle: '900', color: '#ffffff',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5).setDepth(6);
        this.add.text(pos.x, pos.y + 50, item.name, {
            fontFamily: 'Nunito', fontSize: '12px', fontStyle: '700', color: '#dddddd',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5).setDepth(5);
        this.tweens.add({ targets: [iconBg, iconText], y: '-=2', duration: 1000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: item.shelfIdx * 150 });
        iconBg.on('pointerdown', function() { self.selectItem(item); });
        var glowCirc = this.add.circle(pos.x, pos.y, 26, item.color, 0).setDepth(3);
        this.shelfGlows.push(glowCirc);
        this.shelfIcons.push({ bg: iconBg, text: iconText });
    }

    selectItem(item) {
        this.selectedItem = item;
        var h = this.scale.height;
        this.selName.setText(item.name);
        this.selDesc.setText(item.desc);
        this.selCost.setText(item.cost + ' coins');
        this.tweens.add({ targets: this.selPanel, y: h - 80, duration: 250, ease: 'Back.easeOut' });
        for (var gi = 0; gi < this.shelfGlows.length; gi++) {
            var sel = gi === item.shelfIdx;
            this.tweens.add({ targets: this.shelfGlows[gi], alpha: sel ? 0.4 : 0, duration: 200 });
            if (sel) this.tweens.add({ targets: [this.shelfIcons[gi].bg, this.shelfIcons[gi].text], scaleX: 1.15, scaleY: 1.15, duration: 150, yoyo: true });
        }
        try { this.sound.play('sfx-coin', { volume: 0.3 }); } catch(e) {}
    }

    buyItem(item) {
        if (gameState.coins < item.cost) {
            this.feedbackText.setText('Not enough coins!').setColor('#ef4444');
            this.tweens.add({ targets: this.feedbackText, scaleX: 1.2, scaleY: 1.2, duration: 150, yoyo: true });
            return;
        }
        if (item.key === 'shield' && gameState.hasShield) { this.feedbackText.setText('Already have shield!').setColor('#ef4444'); return; }
        if (item.key === 'hint' && gameState.hasHint) { this.feedbackText.setText('Already have hint!').setColor('#ef4444'); return; }
        if (item.key === 'dungeonkey' && gameState.hasDungeonKey) { this.feedbackText.setText('Already have key!').setColor('#ef4444'); return; }

        gameState.coins -= item.cost;
        this.coinDisplay.setText('' + gameState.coins);
        switch(item.key) {
            case 'potion': gameState.hearts = Math.min(gameState.hearts + 2, gameState.maxHearts); this.feedbackText.setText('Hearts restored!').setColor('#22c55e'); break;
            case 'shield': gameState.hasShield = true; this.feedbackText.setText('Shield equipped!').setColor('#66ccff'); break;
            case 'hint': gameState.hasHint = true; this.feedbackText.setText('Hint scroll ready!').setColor('#66ccff'); break;
            case 'dungeonkey': gameState.hasDungeonKey = true; this.feedbackText.setText('Key acquired!').setColor('#f5c842'); break;
        }
        try { this.sound.play('sfx-shop', { volume: 0.5 }); } catch(e) {}
        this.tweens.add({ targets: this.feedbackText, scaleX: 1.2, scaleY: 1.2, duration: 150, yoyo: true });
        if (this.merchantSprite) this.tweens.add({ targets: this.merchantSprite, scaleX: 3.3, scaleY: 3.3, duration: 150, yoyo: true });
    }
}

// ============================================================
// DEATH SCENE
// ============================================================
class DeathScene extends Phaser.Scene {
    constructor() { super({ key: 'DeathScene' }); }

    init(data) {
        this.stats = data || { problems: 0, correct: 0, bestCombo: 0 };
    }

    create() {
        var w = this.scale.width, h = this.scale.height, self = this;
        this.add.rectangle(w/2, h/2, w, h, 0x0a0a0a);

        try { this.sound.play('sfx-gameover', { volume: 0.6 }); } catch(e) {}

        // Dark vignette effect
        var vig = this.add.rectangle(w/2, h/2, w, h, 0x1a0000, 0.5);

        // Fallen ninja
        var ninja = this.add.sprite(w/2, 340, 'hiro-walk', 0).setScale(5).setAngle(90);
        this.tweens.add({ targets: ninja, alpha: 0.5, duration: 2000 });

        // Kage taunt on death
        var deathTaunts = [
            'The shadows grow stronger...',
            'Kage laughs in the darkness.',
            'The fragments remain scattered...',
            'A ninja never gives up.',
            'Every mistake teaches. Try again.'
        ];
        var taunt = deathTaunts[Phaser.Math.Between(0, deathTaunts.length - 1)];

        // Title
        this.add.text(w/2, 140, 'Defeated...', {
            fontFamily: 'Nunito', fontSize: '40px', fontStyle: '900', color: '#ef4444',
            stroke: '#000000', strokeThickness: 5, align: 'center'
        }).setOrigin(0.5);

        // Kage flavor text
        var flavorText = this.add.text(w/2, 200, taunt, {
            fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#886666',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({ targets: flavorText, alpha: 1, duration: 1000, delay: 1000 });

        // Stats
        var statsY = 440;
        this.add.text(w/2, statsY, 'BATTLE REPORT', {
            fontFamily: 'Nunito', fontSize: '24px', fontStyle: '800', color: '#f5c842'
        }).setOrigin(0.5);

        var statLines = [
            'Problems Attempted: ' + this.stats.problems,
            'Correct Answers: ' + this.stats.correct,
            'Best Combo: ' + this.stats.bestCombo + 'x',
            'Accuracy: ' + (this.stats.problems > 0 ? Math.round(this.stats.correct / this.stats.problems * 100) : 0) + '%'
        ];
        for (var i = 0; i < statLines.length; i++) {
            this.add.text(w/2, statsY + 40 + i * 36, statLines[i], {
                fontFamily: 'Nunito', fontSize: '20px', fontStyle: '700', color: '#ccccdd'
            }).setOrigin(0.5);
        }

        // TRY AGAIN button (appears after delay)
        this.time.delayedCall(2000, function() {
            var btn = self.add.rectangle(w/2, 680, 260, 56, COLORS.accent)
                .setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff, 0.3);
            self.add.text(w/2, 680, 'TRY AGAIN', {
                fontFamily: 'Nunito', fontSize: '26px', fontStyle: '800', color: '#ffffff'
            }).setOrigin(0.5);

            btn.on('pointerover', function() { btn.setScale(1.05); });
            btn.on('pointerout', function() { btn.setScale(1.0); });
            btn.on('pointerup', function() {
                // Full reset
                gameState.coins = 0; gameState.hearts = 5; gameState.grassCut = 0;
                gameState.streak = 0; gameState.bestCombo = 0; gameState.currentLand = 1;
                gameState.totalProblems = 0; gameState.totalCorrect = 0;
                gameState.inventory = []; gameState.land1Complete = false;
                gameState.hasShield = false; gameState.hasHint = false; gameState.hasDungeonKey = false;
                self.scene.start('MenuScene');
            });

            btn.setAlpha(0);
            self.tweens.add({ targets: btn, alpha: 1, duration: 500 });
        });
    }
}

// ============================================================
// UI SCENE
// ============================================================
class UIScene extends Phaser.Scene {
    constructor() { super({ key: 'UIScene' }); }

    create() {
        var w = this.scale.width, h = this.scale.height;
        this.add.rectangle(w/2, 0, w, 50, 0x000000, 0.55).setOrigin(0.5, 0).setDepth(50);

        // Hearts
        this.hearts = [];
        for (var i = 0; i < 5; i++) {
            this.hearts.push(this.add.image(24 + i*28, 25, 'heart').setScale(1.6).setDepth(51));
        }

        // Coin display
        var ci = this.add.sprite(w-115, 25, 'coin-spin', 0).setScale(1.8).setDepth(51);
        ci.play('coin-spin-anim');
        this.coinText = this.add.text(w-90, 25, ''+gameState.coins, {
            fontFamily: 'Nunito', fontSize: '24px', fontStyle: '900', color: '#f5c842', stroke: '#000', strokeThickness: 3
        }).setOrigin(0, 0.5).setDepth(51);

        // Mute button (top-right, semi-transparent, out of the way)
        var muteBtn = this.add.circle(w - 28, 25, 16, 0x000000, 0.3)
            .setStrokeStyle(1.5, 0xffffff, 0.2).setInteractive({ useHandCursor: true }).setDepth(52);
        this.muteLabel = this.add.text(w - 28, 25, gameMuted ? '\u{1F507}' : '\u{1F50A}', {
            fontSize: '18px'
        }).setOrigin(0.5).setDepth(53).setAlpha(0.5);
        var muteSelf = this;
        muteBtn.on('pointerup', function() {
            gameMuted = !gameMuted;
            muteSelf.sound.mute = gameMuted;
            muteSelf.muteLabel.setText(gameMuted ? '\u{1F507}' : '\u{1F50A}');
            muteBtn.setFillStyle(0x000000, gameMuted ? 0.5 : 0.3);
        });
        // Sync mute state on create (in case returning from another scene)
        this.sound.mute = gameMuted;

        // Controls hint (only show in WorldScene)
        var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        var worldScene = this.scene.get('WorldScene');
        if (worldScene && worldScene.scene.isActive()) {
            var hintStr = isTouch ? 'Tap D-pad to move  |  Tap \u2694 to chop' : 'WASD = Move  |  SPACE = Chop/Talk';
            var hint = this.add.text(w/2, h - 140, hintStr, {
                fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: '#fff', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(51);
            if (isTouch) {
                this.tweens.add({ targets: hint, alpha: 0, duration: 1500, delay: 4000 });
            } else {
                // On desktop, keep visible longer then fade
                this.tweens.add({ targets: hint, alpha: 0.4, duration: 2000, delay: 6000 });
            }
        }

        // Update events
        var self = this;
        this.events.on('updateCoins', function(n) {
            self.coinText.setText(''+n);
            self.tweens.add({ targets: self.coinText, scaleX: 1.5, scaleY: 1.5, duration: 100, yoyo: true });
        });

        this.time.addEvent({ delay: 500, loop: true, callback: function() {
            self.coinText.setText(''+gameState.coins);
            for (var i = 0; i < self.hearts.length; i++) {
                self.hearts[i].setTexture(i < gameState.hearts ? 'heart' : 'heart-empty');
            }
        }});
    }
}

// ============================================================
// CONFIG & LAUNCH
// ============================================================
// Dynamic game dimensions — fill screen on any device
var _vw = window.innerWidth || 480;
var _vh = window.innerHeight || 854;
var _aspect = _vw / _vh;
var GAME_H = 960;
var GAME_W = Math.max(360, Math.min(960, Math.round(GAME_H * _aspect)));

var config = {
    type: Phaser.AUTO,
    width: GAME_W,
    height: GAME_H,
    backgroundColor: '#1a1a2e',
    parent: 'game-container',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, expandParent: true },
    physics: { default: 'arcade', arcade: { gravity: { x: 0, y: 0 }, debug: false } },
    pixelArt: true,
    roundPixels: true,
    scene: [SplashScene, BootScene, MenuScene, PrologueScene, WorldScene, CombatScene, ShopScene, VictoryScene, DeathScene, UIScene]
};

if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() { new Phaser.Game(config); }).catch(function() { new Phaser.Game(config); });
} else {
    window.addEventListener('load', function() { new Phaser.Game(config); });
}
</script>
